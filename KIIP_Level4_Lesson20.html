<script>
const TTS={
  speak(text,lang='ko-KR',rate=0.8){
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang=lang;u.rate=rate;
    window.speechSynthesis.speak(u);
  },
  init(){if(window.speechSynthesis)window.speechSynthesis.getVoices();}
};
window.addEventListener('load',()=>{TTS.init();setTimeout(TTS.init,500);});

function ttsBtn(text,lang='ko-KR'){
  const safe=text.replace(/'/g,"\\'").replace(/"/g,'&quot;');
  return `<button class="tts-btn" onclick="TTS.speak('${safe}','${lang}');event.stopPropagation()">🔊</button>`;
}

function renderReading(){
  const rawText='4급 과정을 마치며 한국 사회를 더 깊이 이해하게 되었습니다. 경제, 건강, 직장, 환경, 정치, 문화, 기술, 가족, 교통, 사회 문제, 역사 등 다양한 주제를 배웠습니다.\n\n한국은 광복한 이래 놀라운 성장을 이루어 왔습니다. 전통을 지키는 반면 현대화도 빠르게 진행하고 있습니다. 저출산과 고령화 같은 어려운 문제도 있지만, 모든 사람이 함께 노력하는 한 해결할 수 있습니다.\n\n외국인으로서 한국 사회의 구성원이 되고자 KIIP 과정을 마쳤습니다. 앞으로도 한국어 공부를 계속하고, 한국 사회에 기여할 따름입니다. 4급 과정을 마친 여러분 모두를 축하합니다!';
  const questions=[
    {q:'1. 이 글에서 4급에서 배운 주제가 아닌 것은?',opts:['경제','건강','우주 개발','교통'],answer:2},
    {q:'2. 한국의 특징으로 언급된 것은?',opts:['전통만 고집함','현대화만 추구함','전통 유지와 현대화를 함께 함','국제 교류 거부'],answer:2},
    {q:'3. 이 글에서 외국인의 목표는?',opts:['한국을 떠남','KIIP 수료 후 한국 사회에 기여','관광만 즐기기','한국어 포기'],answer:1},
  ];
  const highlighted=rawText
    .replace(/반면/g,'<span class="highlight">반면</span>')
    .replace(/이래/g,'<span class="highlight">이래</span>')
    .replace(/한/g,'<span class="highlight">한</span>')
    .replace(/따름/g,'<span class="highlight">따름</span>')
    .replace(/고자/g,'<span class="highlight">고자</span>')
    .replace(/\n\n/g,'<br><br>');
  return `<h2>📖 읽기 - 4급 최종 읽기</h2>
    <div class="card"><div class="card-title">📰 4급을 마치며 ${ttsBtn(rawText)}</div><div class="reading-text">${highlighted}</div></div>
    <div class="card"><div class="card-title">❓ 읽기 문제</div>
      ${questions.map((q,i)=>{
        const ans=STATE.readAnswers[i];
        return `<div class="listen-q"><div class="q-text">${q.q}</div><div class="topik-options">
          ${q.opts.map((opt,j)=>{
            let cls='topik-opt';
            if(ans!==undefined){if(j===q.answer)cls+=' correct';else if(j===ans)cls+=' wrong';}
            return `<button class="${cls}" onclick="STATE.readAnswers[${i}]=${j};render()" ${ans!==undefined?'disabled':''}>${j+1}. ${opt}</button>`;
          }).join('')}
        </div>${ans!==undefined?`<div style="margin-top:8px;font-size:13px;font-weight:700;color:${ans===q.answer?'#166534':'#991b1b'}">${ans===q.answer?'✅ 정답!':'❌ 오답'}</div>`:''}</div>`;
      }).join('')}
    </div>`;
}

function renderWriting(){
  const sample='4급 KIIP 과정을 마쳤습니다. 아시다시피 언어를 배우는 것은 쉽지 않습니다. 하지만 포기하지 않는 한 반드시 발전할 수 있다는 것을 알게 되었습니다.\n\n한국에서 생활하면서 많은 것을 경험했습니다. 한국의 역사, 문화, 법을 배우고서 한국 사회를 더 잘 이해하게 되었습니다. 저출산, 고령화 같은 사회 문제도 이해하게 된 반면, 한국의 놀라운 발전도 배웠습니다.\n\n앞으로 한국 사회의 좋은 구성원이 되고자 계속 노력할 따름입니다. 5급 과정도 열심히 공부해서 한국 사회를 더 깊이 이해하고 싶습니다.';
  return `<h2>✏️ 쓰기 - 최종 쓰기</h2>
    <div class="card">
      <div class="card-title">📌 쓰기 주제</div>
      <div style="background:linear-gradient(135deg,#92400e,#d97706);color:#fff;border-radius:10px;padding:14px;font-size:16px;font-weight:700;text-align:center;margin-bottom:12px">4급을 마치며 - 나의 한국 생활과 앞으로의 계획</div>
      <div class="writing-guide"><h3>작성 가이드</h3><ul>
        <li>한국에서의 경험과 배운 점을 쓰세요.</li>
        <li>4급에서 배운 문법을 2개 이상 사용하세요.</li>
        <li>앞으로의 목표와 계획을 쓰세요.</li>
      </ul></div>
    </div>
    <div class="card">
      <div class="card-title">📝 내 글쓰기</div>
      <textarea placeholder="여기에 글을 써 보세요..." oninput="STATE.writingText=this.value">${STATE.writingText}</textarea>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
        <span style="font-size:12px;color:#94a3b8">${STATE.writingText.length}자</span>
        <button class="reveal-btn" onclick="setState({sampleShown:!STATE.sampleShown})">${STATE.sampleShown?'샘플 숨기기':'샘플 답안 보기'}</button>
      </div>
      ${STATE.sampleShown?`<div class="sample-box">${sample.replace(/\n\n/g,'<br><br>')}</div>`:''}
    </div>`;
}

function renderCulture(){
  const sections=[
    {title:'🇰🇷 한국 문화 총정리',text:'한국은 5천 년 역사의 전통 문화와 빠른 현대화가 공존하는 나라입니다. K-팝, K-드라마, K-푸드가 세계를 사로잡고 있으며, 반도체·자동차·조선 등 제조업에서도 세계 최강입니다.'},
    {title:'🌏 다문화 한국',text:'현재 한국에는 250만 명 이상의 외국인이 생활합니다. KIIP 과정은 이들이 한국 사회에 적응하고 기여할 수 있도록 돕는 중요한 프로그램입니다.'},
    {title:'📚 5급으로 가는 길',text:'4급 과정을 마친 후 5급(한국사회이해) 과정으로 진학할 수 있습니다. 5급에서는 한국의 정치, 경제, 사회, 문화를 더 깊이 배웁니다. 5급 수료 후 귀화 시험 준비에도 도움이 됩니다.'},
    {title:'🏆 KIIP 수료의 의미',text:'KIIP 4급 수료는 중급 한국어 능력을 인정받는 것입니다. 영주권 및 귀화 신청 시 가점을 받을 수 있습니다. 여러분의 노력과 열정이 빛나는 순간입니다!'},
  ];
  return `<h2>🎎 문화 - 한국 문화 총정리</h2>
    <div class="card"><div class="card-title">🇰🇷 4급 문화 종합</div>
      ${sections.map(s=>`<div class="culture-section"><h4>${s.title}</h4><p>${s.text}</p></div>`).join('')}
    </div>`;
}

function renderQuiz(){
  const total=QUIZ.length;
  const answered=Object.keys(STATE.quizAnswers).length;
  const correct=QUIZ.filter((q,i)=>STATE.quizAnswers[i]===q.answer).length;
  return `<h2>✅ 퀴즈 - 4급 종합 20문항</h2>
    <div class="card" style="background:var(--navy);color:#fff;text-align:center;padding:14px">
      <div style="font-size:14px;opacity:0.8">진행: ${answered}/${total}</div>
      ${STATE.quizDone?`<div style="font-size:28px;font-weight:900;color:#60a5fa;margin-top:4px">${correct}/${total}</div>`:''}
    </div>
    ${QUIZ.map((q,i)=>{
      const chosen=STATE.quizAnswers[i];
      const isCorrect=chosen===q.answer;
      let cardCls='quiz-card';
      if(chosen!==undefined)cardCls+=isCorrect?' answered-correct':' answered-wrong';
      return `<div class="${cardCls}">
        <div class="quiz-q">${i+1}. ${q.q}</div>
        <div class="quiz-opts">
          ${q.opts.map((opt,j)=>{
            let cls='quiz-opt';
            if(chosen!==undefined){if(j===q.answer)cls+=' selected-correct';else if(j===chosen)cls+=' selected-wrong';}
            return `<button class="${cls}" onclick="if(STATE.quizAnswers[${i}]===undefined){STATE.quizAnswers[${i}]=${j};render();}" ${chosen!==undefined?'disabled':''}>${j+1}. ${opt}</button>`;
          }).join('')}
        </div>
        ${chosen!==undefined?`<div style="margin-top:8px;font-size:13px;font-weight:700;color:${isCorrect?'#166534':'#991b1b'}">${isCorrect?'✅ 정답!':'❌ 오답 - 정답: '+(q.answer+1)+'번'}</div>`:''}
      </div>`;
    }).join('')}
    ${answered===total&&!STATE.quizDone?`<div style="text-align:center;margin:12px 0"><button class="reveal-btn" onclick="setState({quizDone:true})">결과 보기</button></div>`:''}
    ${STATE.quizDone?`<div class="quiz-score"><div>최종 점수</div><div class="score-num">${correct}/${total}</div><div style="margin-top:8px">${correct>=18?'🎉 완벽! 4급 수료 준비 완료!':correct>=15?'🏆 우수! 잘 하셨습니다!':correct>=12?'👍 합격! 복습도 해보세요.':correct>=10?'📚 합격권. 더 복습하세요.':'💪 다시 한번 복습하세요!'}</div><button class="check-btn" style="margin-top:12px;background:rgba(255,255,255,0.2);color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:13px;cursor:pointer" onclick="setState({quizAnswers:{},quizDone:false})">다시 풀기</button></div>`:''}`;
}

    </div>`;

</script>
