// ===== TTS =====
const TTS = {
  speak(text, lang='ko-KR', rate=0.8) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang; u.rate = rate; u.pitch = 1;
    const voices = window.speechSynthesis.getVoices();
    const koVoice = voices.find(v => v.lang.startsWith('ko')) || voices.find(v => v.lang.includes('ko'));
    if (koVoice) u.voice = koVoice;
    window.speechSynthesis.speak(u);
  },
  init() { if (window.speechSynthesis) window.speechSynthesis.getVoices(); }
};
window.addEventListener('load', () => { TTS.init(); setTimeout(TTS.init, 500); });

const RECORDER = {
  streams: {}, recorders: {}, chunks: {}, audioURLs: {}, isRecording: {},

  async start(idx, targetText, recBtn) {
    const resultEl = document.getElementById('stt-result-' + idx);
    const playBtn  = document.getElementById('play-btn-' + idx);
    const scoreEl  = document.getElementById('score-bar-' + idx);
    if (this.isRecording[idx]) { this.stop(idx, targetText, recBtn); return; }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio: true});
      this.streams[idx] = stream;
    } catch(e) {
      const name = e.name || '';
      let msg = '';
      if (name === 'NotAllowedError' || name === 'PermissionDeniedError') {
        msg = '❌ <strong>마이크가 차단됨</strong> — 주소창 왼쪽 🔒 → 마이크 → <strong>허용</strong> 후 새로고침<br><span style="color:#555">🇻🇳 Micro bị chặn — Nhấn 🔒 → Micro → Cho phép → F5</span>';
      } else if (name === 'NotFoundError') {
        msg = '❌ <strong>마이크를 찾을 수 없어요</strong> — 마이크 연결 확인';
      } else {
        msg = '❌ <strong>오류: ' + name + '</strong> — Chrome/Edge에서 다시 시도';
      }
      if (resultEl) resultEl.innerHTML = '<span style="color:#ef4444;font-size:11px;line-height:1.7">' + msg + '</span>';
      return;
    }
    this.chunks[idx] = [];
    const mr = new MediaRecorder(this.streams[idx]);
    this.recorders[idx] = mr;
    mr.ondataavailable = e => { if (e.data.size > 0) this.chunks[idx].push(e.data); };
    mr.onstop = () => {
      if (this.audioURLs[idx]) URL.revokeObjectURL(this.audioURLs[idx]);
      const blob = new Blob(this.chunks[idx], {type: 'audio/webm'});
      this.audioURLs[idx] = URL.createObjectURL(blob);
      if (playBtn) {
        playBtn.disabled = false; playBtn.style.opacity = '1';
        playBtn.onclick = () => { const a = new Audio(this.audioURLs[idx]); a.play(); };
      }
    };
    mr.start();
    this.isRecording[idx] = true;
    recBtn.textContent = '⏹ 중지'; recBtn.style.background = '#ef4444';
    if (resultEl) resultEl.innerHTML = '<span style="color:#ef4444;font-weight:700">● 녹음 중... · 🇻🇳 Đang ghi âm...</span>';
    if (scoreEl) scoreEl.style.width = '0%';
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR) {
      const rec = new SR();
      rec.lang = 'ko-KR'; rec.continuous = false; rec.interimResults = false;
      rec.onresult = (e) => {
        const said = e.results[0][0].transcript.replace(/[\s,.?!]/g,'');
        const target = targetText.replace(/[\s,.?!]/g,'');
        const conf = e.results[0][0].confidence;
        let match = 0;
        const minLen = Math.min(said.length, target.length);
        for (let i = 0; i < minLen; i++) { if (said[i] === target[i]) match++; }
        const pct = target.length > 0 ? Math.round(match / target.length * 100) : 0;
        const confPct = Math.round((conf || 0.5) * 100);
        const finalPct = Math.round((pct * 0.7) + (confPct * 0.3));
        const color = finalPct >= 80 ? '#22c55e' : finalPct >= 50 ? '#f59e0b' : '#ef4444';
        const msg = finalPct >= 80 ? '✅ 완벽해요! · Tuyệt vời!' : finalPct >= 50 ? '🔄 조금 더 연습! · Luyện thêm chút!' : '❌ 다시 시도! · Thử lại!';
        if (resultEl) resultEl.innerHTML = '<span style="color:' + color + ';font-weight:800">' + msg + '</span><br><span style="font-size:10px;color:#555">인식: "' + e.results[0][0].transcript + '"</span>';
        if (scoreEl) { scoreEl.style.width = finalPct + '%'; scoreEl.style.background = color; }
      };
      rec.onerror = () => {};
      rec.start();
    }
  },

  async autoDetect() {
    const stateEl = document.getElementById('mic-perm-state');
    const blockedGuide = document.getElementById('mic-blocked-guide');
    const allowBtn = document.getElementById('mic-allow-btn');
    if (!stateEl) return;
    if (navigator.permissions) {
      try {
        const result = await navigator.permissions.query({name: 'microphone'});
        if (result.state === 'granted') {
          stateEl.innerHTML = '<div style="background:#dcfce7;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#166534;font-weight:700">✅ 마이크 이미 허용됨 — 바로 녹음하세요! · 🇻🇳 Đã cho phép!</div>';
          if (allowBtn) { allowBtn.style.background = '#166534'; allowBtn.textContent = '✅ 허용됨 — 바로 녹음하세요'; }
          if (blockedGuide) blockedGuide.style.display = 'none';
          return;
        } else if (result.state === 'denied') {
          stateEl.innerHTML = '<div style="background:#fee2e2;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#991b1b;font-weight:700">🚫 마이크 차단됨 — 아래 빨간 박스 순서대로 해결하세요</div>';
          if (blockedGuide) blockedGuide.style.display = 'block';
          if (allowBtn) { allowBtn.style.background = '#ef4444'; allowBtn.textContent = '⚠️ 차단됨 — 위 단계 완료 후 여기 클릭'; }
          return;
        } else {
          stateEl.innerHTML = '<div style="background:#fef9c3;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#92400e">❓ 아직 허용 안 됨 — 아래 버튼을 눌러 허용해 주세요</div>';
        }
        result.onchange = () => RECORDER.autoDetect();
      } catch(e) {
        stateEl.innerHTML = '<div style="font-size:11px;color:#888">아래 버튼을 눌러 마이크 허용 여부를 확인하세요</div>';
      }
    } else {
      stateEl.innerHTML = '<div style="font-size:11px;color:#888">아래 버튼을 눌러 마이크 허용 여부를 확인하세요</div>';
    }
  },

  async checkPermission(btn) {
    const statusEl = document.getElementById('mic-status');
    const box = document.getElementById('mic-check-box');
    const blockedGuide = document.getElementById('mic-blocked-guide');
    const stateEl = document.getElementById('mic-perm-state');
    btn.textContent = '⏳ 확인 중...'; btn.disabled = true;
    if (location.protocol === 'file:') {
      if (statusEl) statusEl.innerHTML = '<span style="color:#ef4444">❌ file:// 불가 → elimg.com 에서 열기</span>';
      btn.textContent = '🎙️ 마이크 허용하기'; btn.disabled = false; return;
    }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      if (statusEl) statusEl.innerHTML = '<span style="color:#ef4444">❌ 미지원 브라우저 — Chrome 또는 Edge를 사용해 주세요</span>';
      btn.textContent = '🎙️ 마이크 허용하기'; btn.disabled = false; return;
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio: true});
      stream.getTracks().forEach(t => t.stop());
      if (stateEl) stateEl.innerHTML = '<div style="background:#dcfce7;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#166534;font-weight:700">✅ 마이크 허용됨! 아래에서 바로 녹음하세요!</div>';
      if (statusEl) statusEl.innerHTML = '<span style="color:#059669;font-weight:700">✅ 성공! 🇻🇳 Đã cho phép!</span>';
      if (box) { box.style.background = '#dcfce7'; box.style.borderColor = '#86efac'; }
      if (blockedGuide) blockedGuide.style.display = 'none';
      btn.textContent = '✅ 허용됨 — 바로 녹음하세요!'; btn.style.background = '#166534'; btn.disabled = false;
    } catch(e) {
      const name = e.name || '';
      btn.disabled = false;
      if (name === 'NotAllowedError' || name === 'PermissionDeniedError') {
        if (blockedGuide) blockedGuide.style.display = 'block';
        if (stateEl) stateEl.innerHTML = '<div style="background:#fee2e2;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#991b1b;font-weight:700">🚫 마이크 차단됨 — 빨간 박스 순서대로 해결 후 다시 클릭</div>';
        if (statusEl) statusEl.innerHTML = '<span style="color:#ef4444;font-size:11px">🔒 허용 완료 후 이 버튼을 다시 눌러주세요</span>';
        btn.textContent = '🔄 허용 완료 후 다시 클릭'; btn.style.background = '#ef4444';
      } else {
        if (statusEl) statusEl.innerHTML = '<span style="color:#ef4444">오류 (' + (name||'unknown') + ') — Chrome/Edge에서 다시 시도</span>';
        btn.textContent = '🔄 다시 시도'; btn.style.background = '#92400e';
      }
    }
  },

  stop(idx, targetText, recBtn) {
    if (this.recorders[idx] && this.recorders[idx].state !== 'inactive') this.recorders[idx].stop();
    if (this.streams[idx]) this.streams[idx].getTracks().forEach(t => t.stop());
    this.isRecording[idx] = false;
    recBtn.textContent = '🎤 다시 녹음'; recBtn.style.background = '#059669';
  }
};

function vocabCatColor(cat) {
  const m = {'취미 활동':'#f59e0b','스포츠·운동':'#3b82f6','문화·예술':'#ec4899','여가 장소':'#22c55e','여가 관련 표현':'#8b5cf6'};
  return m[cat] || '#888';
}

function renderVocabCards() {
  const cats = [...new Set(VOCAB.map(v => v.cat))];

      <div style="font-size:40px;margin-bottom:8px">✅</div>

      <button onclick="setState({quiz:{started:true,idx:0,score:0,chosen:null,done:false}})" style="width:100%;background:var(--amber);color:#fff;border-radius:12px;padding:14px;font-size:16px;font-weight:700">퀴즈 시작하기 🚀</button>

    const emoji = pct >= 80 ? '🏆' : pct >= 60 ? '👍' : '📚';
    return `<div class="intro-header" style="margin-bottom:16px">
      <div style="font-size:40px;margin-bottom:8px">${emoji}</div>
      <h3>${s.score}/${Q.length} 정답</h3>

    </div>
    <div class="card">
      <button onclick="setState({quiz:{started:true,idx:0,score:0,chosen:null,done:false}})" style="width:100%;background:var(--amber);color:#fff;border-radius:12px;padding:14px;font-size:15px;font-weight:700;margin-bottom:8px">다시 풀기 🔄</button>
      <button onclick="setState({section:0})" style="width:100%;background:#fef3c7;color:#92400e;border-radius:12px;padding:12px;font-size:14px;font-weight:600">처음으로 🏠</button>
    </div>`;
  }
  const cur = Q[s.idx];
  const answered = s.chosen !== null;
  return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:12px;color:#888">문제 ${s.idx+1}/${Q.length}</span>
    <span style="font-size:12px;color:var(--amber);font-weight:700">점수: ${s.score}</span>
  </div>
  <div class="card" style="margin-bottom:12px">
    <p style="font-size:15px;font-weight:600;line-height:1.6;color:#1a202c">${cur.q}</p>
  </div>
  ${cur.opts.map((opt, oi) => {
    let bg = '#fff', border = '#fde68a', color = '#1a202c';
    if (answered) {
      if (oi === cur.ans) { bg = '#dcfce7'; border = '#22c55e'; color = '#166534'; }
      else if (oi === s.chosen) { bg = '#fee2e2'; border = '#ef4444'; color = '#991b1b'; }
    }
    return `<button onclick="${answered ? '' : `(function(){const isC=${oi===cur.ans};setState({quiz:{...STATE.quiz,chosen:${oi},score:STATE.quiz.score+(isC?1:0)}});})()`}" style="width:100%;background:${bg};border:2px solid ${border};border-radius:10px;padding:12px 14px;margin-bottom:8px;font-size:14px;color:${color};text-align:left;font-weight:${answered&&oi===cur.ans?'700':'400'}">${answered&&oi===cur.ans?'✅ ':''}${answered&&oi===s.chosen&&oi!==cur.ans?'❌ ':''}${opt}</button>`;
  }).join('')}
  ${answered ? `<button onclick="(function(){if(STATE.quiz.idx+1>=Q.length){setState({quiz:{...STATE.quiz,done:true}})}else{setState({quiz:{...STATE.quiz,idx:STATE.quiz.idx+1,chosen:null}})}})()" style="width:100%;background:var(--amber);color:#fff;border-radius:12px;padding:13px;font-size:15px;font-weight:700;margin-top:4px">${s.idx+1 >= Q.length ? '결과 보기 🏁' : '다음 문제 →'}</button>` : ''}`;
}

                <button id="rec-btn-${i}" onclick="startSTT(${i},'${item.sent.replace(/'/g,"\\'")}',this)"
                  style="background:#059669;color:#fff;border-radius:16px;padding:5px 12px;font-size:11px;font-weight:700;flex-shrink:0">🎤 녹음</button>
                <button id="play-btn-${i}" disabled

              </div>
              <div id="stt-result-${i}" style="font-size:11px;margin-top:6px;min-height:16px"></div>
            </div>
          `).join('')}
          <div style="background:#f0fdf4;border-radius:8px;padding:10px;font-size:11px;color:#166534;line-height:1.8;margin-top:4px">
            <strong>📖 사용법:</strong> 1️⃣ 🔊 원어민 듣기 → 2��⃣ 🎤 녹음 → 3️⃣ ▶ 내 발음 듣기<br>
            정확도 바: 🟢 80%+ 🟡 50~79% 🔴 50% 미만
          </div>
        </div>

        <div class="card" style="background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1px solid #86efac">
          <div class="section-label" style="background:#059669">🌐 글로컬 G스택 학습법</div>
          <div style="font-size:12px;color:#166534;margin:8px 0;line-height:1.8">
            <strong>글로컬 아카데미 AI 에이전트 기반 4단계 학습법:</strong><br>
            <span style="color:#555">① 어휘/문법 → Gemini 설명 요청</span><br>
            <span style="color:#555">② 말하기 → Gemini 롤플레이 실습</span><br>

          </div>

        <p style="font-size:11px;color:#9ca3af;text-align:center;margin-top:8px">🤖 AI Powered by Groq · 무료 · Free forever<br>© 글로컬 아카데미 · elimg.com</p>
      `;
    }

    default: return '<div style="padding:20px;text-align:center;color:#888">준비중이에요 🙏</div>';
  }
}

// ===== MAIN RENDER =====
function render() {
  const s = STATE;
  const app = document.getElementById('app');
  if (!app) return;

  const tabsHtml = SECTIONS.map(sec =>
    `<button class="stab${s.section===sec.id?' active':''}" onclick="setState({section:${sec.id}})">${sec.icon} ${sec.label}</button>`
  ).join('');

  const bottomNav = `
    <nav class="bottom-nav">
      <a href="/KIIP_Level3_Lesson6" class="bnav-btn" style="text-decoration:none;color:#888">
        <span class="bnav-icon">←</span><span>6과</span>
      </a>
      <button class="bnav-btn${s.section===0?' active':''}" onclick="setState({section:0})">
        <span class="bnav-icon">🏠</span><span>도입</span>
      </button>
      <button class="bnav-btn${s.section===9?' active':''}" onclick="setState({section:9})">
        <span class="bnav-icon">✅</span><span>퀴즈</span>
      </button>
      <button class="bnav-btn${s.section===10?' active':''}" onclick="setState({section:10})">
        <span class="bnav-icon">🤖</span><span>AI실습</span>
      </button>
      <a href="/KIIP_Level3_Lesson8" class="bnav-btn" style="text-decoration:none;color:#888">
        <span class="bnav-icon">→</span><span>8과</span>
      </a>
    </nav>
  `;

  app.innerHTML = `
    <nav class="nav">
      <a href="/KIIP_Level3_Index" class="nav-back">← 목차</a>
      <div style="text-align:right">
        <div class="nav-title">7과 · 여가와 취미</div>
        <div class="nav-sub">KIIP 3급 중급 1</div>
      </div>
    </nav>
    <div class="section-tabs">${tabsHtml}</div>
    <div class="page">${renderSection(s.section)}</div>
    ${bottomNav}
  `;

  // Scroll active tab into view
  setTimeout(() => {
    const activeTab = document.querySelector('.stab.active');
    if (activeTab) activeTab.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
  }, 50);
}

// ===== INIT =====
render();
</script>
