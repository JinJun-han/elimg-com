<html lang="ko">
<head>
<meta charset="UTF-8">

<meta name="robots" content="noindex, nofollow">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Noto Sans KR',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
  header{background:#1e293b;border-bottom:1px solid #334155;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  header h1{font-size:18px;color:#f1f5f9;display:flex;align-items:center;gap:10px}
  .badge-count{background:#3b82f6;color:#fff;font-size:12px;padding:3px 10px;border-radius:20px;font-weight:700}
  .badge-del{background:#ef4444;color:#fff;font-size:12px;padding:3px 10px;border-radius:20px;font-weight:700}
  .header-actions{display:flex;gap:10px;align-items:center}
  .btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all .2s}
  .btn-copy{background:#f59e0b;color:#1c1917}
  .btn-copy:hover{background:#d97706}
  .btn-reset{background:#475569;color:#e2e8f0}
  .btn-reset:hover{background:#64748b}
  .controls{background:#1e293b;padding:14px 24px;border-bottom:1px solid #334155;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .filter-btn{padding:6px 14px;border-radius:20px;border:1px solid #475569;background:transparent;color:#94a3b8;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:all .2s}
  .filter-btn.active,.filter-btn:hover{background:#3b82f6;border-color:#3b82f6;color:#fff}
  .filter-btn.del-filter.active{background:#ef4444;border-color:#ef4444}
  .search-box{margin-left:auto;padding:7px 14px;border-radius:8px;border:1px solid #475569;background:#0f172a;color:#e2e8f0;font-size:13px;font-family:inherit;width:200px}
  .search-box:focus{outline:none;border-color:#3b82f6}
  table{width:100%;border-collapse:collapse}
  thead{background:#1e293b;position:sticky;top:62px;z-index:50}
  th{padding:11px 14px;text-align:left;font-size:12px;color:#94a3b8;font-weight:600;border-bottom:1px solid #334155;white-space:nowrap}
  tr.site-row{border-bottom:1px solid #1e293b;transition:background .15s}
  tr.site-row:hover{background:#1e293b}
  tr.site-row.marked{background:#3b0000 !important}
  tr.site-row.hidden-row{display:none}
  td{padding:10px 14px;font-size:13px;vertical-align:middle}
  td.td-num{color:#475569;width:40px;text-align:center}
  td.td-check{width:44px;text-align:center}
  input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:#ef4444}
  .site-name{font-weight:600;color:#f1f5f9;margin-bottom:2px}
  .site-desc{font-size:12px;color:#64748b}
  .site-url{font-size:11px;color:#475569;font-family:monospace}
  .cat-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
  .cat-biz{background:#1d4ed8;color:#bfdbfe}
  .cat-mission{background:#166534;color:#bbf7d0}
  .cat-cbmc{background:#7c3aed;color:#ede9fe}
  .cat-bible{background:#92400e;color:#fde68a}
  .cat-partner{background:#0e7490;color:#cffafe}
  .cat-platform{background:#334155;color:#94a3b8}
  .cat-bridge{background:#1e3a5f;color:#93c5fd}
  .cat-variant{background:#3f3f46;color:#a1a1aa}
  .visit-btn{background:#0f172a;border:1px solid #334155;color:#94a3b8;padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
  .visit-btn:hover{border-color:#3b82f6;color:#3b82f6}
  .del-label{font-size:11px;color:#f87171;font-weight:700;display:none}
  tr.marked .del-label{display:block}
  .copy-output{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:16px 20px;margin:16px 24px;font-size:13px;font-family:monospace;white-space:pre-wrap;display:none;color:#a3e635;max-height:300px;overflow-y:auto}
  .stat-bar{background:#1e293b;padding:10px 24px;border-bottom:1px solid #334155;font-size:12px;color:#64748b;display:flex;gap:20px;flex-wrap:wrap}
  .stat-bar span b{color:#f1f5f9}
  .row-note{width:140px}
  .note-input{background:#0f172a;border:1px solid #334155;color:#94a3b8;padding:4px 8px;border-radius:5px;font-size:12px;font-family:inherit;width:100%}
  .note-input:focus{outline:none;border-color:#3b82f6}
  .section-header{background:#0f172a;padding:10px 14px;color:#64748b;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid #1e293b}
  .no-results{text-align:center;padding:40px;color:#475569;font-size:14px;display:none}
</style>
</head>
<body>

<header>
  <h1>🌐 네트워크 사이트 관리 <span class="badge-count" id="totalCount">103</span> <span class="badge-del" id="delCount" style="display:none">삭제 0</span></h1>
  <div class="header-actions">
    <button class="btn btn-reset" onclick="resetAll()">초기화</button>
    <button class="btn btn-copy" onclick="copyDeleteList()">📋 삭제 목록 복사</button>
  </div>
</header>

<div class="controls">
  <button class="filter-btn active" data-cat="all" onclick="filterCat(this,'all')">전체</button>
  <button class="filter-btn" data-cat="biz" onclick="filterCat(this,'biz')">비즈니스/AI</button>
  <button class="filter-btn" data-cat="mission" onclick="filterCat(this,'mission')">선교</button>
  <button class="filter-btn" data-cat="cbmc" onclick="filterCat(this,'cbmc')">CBMC/교회</button>
  <button class="filter-btn" data-cat="bible" onclick="filterCat(this,'bible')">성경/콘텐츠</button>
  <button class="filter-btn" data-cat="partner" onclick="filterCat(this,'partner')">파트너</button>
  <button class="filter-btn" data-cat="platform" onclick="filterCat(this,'platform')">플랫폼/허브</button>
  <button class="filter-btn" data-cat="bridge" onclick="filterCat(this,'bridge')">브릿지</button>
  <button class="filter-btn" data-cat="variant" onclick="filterCat(this,'variant')">번호/변형</button>
  <button class="filter-btn del-filter" data-cat="del" onclick="filterCat(this,'del')">🔴 삭제 표시만</button>
  <input class="search-box" type="text" placeholder="사이트 검색..." oninput="searchSites(this.value)">
</div>

<div class="stat-bar" id="statBar">
  <span>비즈니스/AI: <b id="cnt-biz">0</b></span>
  <span>선교: <b id="cnt-mission">0</b></span>
  <span>CBMC/교회: <b id="cnt-cbmc">0</b></span>
  <span>성경/콘텐츠: <b id="cnt-bible">0</b></span>
  <span>파트너: <b id="cnt-partner">0</b></span>
  <span>플랫폼/허브: <b id="cnt-platform">0</b></span>
  <span>브릿지: <b id="cnt-bridge">0</b></span>
  <span>번호/변형: <b id="cnt-variant">0</b></span>
</div>

<div class="copy-output" id="copyOutput"></div>

<table>

      <th>메모</th>
      <th>방문</th>
    </tr>

</table>

  {name:'글로컬 브릿지',desc:'글로컬 브릿지 포털',url:'https://glocal-bridge.netlify.app',cat:'bridge'},
  {name:'브릿지 퓨전',desc:'부울경 이주민 융합 플랫폼',url:'https://glocalbridge-fusion.netlify.app',cat:'bridge'},
  {name:'브릿지 베트남 (구)',desc:'베트남 이전 버전',url:'https://glocalbridg-vn.netlify.app',cat:'bridge'},
  {name:'브릿지 태국 V1',desc:'태국 초기 버전',url:'https://glocalbridge-thai01.netlify.app',cat:'bridge'},
  {name:'글로컬AA',desc:'글로컬 AI 아카데미 (= glocal-ai-academy)',url:'https://glocalaa.netlify.app',cat:'bridge'},
  // 번호 / 변형
  {name:'ELIMG-P',desc:'글로컬브릿지 기도회 2025',url:'https://elimg-p.netlify.app',cat:'variant'},
  {name:'ELIMG-P1',desc:'기도회 구버전 V1',url:'https://elimg-p1.netlify.app',cat:'variant'},
  {name:'ELIMG-P2',desc:'기도회 구버전 V2',url:'https://elimg-p2.netlify.app',cat:'variant'},
  {name:'ELIMG-P3',desc:'기도회 구버전 V3',url:'https://elimg-p3.netlify.app',cat:'variant'},
  {name:'AI 한국어',desc:'AI 한국어 (구버전)',url:'https://elimg-ai-korean.netlify.app',cat:'variant'},
  {name:'AI Korean',desc:'AI 한국어 완전 정복',url:'https://elimg-aikorean.netlify.app',cat:'variant'},
  {name:'ELIMG SRC',desc:'소스 버전',url:'https://elimg-src.netlify.app',cat:'variant'},
  {name:'SRC Green',desc:'그린 소스',url:'https://src-green.netlify.app',cat:'variant'},
  {name:'SRC Strong',desc:'스트롱 소스',url:'https://src-strong.netlify.app',cat:'variant'},
  {name:'김해 V1',desc:'김해 취업매칭 초기 버전',url:'https://gimhae1.netlify.app',cat:'variant'},
];

let deleteSet = new Set(JSON.parse(localStorage.getItem('gb_delete_set')||'[]'));
let currentFilter = 'all';
let currentSearch = '';

function catLabel(cat){
  const map={biz:'비즈니스/AI',mission:'선교',cbmc:'CBMC/교회',bible:'성경/콘텐츠',partner:'파트너',platform:'플랫폼/허브',bridge:'브릿지',variant:'번호/변형'};
  return map[cat]||cat;
}

function renderTable(){
  const tbody = document.getElementById('siteTable');
  tbody.innerHTML='';
  const counts={biz:0,mission:0,cbmc:0,bible:0,partner:0,platform:0,bridge:0,variant:0};
  let visibleCount=0;
  let num=0;

  // group by category for section headers
  let lastCat='';

  SITES.forEach((s,i)=>{
    counts[s.cat]=(counts[s.cat]||0)+1;
    const isDeleted=deleteSet.has(s.url);
    const matchFilter=currentFilter==='all'||(currentFilter==='del'&&isDeleted)||(currentFilter===s.cat);
    const matchSearch=!currentSearch||s.name.toLowerCase().includes(currentSearch)||s.url.toLowerCase().includes(currentSearch)||s.desc.toLowerCase().includes(currentSearch);
    const visible=matchFilter&&matchSearch;

    // section header
    if(visible && s.cat!==lastCat && currentFilter==='all' && !currentSearch){
      const hdr=document.createElement('tr');
      hdr.innerHTML=`<td colspan="7" class="section-header">${catLabel(s.cat)}</td>`;
      tbody.appendChild(hdr);
      lastCat=s.cat;
    }

    num++;
    const tr=document.createElement('tr');
    tr.className='site-row'+(isDeleted?' marked':'')+(visible?'':' hidden-row');
    tr.dataset.url=s.url;
    tr.dataset.cat=s.cat;
    tr.innerHTML=`
      <td class="td-num">${num}</td>
      <td class="td-check"><input type="checkbox" ${isDeleted?'checked':''} onchange="toggleDelete('${s.url}',this)"></td>
      <td>
        <div class="site-name">${s.name}</div>
        <div class="site-desc">${s.desc}</div>
        <div class="del-label">🗑 삭제 표시됨</div>
      </td>
      <td><span class="site-url">${s.url.replace('https://','')}</span></td>
      <td><span class="cat-badge cat-${s.cat}">${catLabel(s.cat)}</span></td>
      <td class="row-note"><input class="note-input" type="text" placeholder="메모..." value="${localStorage.getItem('note_'+s.url)||''}" onchange="saveNote('${s.url}',this.value)"></td>
      <td><button class="visit-btn" onclick="window.open('${s.url}','_blank')">🔗 방문</button></td>
    `;
    tbody.appendChild(tr);
    if(visible) visibleCount++;
  });

  // update counts
  Object.keys(counts).forEach(k=>{
    const el=document.getElementById('cnt-'+k);
    if(el) el.textContent=counts[k];
  });
  document.getElementById('totalCount').textContent=visibleCount;
  const dc=deleteSet.size;
  const dcEl=document.getElementById('delCount');
  dcEl.textContent='삭제 '+dc;
  dcEl.style.display=dc>0?'inline':'none';

  const nr=document.getElementById('noResults');
  nr.style.display=visibleCount===0?'block':'none';
}

function toggleDelete(url,cb){
  if(cb.checked) deleteSet.add(url);
  else deleteSet.delete(url);
  localStorage.setItem('gb_delete_set',JSON.stringify([...deleteSet]));
  const row=document.querySelector(`tr[data-url="${url}"]`);
  if(row) row.classList.toggle('marked',cb.checked);
  const dc=deleteSet.size;
  const dcEl=document.getElementById('delCount');
  dcEl.textContent='삭제 '+dc;
  dcEl.style.display=dc>0?'inline':'none';
}

function saveNote(url,val){
  if(val) localStorage.setItem('note_'+url,val);
  else localStorage.removeItem('note_'+url);
}

function filterCat(btn,cat){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter=cat;
  renderTable();
}

function searchSites(val){
  currentSearch=val.toLowerCase();
  renderTable();
}

function resetAll(){
  if(!confirm('모든 삭제 표시와 메모를 초기화할까요?')) return;
  deleteSet.clear();
  localStorage.removeItem('gb_delete_set');
  Object.keys(localStorage).filter(k=>k.startsWith('note_')).forEach(k=>localStorage.removeItem(k));
  renderTable();
}

function copyDeleteList(){
  if(deleteSet.size===0){alert('삭제 표시된 사이트가 없습니다.');return;}
  const lines=['=== 삭제 예정 사이트 목록 ===',''];
  SITES.filter(s=>deleteSet.has(s.url)).forEach((s,i)=>{
    const note=localStorage.getItem('note_'+s.url);
    lines.push(`${i+1}. ${s.name} (${s.url.replace('https://','')})`+(note?` — ${note}`:''));
  });
  lines.push('','총 '+deleteSet.size+'개');
  const text=lines.join('\n');
  const out=document.getElementById('copyOutput');
  out.textContent=text;
  out.style.display='block';
  navigator.clipboard.writeText(text).then(()=>alert('클립보드에 복사되었습니다!'));
}

renderTable();
</script>
</body>
</html>
