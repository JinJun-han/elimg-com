const TTS = {
  speak(text, lang='ko-KR', rate=0.8) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang; u.rate = rate; u.pitch = 1;
    const voices = window.speechSynthesis.getVoices();
    const koVoice = voices.find(v => v.lang.startsWith('ko')) || voices.find(v => v.lang.includes('ko'));
    if (koVoice) u.voice = koVoice;
    window.speechSynthesis.speak(u);
  },
  init() { if (window.speechSynthesis) window.speechSynthesis.getVoices(); }
};
window.addEventListener('load', () => { TTS.init(); setTimeout(TTS.init, 500); });
function ttsBtn(text) {
  return `<button class="tts-btn" onclick="event.stopPropagation();TTS.speak('${text.replace(/'/g,"\\'")}')" title="발음 듣기">🔊</button>`;
}

let currentTab = 0;
let quizState = {idx:0, score:0, answered:false};


function _typeText(el, text, speed) {
  var i=0;
  function _next(){
    if(i<text.length){ el.textContent+=text[i++]; setTimeout(_next, speed); }
  }
  _next();
}
async function sendAI() {
  const input = document.getElementById('ai-input');
  const chat = document.getElementById('ai-chat');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  chat.innerHTML += `<div class="bubble bubble-right" style="margin-bottom:8px"><b>나:</b> ${msg}</div>`;
  chat.innerHTML += `<div id="ai-loading" class="bubble bubble-left" style="margin-bottom:8px">⏳ 생각 중...</div>`;
  chat.scrollTop = chat.scrollHeight;
  const text = msg;
  const sysP = systemPrompt;
  try {
    const res = await fetch('/kiip/ai', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'system',content:sysP},{role:'user',content:msg||text}]})});
    const data = await res.json();
    const reply = data.choices[0].message.content;
    document.getElementById('ai-loading')?.remove();
    const _el=document.createElement('div');
    _el.className='bubble bubble-left';_el.style.marginBottom='8px';
    _el.innerHTML='<b>AI 선생님:</b> <span></span>';
    chat.appendChild(_el);
    const _sp=_el.querySelector('span');
    _typeText(_sp, reply, 18);
    chat.scrollTop=chat.scrollHeight;
  } catch(e) {
    document.getElementById('ai-loading')?.remove();
    chat.innerHTML += `<div class="bubble bubble-left" style="color:#e00;margin-bottom:8px">연결 오류. 다시 시도해 주세요.</div>`;
  }
}

function showTab(idx) {
  currentTab = idx;
  render();
}

function answerQuiz(optIdx) {
  if (quizState.answered) return;
  quizState.answered = true;
  const correct = QUIZ[quizState.idx].a === optIdx;
  if (correct) quizState.score++;
  document.querySelectorAll('.quiz-opt').forEach((el, i) => {
    if (i === QUIZ[quizState.idx].a) el.classList.add('quiz-correct');
    else if (i === optIdx && !correct) el.classList.add('quiz-wrong');
    el.disabled = true;
  });
  document.getElementById('quiz-next-btn').classList.remove('hide');
}

function nextQuiz() {
  if (quizState.idx < QUIZ.length - 1) {
    quizState.idx++;
    quizState.answered = false;
    render();
  } else {
    quizState.idx = 0;
    quizState.answered = false;
    render();
  }
}

      <div style="font-size:13px;line-height:2;color:#444">
        <div>[나라 이름] + 사람이에요 = I am from [country]</div>
        <div style="color:var(--level0)">베트남 사람이에요 ${ttsBtn('베트남 사람이에요')}</div>
        <div style="color:var(--level0)">인도네시아 사람이에요 ${ttsBtn('인도네시아 사람이에요')}</div>
        <div style="color:var(--level0)">필리핀 사람이에요 ${ttsBtn('필리핀 사람이에요')}</div>
      </div>
    </div>
    ${aiSection()}`;
  } else if (currentTab === 1) {
    // Self introduction patterns
    let patCards = SELF_INTRO.map(p=>`

        <div style="font-size:16px;font-weight:700;color:var(--navy);margin-bottom:4px">${p.pattern} ${ttsBtn(p.pattern.replace('[이름]','라민').replace('[나라]','베트남').replace('[직업]','용접공'))}</div>

        <div style="font-size:14px;font-weight:700;color:var(--level0)">${j.kor} ${ttsBtn(j.kor)}</div>
        <div style="font-size:11px;color:#888">${j.eng}</div>
      </div>`).join('');
    content = `
    <h2>자기소개 패턴 · Self Introduction</h2>
    <p class="sub">기본 문장 패턴 / Basic sentence patterns</p>
    <div class="section-label">📝 문장 패턴 (Sentence Patterns)</div>
    ${patCards}

      <div style="font-weight:700;color:var(--orange);margin-bottom:6px">⚠️ 이에요 vs 예요</div>
      <div style="font-size:13px;line-height:1.8;color:#444">
        <div>• 받침 있음 → <b>이에요</b>: 라<b>민</b>이에요 ${ttsBtn('라민이에요')}</div>
        <div>• 받침 없음 → <b>예요</b>: 후<b>엔</b>예요 ${ttsBtn('후엔이에요')}</div>
      </div>
    </div>
    <div class="section-label" style="margin-top:14px">👷 직업 (Jobs)</div>
    <div class="grid2">${jobCards}</div>
    ${aiSection()}`;
  } else if (currentTab === 2) {
    // Dialogues
    let dials = DIALOGUES.map(d=>`
      <div class="card card-accent">
        <div style="font-weight:700;color:var(--navy);margin-bottom:2px">${d.title}</div>
        <div style="font-size:11px;color:#888;margin-bottom:12px">${d.eng}</div>
        <div style="display:flex;flex-direction:column;gap:6px">
          ${d.lines.map(l=>`
            <div class="bubble bubble-${l.side==='L'?'left':'right'}" style="${l.side==='R'?'align-self:flex-end':''}">
              <div style="font-size:10px;color:#888;margin-bottom:3px">${l.sp}${l.role?` (${l.role})`:''}</div>
              <div style="font-size:14px;font-weight:600;color:var(--navy)">${l.text} ${ttsBtn(l.text)}</div>
              <div style="font-size:11px;color:#666;margin-top:3px;font-style:italic">${l.eng}</div>
            </div>`).join('')}
        </div>
      </div>`).join('');
    content = `
    <h2>대화 연습 (Dialogue Practice)</h2>
    <p class="sub">다국적 현장에서의 첫 만남 / First meeting in a multicultural workplace</p>
    ${dials}
    <div class="card card-green">
      <div style="font-weight:700;color:var(--level0);margin-bottom:8px">💬 연습해 보세요!</div>
      <div style="font-size:13px;line-height:2;color:#444">
        <div>안녕하세요? 저는 ___이에요/예요. ${ttsBtn('안녕하세요? 저는 라민이에요.')}</div>
        <div>[나라] 사람이에요. ${ttsBtn('베트남 사람이에요.')}</div>
        <div>[직업]이에요/예요. ${ttsBtn('용접공이에요.')}</div>
        <div>잘 부탁드립니다! ${ttsBtn('잘 부탁드립니다')}</div>
      </div>
    </div>
    ${aiSection()}`;
  } else if (currentTab === 3) {
    // Quiz
    const q = QUIZ[quizState.idx];
    const opts = q.o.map((opt,i)=>`<button class="quiz-opt" onclick="answerQuiz(${i})">${opt}</button>`).join('');
    content = `
    <h2>퀴즈 · Quiz</h2>
    <p class="sub">나라와 자기소개를 테스트하세요!</p>
    <div class="card card-accent">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span class="badge" style="background:var(--level0)">${quizState.idx+1} / ${QUIZ.length}</span>
        <span style="font-size:13px;color:var(--level0);font-weight:700">점수: ${quizState.score}</span>
      </div>
      <div class="progress" style="margin-bottom:14px"><div class="progress-bar" style="background:var(--level0);width:${((quizState.idx)/QUIZ.length)*100}%"></div></div>
      <div style="font-size:16px;font-weight:700;color:var(--navy);margin-bottom:14px">${q.q}</div>
      ${opts}
      <button id="quiz-next-btn" class="btn btn-green hide" onclick="nextQuiz()" style="margin-top:6px">다음 문제 →</button>
    </div>
    ${aiSection()}`;
  } else {
    // Culture
    let cards = CULTURE.map(c=>`
      <div class="card card-green">
        <div style="font-size:28px;margin-bottom:6px">${c.icon}</div>
        <div style="font-weight:700;color:var(--navy);margin-bottom:2px">${c.t}</div>
        <div style="font-size:11px;color:var(--level0);margin-bottom:6px">${c.eng}</div>
        <div style="font-size:12px;color:#444;line-height:1.6;margin-bottom:6px">${c.d}</div>
        <div style="font-size:11px;color:#888;line-height:1.5;font-style:italic">${c.de}</div>
      </div>`).join('');
    content = `
    <h2>문화 & 배경 지식</h2>
    <p class="sub">Multicultural Korean culture</p>
    ${cards}
    ${aiSection()}`;
  }

  document.getElementById('app').innerHTML = `
    <nav class="nav">
      <div>
        <div class="nav-title">KIIP 0급 8과 · 나라와 나</div>
        <div class="nav-sub">GlocalBridge · 글로컬 아카데미</div>
      </div>
      <div style="display:flex;gap:4px">
        <a href="/KIIP_Level0_Lesson7"><button class="nav-btn">◀</button></a>
        <a href="/KIIP_Level0_Index"><button class="nav-btn">🏠</button></a>
        <a href="/KIIP_Level0_Lesson9"><button class="nav-btn">▶</button></a>
      </div>
    </nav>
    <div class="page">
      <div class="tabs">${tabHtml}</div>
      ${content}
    </div>
    <nav class="bottom-nav">
      <button class="${currentTab===0?'active':''}" onclick="showTab(0)"><span class="icon">🌏</span>나라</button>
      <button class="${currentTab===1?'active':''}" onclick="showTab(1)"><span class="icon">🙋</span>소개패턴</button>
      <button class="${currentTab===2?'active':''}" onclick="showTab(2)"><span class="icon">💬</span>대화</button>
      <button class="${currentTab===3?'active':''}" onclick="showTab(3)"><span class="icon">❓</span>퀴즈</button>
      <button class="${currentTab===4?'active':''}" onclick="showTab(4)"><span class="icon">🤝</span>문화</button>
    </nav>`;
}

render();
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('/sw.js').catch(()=>{});});}
</script>
<script src="/hw-shared.js"></script>
</body>
</html>
