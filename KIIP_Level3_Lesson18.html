var TTS = {
  speak: function(text, lang, rate) {
    if (!window.speechSynthesis) return;
    lang = lang || 'ko-KR';
    rate = rate || 0.8;
    window.speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text);
    u.lang = lang; u.rate = rate; u.pitch = 1;
    var voices = window.speechSynthesis.getVoices();
    var koVoice = voices.find(function(v){ return v.lang.startsWith('ko'); }) || voices.find(function(v){ return v.lang.includes('ko'); });
    if (koVoice) u.voice = koVoice;
    window.speechSynthesis.speak(u);
  },
  init: function() { if (window.speechSynthesis) window.speechSynthesis.getVoices(); }
};

var AICHAT = {
  history: [],
  loading: false,

  quickSend: function(idx) {
    var b = AI_QUICK_BTNS[idx];
    if (!b) return;
    var inp = document.getElementById('ai-chat-input');
    if (!inp) return;
    inp.value = b.q;
    inp.style.borderColor = '#f59e0b';
    if (idx === 3) { inp.focus(); return; }
    this.send();
  },

  addMsg: function(role, text) {
    var box = document.getElementById('ai-chat-messages');
    if (!box) return;
    var ph = box.querySelector('.ai-placeholder');
    if (ph) ph.remove();
    var isUser = role === 'user';
    var d = document.createElement('div');
    d.style.cssText = 'display:flex;flex-direction:column;align-items:' + (isUser ? 'flex-end' : 'flex-start') + ';gap:2px;margin-bottom:6px';
    var safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    d.innerHTML = '<div style="font-size:10px;color:#888;margin:0 4px">' + (isUser ? '🙋 나' : '🤖 AI') + '</div>'
      + '<div style="max-width:90%;padding:10px 13px;border-radius:' + (isUser ? '14px 14px 4px 14px' : '14px 14px 14px 4px') + ';'
      + 'background:' + (isUser ? '#f59e0b' : '#fff') + ';color:' + (isUser ? '#fff' : '#1a202c') + ';'
      + 'font-size:13px;line-height:1.7;border:1px solid ' + (isUser ? '#d97706' : '#fde68a') + ';word-break:break-word">' + safe + '</div>';
    box.appendChild(d);
    box.scrollTop = box.scrollHeight;
  },

  setLoading: function(on) {
    var box = document.getElementById('ai-chat-messages');
    var el  = document.getElementById('ai-loading-dot');
    var btn = document.getElementById('ai-send-btn');
    if (on) {
      if (box && !el) {
        var ld = document.createElement('div');
        ld.id = 'ai-loading-dot';
        ld.style.cssText = 'display:flex;align-items:center;gap:8px;padding:8px;margin-bottom:6px';
        ld.innerHTML = '<div style="display:flex;gap:4px">'
          + '<div style="width:9px;height:9px;border-radius:50%;background:#f59e0b;animation:aiDot 1s 0s ease-in-out infinite"></div>'
          + '<div style="width:9px;height:9px;border-radius:50%;background:#f59e0b;animation:aiDot 1s 0.2s ease-in-out infinite"></div>'
          + '<div style="width:9px;height:9px;border-radius:50%;background:#f59e0b;animation:aiDot 1s 0.4s ease-in-out infinite"></div>'
          + '</div><span style="font-size:12px;color:#888">AI 응답 중... 🇻🇳 Đang trả lời...</span>';
        box.appendChild(ld);
        box.scrollTop = box.scrollHeight;
      }
      if (btn) { btn.textContent = '⏳'; btn.disabled = true; }
    } else {
      if (el) el.remove();
      if (btn) { btn.textContent = '➤'; btn.disabled = false; }
    }
  },

  send: async function() {
    if (this.loading) return;
    var inp  = document.getElementById('ai-chat-input');
    var text = inp ? inp.value.trim() : '';
    if (!text) return;
    this.history.push({role:'user', content:text});
    this.addMsg('user', text);
    if (inp) inp.value = '';
    this.loading = true;
    this.setLoading(true);
    var sys = 'You are a Korean language tutor for KIIP Level 3 Lesson 18 (취업과 진로). Grammar: -(으)ㄹ지 모르다, -기 위한. Student is Vietnamese. Answer in Korean with Vietnamese translation. Be concise.';
    try {
      var res = await fetch('https://text.pollinations.ai/', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'system',content:sys},{role:'user',content:text}],model:'openai',seed:42})});

      var reply = await res.text();
      if (!reply || reply.trim() === '') throw new Error('빈 응답');
      this.history.push({role:'assistant', content:reply});
      this.setLoading(false);
      this.addMsg('assistant', reply);
    } catch(e) {
      this.setLoading(false);
      this.addMsg('assistant', '⚠️ AI 연결 오류\n오류: ' + e.message + '\n\n해결 방법:\n1. 잠시 후 다시 시도해 주세요\n2. 인터넷 연결을 확인해 주세요\n🇻🇳 Lỗi kết nối AI — Thử lại sau ít phút');
    }
    this.loading = false;
  }
};

function copyNotebookContent18() {
  var content = 'KIIP 3급 중급 1 · 18과 취업과 진로 학습 자료\n글로컬 아카데미 (elimg.com)\n\n=== 핵심 어휘 ===\n취업 준비: 이력서[이력써], 자기소개서, 면접, 지원하다, 합격하다[합껵하다]\n직장 생활: 출근, 퇴근, 야근, 월급, 연봉\n진로 관련: 경력[경녁], 자격증[자격쯩], 전공, 전문직, 창업\n취업 지원: 고용센터, 직업훈련, 취업박람회, 인턴십, 채용공고\n표현: 도전하다, 준비하다, 발전하다[발쩐하다], 목표, 성취하다\n\n=== 핵심 문법 ===\n1. -(으)ㄹ지 모르다: 불확실함 표현\n   예: 합격할지 모르겠어요. / 이 일이 맞을지 모르겠어요.\n   베트남어: Không biết có đậu không. / Không biết có phù hợp không.\n\n2. -기 위한 + 명사: 목적 명사 수식\n   예: 취업하기 위한 준비 / 면접을 위한 옷\n   베트남어: sự chuẩn bị để xin việc / quần áo để phỏng vấn';
  navigator.clipboard.writeText(content).then(function() {
    var el = document.getElementById('copy-ok18');
    if (el) { el.textContent = '✅ 복사 완료!'; setTimeout(function(){ el.textContent = ''; }, 3000); }
  }).catch(function() {
    var el = document.getElementById('copy-btn-18');
    if (el) el.textContent = '❌ 직접 복사하세요';
  });
}

var RECORDER = {
  streams: {}, recorders: {}, chunks: {}, audioURLs: {}, isRecording: {},

  start: async function(idx, targetText, recBtn) {
    var self = this;
    var resultEl = document.getElementById('stt-result-' + idx);
    var playBtn  = document.getElementById('play-btn-' + idx);
    var scoreEl  = document.getElementById('score-bar-' + idx);
    if (this.isRecording[idx]) { this.stop(idx, targetText, recBtn); return; }
    try {
      var stream = await navigator.mediaDevices.getUserMedia({audio: true});
      this.streams[idx] = stream;
    } catch(e) {
      var ename = e.name || '';
      var msg = '';
      if (ename === 'NotAllowedError' || ename === 'PermissionDeniedError') {
        msg = '❌ <strong>마이크가 차단됨</strong> — 주소창 왼쪽 🔒 → 마이크 → <strong>허용</strong> 후 새로고침<br><span style="color:#555">🇻🇳 Micro bị chặn — Nhấn 🔒 → Micro → Cho phép → F5</span>';
      } else if (ename === 'NotFoundError') {
        msg = '❌ <strong>마이크를 찾을 수 없어요</strong> — 마이크 연결 확인';
      } else {
        msg = '❌ <strong>오류: ' + ename + '</strong> — Chrome/Edge에서 다시 시도';
      }
      if (resultEl) resultEl.innerHTML = '<span style="color:#ef4444;font-size:11px;line-height:1.7">' + msg + '</span>';
      return;
    }
    this.chunks[idx] = [];
    var mr = new MediaRecorder(this.streams[idx]);
    this.recorders[idx] = mr;
    mr.ondataavailable = function(e) { if (e.data.size > 0) self.chunks[idx].push(e.data); };
    mr.onstop = function() {
      if (self.audioURLs[idx]) URL.revokeObjectURL(self.audioURLs[idx]);
      var blob = new Blob(self.chunks[idx], {type: 'audio/webm'});
      self.audioURLs[idx] = URL.createObjectURL(blob);
      if (playBtn) {
        playBtn.disabled = false; playBtn.style.opacity = '1';
        playBtn.onclick = function() { var a = new Audio(self.audioURLs[idx]); a.play(); };
      }
    };
    mr.start();
    this.isRecording[idx] = true;
    recBtn.textContent = '⏹ 중지'; recBtn.style.background = '#ef4444';
    if (resultEl) resultEl.innerHTML = '<span style="color:#ef4444;font-weight:700">● 녹음 중... · 🇻🇳 Đang ghi âm...</span>';
    if (scoreEl) scoreEl.style.width = '0%';
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR) {
      var rec = new SR();
      rec.lang = 'ko-KR'; rec.continuous = false; rec.interimResults = false;
      rec.onresult = function(ev) {
        var said = ev.results[0][0].transcript.replace(/[\s,.?!]/g,'');
        var target = targetText.replace(/[\s,.?!\[\]]/g,'');
        var conf = ev.results[0][0].confidence;
        var match = 0;
        var minLen = Math.min(said.length, target.length);
        for (var i = 0; i < minLen; i++) { if (said[i] === target[i]) match++; }
        var pct = target.length > 0 ? Math.round(match / target.length * 100) : 0;
        var confPct = Math.round((conf || 0.5) * 100);
        var finalPct = Math.round((pct * 0.7) + (confPct * 0.3));
        var color = finalPct >= 80 ? '#22c55e' : finalPct >= 50 ? '#f59e0b' : '#ef4444';
        var msg2 = finalPct >= 80 ? '✅ 완벽해요! · Tuyệt vời!' : finalPct >= 50 ? '🔄 조금 더 연습! · Luyện thêm chút!' : '❌ 다시 시도! · Thử lại!';
        if (resultEl) resultEl.innerHTML = '<span style="color:' + color + ';font-weight:800">' + msg2 + '</span><br><span style="font-size:10px;color:#555">인식: "' + ev.results[0][0].transcript + '"</span>';
        if (scoreEl) { scoreEl.style.width = finalPct + '%'; scoreEl.style.background = color; }
      };
      rec.onerror = function() {};
      rec.start();
    }
  },

  autoDetect: async function() {
    var stateEl = document.getElementById('mic-perm-state');
    var blockedGuide = document.getElementById('mic-blocked-guide');
    var allowBtn = document.getElementById('mic-allow-btn');
    if (!stateEl) return;
    if (navigator.permissions) {
      try {
        var result = await navigator.permissions.query({name: 'microphone'});
        if (result.state === 'granted') {
          stateEl.innerHTML = '<div style="background:#dcfce7;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#166534;font-weight:700">✅ 마이크 이미 허용됨 — 바로 녹음하세요! · 🇻🇳 Đã cho phép!</div>';
          if (allowBtn) { allowBtn.style.background = '#166534'; allowBtn.textContent = '✅ 허용됨 — 바로 녹음하세요'; }
          if (blockedGuide) blockedGuide.style.display = 'none';
          return;
        } else if (result.state === 'denied') {
          stateEl.innerHTML = '<div style="background:#fee2e2;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#991b1b;font-weight:700">🚫 마이크 차단됨 — 아래 빨간 박스 순서대로 해결하세요</div>';
          if (blockedGuide) blockedGuide.style.display = 'block';

          return;
        } else {
          stateEl.innerHTML = '<div style="background:#fef9c3;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#92400e">❓ 아직 허용 안 됨 — 아래 버튼을 눌러 허용해 주세요</div>';
        }
        result.onchange = function() { RECORDER.autoDetect(); };
      } catch(err) {
        stateEl.innerHTML = '<div style="font-size:11px;color:#888">아래 버튼을 눌러 마이크 허용 여부를 확인하세요</div>';
      }
    } else {
      stateEl.innerHTML = '<div style="font-size:11px;color:#888">아래 버튼을 눌러 마이크 허용 여부를 확인하세요</div>';
    }
  },

  checkPermission: async function(btn) {
    var statusEl = document.getElementById('mic-status');
    var box = document.getElementById('mic-check-box');
    var blockedGuide = document.getElementById('mic-blocked-guide');
    var stateEl = document.getElementById('mic-perm-state');
    btn.textContent = '⏳ 확인 중...'; btn.disabled = true;
    if (location.protocol === 'file:') {
      if (statusEl) statusEl.innerHTML = '<span style="color:#ef4444">❌ file:// 불가 → elimg.com 에서 열기</span>';
      btn.textContent = '🎙️ 마이크 허용하기'; btn.disabled = false; return;
    }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      if (statusEl) statusEl.innerHTML = '<span style="color:#ef4444">❌ 미지원 브라우저 — Chrome 또는 Edge를 사용해 주세요</span>';
      btn.textContent = '🎙️ 마이크 허용하기'; btn.disabled = false; return;
    }
    try {
      var stream = await navigator.mediaDevices.getUserMedia({audio: true});
      stream.getTracks().forEach(function(t){ t.stop(); });
      if (stateEl) stateEl.innerHTML = '<div style="background:#dcfce7;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#166534;font-weight:700">✅ 마이크 허용됨! 아래에서 바로 녹음하세요!</div>';
      if (statusEl) statusEl.innerHTML = '<span style="color:#059669;font-weight:700">✅ 성공! 🇻🇳 Đã cho phép!</span>';
      if (box) { box.style.background = '#dcfce7'; box.style.borderColor = '#86efac'; }
      if (blockedGuide) blockedGuide.style.display = 'none';
      btn.textContent = '✅ 허용됨 — 바로 녹음하세요!'; btn.style.background = '#166534'; btn.disabled = false;
    } catch(e) {
      var en2 = e.name || '';
      btn.disabled = false;
      if (en2 === 'NotAllowedError' || en2 === 'PermissionDeniedError') {
        if (blockedGuide) blockedGuide.style.display = 'block';
        if (stateEl) stateEl.innerHTML = '<div style="background:#fee2e2;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#991b1b;font-weight:700">🚫 마이크 차단됨 — 빨간 박스 순서대로 해결 후 다시 클릭</div>';
        if (statusEl) statusEl.innerHTML = '<span style="color:#ef4444;font-size:11px">🔒 허용 완료 후 이 버튼을 다시 눌러주세요</span>';
        btn.textContent = '🔄 허용 완료 후 다시 클릭'; btn.style.background = '#ef4444';
      } else {
        if (statusEl) statusEl.innerHTML = '<span style="color:#ef4444">오류 (' + (en2||'unknown') + ') — Chrome/Edge에서 다시 시도</span>';
        btn.textContent = '🔄 다시 시도'; btn.style.background = '#92400e';
      }
    }
  },

  stop: function(idx, targetText, recBtn) {
    if (this.recorders[idx] && this.recorders[idx].state !== 'inactive') this.recorders[idx].stop();
    if (this.streams[idx]) this.streams[idx].getTracks().forEach(function(t){ t.stop(); });
    this.isRecording[idx] = false;
    recBtn.textContent = '🎤 다시 녹음'; recBtn.style.background = '#059669';
  }
};

// ===== MAIN RENDER =====
function render() {
  var s = STATE;
  var app = document.getElementById('app');
  if (!app) return;

  var tabsHtml = SECTIONS.map(function(sec) {
    return '<button class="stab' + (s.section===sec.id?' active':'') + '" onclick="setState({section:' + sec.id + '})">' + sec.icon + ' ' + sec.label + '</button>';
  }).join('');

  var bottomNav = '<nav class="bottom-nav">'
    + '<a href="/KIIP_Level3_Lesson17" class="bnav-btn" style="text-decoration:none;color:#888"><span class="bnav-icon">←</span><span>17과</span></a>'
    + '<button class="bnav-btn' + (s.section===0?' active':'') + '" onclick="setState({section:0})"><span class="bnav-icon">🏠</span><span>도입</span></button>'
    + '<button class="bnav-btn' + (s.section===9?' active':'') + '" onclick="setState({section:9})"><span class="bnav-icon">✅</span><span>퀴즈</span></button>'
    + '<button class="bnav-btn' + (s.section===10?' active':'') + '" onclick="setState({section:10})"><span class="bnav-icon">🤖</span><span>AI실습</span></button>'
    + '<a href="/KIIP_Level3_Lesson19" class="bnav-btn" style="text-decoration:none;color:#888"><span class="bnav-icon">→</span><span>19과</span></a>'
    + '</nav>';

  app.innerHTML = '<nav class="nav">'
    + '<a href="/KIIP_Level3_Index" class="nav-back">← 목차</a>'
    + '<div style="text-align:right"><div class="nav-title">18과 · 취업과 진로</div><div class="nav-sub">KIIP 3급 중급 1</div></div>'
    + '</nav>'
    + '<div class="section-tabs">' + tabsHtml + '</div>'
    + '<div class="page">' + renderSection(s.section) + '</div>'
    + bottomNav;

  setTimeout(function() {
    var activeTab = document.querySelector('.stab.active');
    if (activeTab) activeTab.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
  }, 50);
}

// ===== INIT =====
render();
