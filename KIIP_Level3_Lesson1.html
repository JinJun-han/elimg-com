<script>
// ===== TTS =====
const TTS = {
  speak(text, lang='ko-KR', rate=0.8) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang; u.rate = rate; u.pitch = 1;
    const voices = window.speechSynthesis.getVoices();
    const koVoice = voices.find(v => v.lang.startsWith('ko')) || voices.find(v => v.lang.includes('ko'));
    if (koVoice) u.voice = koVoice;
    window.speechSynthesis.speak(u);
  },
  init() { if (window.speechSynthesis) window.speechSynthesis.getVoices(); }
};
window.addEventListener('load', () => { TTS.init(); setTimeout(TTS.init, 500); });

function ttsBtn(text) {
  return `<button class="tts-btn" onclick="event.stopPropagation();TTS.speak('${text.replace(/'/g,"\\'").replace(/"/g,"&quot;")}')" title="발음 듣기">🔊</button>`;

    <div class="page">
      <h2>✏️ 쓰기</h2>
      <p class="sub">대인 관계에 대한 글 쓰기</p>

      <div class="card" style="margin-bottom:12px">
        <div class="section-label">쓰기 전 생각하기</div>
        <div class="discussion-q" style="margin-top:8px">여러분에게 소중한 사람은 누구예요?</div>
        <div class="discussion-q">그 사람과 어떻게 관계를 유지하고 있어요?</div>
      </div>

      <div class="card card-accent" style="margin-bottom:12px">
        <div class="section-label">쓰기 과제</div>
        <div style="font-size:14px;font-weight:700;color:#92400e;margin:8px 0">
          여러분에게 소중한 사람과의 관계에 대해 써 보세요.
        </div>
        <div class="writing-guide">
          <div style="font-size:13px;font-weight:700;color:#92400e;margin-bottom:6px">쓰기 구조</div>
          <ol style="padding-left:16px">
            <li>소개: 그 사람은 누구이고 어떻게 알게 됐어요?</li>
            <li>관계: 그 사람과 어떤 관계예요? 어떻게 지내고 있어요?</li>
            <li>소중한 이유: 왜 그 사람이 중요해요? 어떤 점이 좋아요?</li>
            <li>앞으로: 앞으로 어떻게 관계를 유지하고 싶어요?</li>
          </ol>
        </div>
        <div style="background:#fef3c7;border-radius:8px;padding:8px;font-size:12px;color:#92400e;margin-top:8px">
          ✅ <strong>-(으)ㄹ수록</strong>과 <strong>-아/어서인지</strong>를 반드시 사용하세요!
        </div>
      </div>

      <textarea class="writing-area"
        placeholder="여기에 글을 써 보세요... (목표: 150자 이상)"
        oninput="updateWriting(this.value)">${STATE.writingText}</textarea>
      <div class="char-counter" id="charCount">${STATE.writingText.length}자 / 목표 150자</div>

      <div style="display:flex;gap:8px;margin-top:8px">
        <button onclick="openAIFeedback()" style="flex:1;background:#1d4ed8;color:#fff;border-radius:10px;padding:12px;font-size:13px;font-weight:700">
          🤖 AI 첨삭 요청
        </button>
        <button onclick="setState({sampleShown:!STATE.sampleShown})" style="flex:1;background:#92400e;color:#fff;border-radius:10px;padding:12px;font-size:13px;font-weight:700">
          ${STATE.sampleShown?'예시 숨기기':'예시 답안 보기'}
        </button>
      </div>

      ${STATE.sampleShown ? `
        <div style="margin-top:12px">
          <div class="section-label" style="margin-bottom:8px">예시 답안</div>
          <div class="sample-answer">${SAMPLE_WRITING.replace(/\n\n/g,'<br><br>')}</div>
        </div>
      ` : ''}
    </div>
  `;
}

function updateWriting(val) {
  STATE.writingText = val;
  const el = document.getElementById('charCount');
  if (el) {
    el.textContent = val.length + '자 / 목표 150자';
    el.style.color = val.length >= 150 ? '#22c55e' : '#888';
  }
}

function openAIFeedback() {
  const text = STATE.writingText || '';
  const prompt = encodeURIComponent('다음 한국어 글을 문법적으로 첨삭해 주세요. KIIP 3급 수준의 학습자가 쓴 글입니다. 오류를 지적하고 수정 방법을 친절하게 설명해 주세요:\n\n' + text);
  window.open('https://chat.openai.com/?q=' + prompt, '_blank');
}

// SECTION 8: 문화와 정보
function renderCulture() {
  return `
    <div class="page">
      <h2>🎎 문화와 정보</h2>
      <p class="sub">한국의 대인 관계 문화</p>

      <div style="background:linear-gradient(135deg,#451a03,#92400e);color:#fff;border-radius:12px;padding:16px;margin-bottom:12px;text-align:center">
        <div style="font-size:32px;margin-bottom:8px">🤝</div>
        <div style="font-size:16px;font-weight:800">한국인의 대인 관계 특징</div>
        <div style="font-size:12px;opacity:0.8;margin-top:4px">Korean Interpersonal Relationship Culture</div>
      </div>

      <div class="culture-text">
        한국 사회에서 대인 관계는 매우 중요한 의미를 가집니다. 한국인들은 인간관계를 <strong>'우리'</strong>라는 개념으로 표현하며, 가족, 친구, 직장 동료 등을 하나의 공동체로 인식하는 경향이 있습니다.
        <br><br>
        한국에서는 나이와 관계에 따른 <strong>호칭 문화</strong>가 발달해 있습니다. 처음 만나면 나이를 묻고 서로의 관계에 맞는 호칭을 정하는 경우가 많습니다. 예를 들어, 직장에서는 직급 호칭을 사용하고, 친구 사이에서는 이름을 부르기도 합니다.
        <br><br>
        한국인들은 관계를 유지하기 위해 <strong>식사를 자주 함께</strong> 합니다. "밥 먹었어요?"라는 인사처럼, 함께 식사하는 것은 관계를 돈독히 하는 중요한 수단입니다. 또한 명절이나 생일 등에 연락하고 선물을 주고받는 것도 관계 유지의 중요한 방법입니다.
      </div>

      <div class="card">
        <div class="section-label">한국 호칭 가이드</div>
        <div style="margin-top:8px;font-size:13px;line-height:1.8;color:#555">
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px">
            ${[
              {label:'직장 상사', val:'○○부장님, ○○과장님'},
              {label:'나이 많은 분', val:'○○선생님, ○○씨'},
              {label:'친한 친구', val:'○○야/아, 이름'},
              {label:'처음 만난 분', val:'○○씨 (성+씨)'},
            ].map(h=>`
              <div style="background:#fffbeb;border-radius:8px;padding:8px;border:1px solid #fde68a;font-size:12px">
                <strong style="color:#92400e">${h.label}</strong><br>${h.val}
              </div>
            `).join('')}
          </div>
        </div>
      </div>

      <div class="card" style="margin-top:10px">
        <div class="section-label">문화 비교 토론</div>
        <div class="discussion-q" style="margin-top:8px">
          여러분 나라에서는 대인 관계를 어떻게 유지해요?
          <div style="font-size:11px;color:#888;margin-top:4px;font-style:italic">How do people maintain relationships in your country?</div>
        </div>
        <div class="discussion-q">
          한국의 호칭 문화에 대해 어떻게 생각해요?
          <div style="font-size:11px;color:#888;margin-top:4px;font-style:italic">What do you think about Korea's naming/title culture?</div>
        </div>
      </div>
    </div>
  `;
}

// SECTION 9: 퀴즈
function renderQuiz() {
  if (STATE.quizDone) {
    const correct = QUIZ.filter((q,i)=>STATE.quizAnswers[i]===q.ans).length;
    const pct = Math.round(correct/QUIZ.length*100);
    return `
      <div class="page">
        <div class="quiz-result">
          <div class="score-big">${correct}/${QUIZ.length}</div>
          <div style="font-size:16px;font-weight:700;color:#92400e;margin:8px 0">${pct}점 · ${pct>=80?'우수!':pct>=60?'보통':'다시 공부해요'}</div>
          <div style="font-size:13px;color:#888;margin-bottom:16px">${pct>=80?'잘했어요! 다음 단원으로 이동하세요.':'틀린 문제를 다시 확인하고 복습하세요.'}</div>
          <button onclick="setState({quizAnswers:{},quizDone:false})" style="background:#f59e0b;color:#fff;border-radius:10px;padding:12px 24px;font-size:14px;font-weight:700;margin-bottom:8px;width:100%">다시 풀기</button>
          <a href="KIIP_Level3_Lesson2.html" style="display:block;background:#92400e;color:#fff;border-radius:10px;padding:12px 24px;font-size:14px;font-weight:700;text-align:center;text-decoration:none">다음 과: 건강한 생활 →</a>
        </div>
        <div style="margin-top:16px">
          ${QUIZ.map((q,qi)=>`
            <div class="quiz-card">
              <div class="quiz-num">문제 ${qi+1}</div>
              <div class="quiz-q">${q.q}</div>
              ${q.opts.map((o,oi)=>`
                <div style="padding:10px;border-radius:8px;border:2px solid ${oi===q.ans?'#22c55e':(STATE.quizAnswers[qi]===oi?'#ef4444':'#fde68a')};background:${oi===q.ans?'#dcfce7':(STATE.quizAnswers[qi]===oi&&STATE.quizAnswers[qi]!==q.ans?'#fee2e2':'#fff')};font-size:13px;margin-bottom:4px">
                  ${oi===q.ans?'✅':''}${o}
                </div>
              `).join('')}
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  return `
    <div class="page">
      <h2>✅ 퀴즈</h2>
      <p class="sub">1과 대인 관계 · ${QUIZ.length}문제</p>

      ${QUIZ.map((q,qi)=>`
        <div class="quiz-card">
          <div class="quiz-num">문제 ${qi+1} / ${QUIZ.length}</div>
          <div class="quiz-q">${q.q}</div>
          ${q.opts.map((o,oi)=>`
            <button class="quiz-opt ${STATE.quizAnswers[qi]!==undefined?(oi===q.ans?'quiz-correct':(STATE.quizAnswers[qi]===oi?'quiz-wrong':'')):''}
              " onclick="answerQuiz(${qi},${oi})" ${STATE.quizAnswers[qi]!==undefined?'disabled':''}>
              ${String.fromCharCode(97+oi)}. ${o}
            </button>
          `).join('')}
          ${STATE.quizAnswers[qi]!==undefined?`
            <div style="font-size:12px;color:${STATE.quizAnswers[qi]===q.ans?'#166534':'#991b1b'};padding:4px;font-weight:700">
              ${STATE.quizAnswers[qi]===q.ans?'✅ 정답!':'❌ 정답: ' + String.fromCharCode(97+q.ans) + '. ' + q.opts[q.ans]}
            </div>
          `:''}
        </div>
      `).join('')}

      ${Object.keys(STATE.quizAnswers).length === QUIZ.length ? `
        <button onclick="finishQuiz()" style="width:100%;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;border-radius:12px;padding:14px;font-size:16px;font-weight:700;margin-top:8px">
          결과 보기 →
        </button>
      ` : `
        <div style="text-align:center;font-size:13px;color:#888;padding:10px">
          ${Object.keys(STATE.quizAnswers).length}/${QUIZ.length} 문제 완료
        </div>
      `}
    </div>
  `;
}

function answerQuiz(qi, oi) {
  if (STATE.quizAnswers[qi] !== undefined) return;
  const ans = {...STATE.quizAnswers, [qi]: oi};
  setState({quizAnswers: ans});
}

function finishQuiz() {
  localStorage.setItem('kiip_done_L3_1', '1');
  setState({quizDone: true});
}

// SECTION RENDERER
function renderSection() {
  switch(STATE.section) {
    case 0: return renderIntro();
    case 1: return renderVocab();
    case 2: return renderGrammar();
    case 3: return renderSpeaking();
    case 4: return renderListening();
    case 5: return renderPronunciation();
    case 6: return renderReading();
    case 7: return renderWriting();
    case 8: return renderCulture();
    case 9: return renderQuiz();
    default: return renderIntro();
  }
}

// LANG
function setLang(lang) {
  STATE.lang = lang;
  localStorage.setItem('kiip_lang', lang);
  render();
}

// MAIN RENDER
function render() {
  const app = document.getElementById('app');
  app.innerHTML = renderNav() + renderLangBar() + renderTabs() + renderSection() + renderBottomNav();
  // Restore textarea value
  const ta = app.querySelector('.writing-area');
  if (ta) ta.value = STATE.writingText;
}

render();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
