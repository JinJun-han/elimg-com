button{cursor:pointer;border:none;font-family:inherit}

/* NAV */

h2{color:var(--brown);font-size:18px;margin-bottom:4px;font-weight:800}

.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #fde68a}
.card-accent{border-left:4px solid var(--amber)}

/* VOCAB */
.vocab-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.vocab-card{background:#fff;border-radius:10px;padding:12px;border:2px solid #fde68a;cursor:pointer;transition:all 0.2s;text-align:center;min-height:80px;display:flex;flex-direction:column;justify-content:center;align-items:center}

.vocab-cat{font-size:10px;font-weight:700;color:var(--amber);background:#fffbeb;padding:2px 8px;border-radius:8px;display:inline-block;margin-bottom:8px}

.return-toast{

.return-toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.return-toast-icon{font-size:26px;flex-shrink:0}
.return-toast-body{flex:1;min-width:0}
.return-toast-title{font-size:13px;font-weight:800;margin-bottom:3px}

.return-toast-close{background:rgba(255,255,255,0.15);border:none;color:#fff;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}

<script>
// ===== TTS =====
const TTS = {
  speak(text, lang='ko-KR', rate=0.8) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang; u.rate = rate; u.pitch = 1;
    const voices = window.speechSynthesis.getVoices();
    const koVoice = voices.find(v => v.lang.startsWith('ko')) || voices.find(v => v.lang.includes('ko'));
    if (koVoice) u.voice = koVoice;
    window.speechSynthesis.speak(u);
  },
  init() { if (window.speechSynthesis) window.speechSynthesis.getVoices(); }
};
window.addEventListener('load', () => { TTS.init(); setTimeout(TTS.init, 500); });

function ttsBtn(text) {
  return `<button class="tts-btn" onclick="event.stopPropagation();TTS.speak('${text.replace(/'/g,"\\'").replace(/"/g,"&quot;")}')" title="발음 듣기">🔊</button>`;
}

function flipVocab(i) {
  const flipped = {...STATE.vocabFlipped, [i]: !STATE.vocabFlipped[i]};
  setState({vocabFlipped: flipped});
}

function toggleAllVocab(show) {
  const flipped = {};
  VOCAB.forEach((v,i) => { flipped[i] = show; });
  setState({vocabFlipped: flipped, vocabShowEng: show});
}

function showPracticeAnswer(key, idx) {

  if (input.value.trim() === ans) {

    input.style.background = '#dcfce7';

    input.style.borderColor = '#fde68a';
    input.style.background = '#fff';

// ===== IN-APP AI CHAT (Pollinations.ai — 로그인 불필요, 완전 무료) =====
const AICHAT = {
  history: [],   // {role, content, html}
  loading: false,

  setPrompt(text) {
    const inp = document.getElementById('ai-chat-input');
    if (inp) { inp.value = text; inp.focus(); }
  },

  addMessage(role, text) {
    const box = document.getElementById('ai-chat-messages');
    if (!box) return;
    // 첫 메시지면 안내 텍스트 제거
    if (box.querySelector('[data-placeholder]')) box.innerHTML = '';

    const isUser = role === 'user';
    const bubble = document.createElement('div');
    bubble.style.cssText = `display:flex;flex-direction:column;align-items:${isUser?'flex-end':'flex-start'};gap:2px`;
    bubble.innerHTML = `
      <div style="font-size:10px;color:#888;margin:0 4px">${isUser ? '🙋 나' : '🤖 AI'}</div>
      <div style="max-width:88%;padding:10px 13px;border-radius:${isUser?'14px 14px 4px 14px':'14px 14px 14px 4px'};
        background:${isUser?'#f59e0b':'#fff'};color:${isUser?'#fff':'#1a202c'};
        font-size:13px;line-height:1.65;border:1px solid ${isUser?'#d97706':'#fde68a'};
        white-space:pre-wrap;word-break:break-word">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</div>
    `;
    box.appendChild(bubble);
    box.scrollTop = box.scrollHeight;
  },

  addLoading() {
    const box = document.getElementById('ai-chat-messages');
    if (!box) return;
    const el = document.createElement('div');
    el.id = 'ai-loading';
    el.style.cssText = 'display:flex;align-items:center;gap:8px;padding:8px';
    el.innerHTML = `
      <div style="display:flex;gap:4px">
        ${[0,1,2].map(i=>`<div style="width:8px;height:8px;border-radius:50%;background:#f59e0b;animation:aiDot 1s ${i*0.2}s ease-in-out infinite"></div>`).join('')}
      </div>
      <span style="font-size:12px;color:#888">AI 응답 중...</span>
    `;
    box.appendChild(el);
    box.scrollTop = box.scrollHeight;
  },

  removeLoading() {
    const el = document.getElementById('ai-loading');
    if (el) el.remove();
  },

  async send() {
    if (this.loading) return;
    const inp = document.getElementById('ai-chat-input');
    const btn = document.getElementById('ai-send-btn');
    const text = inp ? inp.value.trim() : '';
    if (!text) return;

    // 시스템 컨텍스트 (항상 추가)
    const systemCtx = 'You are a Korean language tutor for KIIP Level 3 (intermediate). The student is likely Vietnamese. Answer in Korean with Vietnamese translation in parentheses when helpful. Be concise, friendly, and educational. Focus on KIIP exam content.';

    this.history.push({role:'user', content: text});
    this.addMessage('user', text);
    if (inp) inp.value = '';
    this.loading = true;
    if (btn) { btn.textContent = '⏳'; btn.disabled = true; }
    this.addLoading();

    try {
      // Pollinations.ai — 무료, 인증 없음, GPT-4o-mini 사용
      const messages = [
        {role:'system', content: systemCtx},
        ...this.history.slice(-6).map(m => ({role: m.role, content: m.content}))
      ];
      const res = await fetch('https://text.pollinations.ai/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({messages, model:'openai', seed:-1, stream:false}),
      });
      if (!res.ok) throw new Error('API ' + res.status);
      const reply = await res.text();
      this.removeLoading();
      this.history.push({role:'assistant', content: reply});
      this.addMessage('assistant', reply);
    } catch(e) {
      this.removeLoading();
      this.addMessage('assistant', '⚠️ 잠시 오류가 났어요. 다시 시도해 주세요.\n🇻🇳 Lỗi tạm thời — Thử lại nhé.\n\n(오류: ' + e.message + ')');
    }
    this.loading = false;
    if (btn) { btn.textContent = '➤'; btn.disabled = false; }
  }
};

// ===== PRONUNCIATION RECORDER (MediaRecorder + STT) =====
// 100% 브라우저 내장 API — 완전 무료, 서버 불필요
const RECORDER = {
  streams: {},      // idx → MediaStream (마이크)
  recorders: {},    // idx → MediaRecorder
  chunks: {},       // idx → Blob[]
  audioURLs: {},    // idx → ObjectURL (재생용)
  isRecording: {},  // idx → boolean

  async start(idx, targetText, recBtn) {
    const resultEl = document.getElementById('stt-result-' + idx);
    const playBtn  = document.getElementById('play-btn-' + idx);
    const scoreEl  = document.getElementById('score-bar-' + idx);

    // 이미 녹음 중이면 중지
    if (this.isRecording[idx]) {
      this.stop(idx, targetText, recBtn);
      return;
    }

    // 마이크 권한 요청
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio: true});
      this.streams[idx] = stream;
    } catch(e) {
      const name = e.name || '';
      let msg = '';
      if (name === 'NotAllowedError' || name === 'PermissionDeniedError') {
        msg = `❌ <strong>마이크가 차단됨</strong> — 브라우저 주소창 왼쪽 🔒 아이콘 → 마이크 → <strong>허용</strong> 후 새로고침<br>
               <span style="color:#555">🇻🇳 Micro bị chặn — Nhấn 🔒 góc trái URL → Micro → <strong>Cho phép</strong> → Tải lại trang</span>`;
      } else if (name === 'NotFoundError' || name === 'DevicesNotFoundError') {
        msg = `❌ <strong>마이크를 찾을 수 없어요</strong> — 마이크가 연결되어 있는지 확인하세요<br>
               <span style="color:#555">🇻🇳 Không tìm thấy micro — Kiểm tra xem micro có được kết nối không</span>`;
      } else if (name === 'SecurityError' || location.protocol === 'file:') {
        msg = `❌ <strong>보안 오류</strong> — 파일로 직접 열면 안 돼요. <a href="https://elimg.com/KIIP_Level3_Lesson1.html" target="_blank" style="color:#1d4ed8">elimg.com</a>에서 열어주세요 (HTTPS 필요)<br>
               <span style="color:#555">🇻🇳 Lỗi bảo mật — Mở qua <a href="https://elimg.com/KIIP_Level3_Lesson1.html" target="_blank">elimg.com</a> (cần HTTPS)</span>`;
      } else if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        msg = `❌ <strong>이 브라우저는 녹음 미지원</strong> — Chrome 또는 Edge를 사용해 주세요<br>
               <span style="color:#555">🇻🇳 Trình duyệt không hỗ trợ — Dùng Chrome hoặc Edge</span>`;
      } else {
        msg = `❌ <strong>오류: ${e.name}</strong> — 마이크 허용 버튼을 먼저 눌러주세요<br>
               <span style="color:#555">🇻🇳 Lỗi: ${e.name} — Nhấn nút cho phép micro trước</span>`;
      }
      if (resultEl) resultEl.innerHTML = `<span style="color:#ef4444;font-size:11px;line-height:1.7">${msg}</span>`;
      return;
    }

    // MediaRecorder 시작 (녹음 저장용)
    this.chunks[idx] = [];
    const mr = new MediaRecorder(this.streams[idx]);
    this.recorders[idx] = mr;
    mr.ondataavailable = e => { if (e.data.size > 0) this.chunks[idx].push(e.data); };
    mr.onstop = () => {
      // 이전 URL 해제
      if (this.audioURLs[idx]) URL.revokeObjectURL(this.audioURLs[idx]);
      const blob = new Blob(this.chunks[idx], {type: 'audio/webm'});
      this.audioURLs[idx] = URL.createObjectURL(blob);
      // 재생 버튼 활성화
      if (playBtn) {
        playBtn.disabled = false;
        playBtn.style.opacity = '1';
        playBtn.onclick = () => {
          const a = new Audio(this.audioURLs[idx]);
          a.play();
        };
      }
    };
    mr.start();
    this.isRecording[idx] = true;

    // UI 업데이트
    recBtn.textContent = '⏹ 중지';
    recBtn.style.background = '#ef4444';
    if (resultEl) resultEl.innerHTML = '<span style="color:#ef4444;font-weight:700">● 녹음 중... · 🇻🇳 Đang ghi âm...</span>';
    if (scoreEl) scoreEl.style.width = '0%';

    // STT 병행 실행 (정확도 체크)
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR) {
      const rec = new SR();
      rec.lang = 'ko-KR';
      rec.continuous = false;
      rec.interimResults = false;
      rec.onresult = (e) => {
        const said   = e.results[0][0].transcript.replace(/[\s,.?!]/g,'');
        const target = targetText.replace(/[\s,.?!]/g,'');
        const conf   = e.results[0][0].confidence;

        // 글자 단위 유사도 계산
        let match = 0;
        const minLen = Math.min(said.length, target.length);
        for (let i = 0; i < minLen; i++) { if (said[i] === target[i]) match++; }
        const pct = target.length > 0 ? Math.round(match / target.length * 100) : 0;
        const confPct = Math.round((conf || 0.5) * 100);
        const finalPct = Math.round((pct * 0.7) + (confPct * 0.3));

        const color = finalPct >= 80 ? '#22c55e' : finalPct >= 50 ? '#f59e0b' : '#ef4444';
        const msg   = finalPct >= 80 ? '✅ 완벽해요! · Tuyệt vời!' : finalPct >= 50 ? '🔄 조금 더 연습! · Luyện thêm chút!' : '❌ 다시 시도! · Thử lại!';

        if (resultEl) resultEl.innerHTML = `
          <span style="color:${color};font-weight:800">${msg}</span><br>
          <span style="font-size:10px;color:#555">인식: "${e.results[0][0].transcript}"</span>
        `;
        if (scoreEl) {
          scoreEl.style.width = finalPct + '%';
          scoreEl.style.background = color;
        }
      };
      rec.onerror = () => {};
      rec.start();
      // STT는 자동 종료, MediaRecorder는 버튼으로 중지
    }
  },

  // 페이지 로드 시 자동 권한 상태 감지
  async autoDetect() {
    const stateEl = document.getElementById('mic-perm-state');
    const blockedGuide = document.getElementById('mic-blocked-guide');
    const allowBtn = document.getElementById('mic-allow-btn');
    if (!stateEl) return;

    // Permissions API로 현재 상태 조회
    if (navigator.permissions) {
      try {
        const result = await navigator.permissions.query({name: 'microphone'});
        if (result.state === 'granted') {
          stateEl.innerHTML = '<div style="background:#dcfce7;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#166534;font-weight:700">✅ 마이크 이미 허용됨 — 바로 녹음하세요! · 🇻🇳 Đã cho phép!</div>';
          if (allowBtn) { allowBtn.style.background = '#166534'; allowBtn.textContent = '✅ 허용됨 — 바로 녹음하세요'; }
          if (blockedGuide) blockedGuide.style.display = 'none';
          return;
        } else if (result.state === 'denied') {
          stateEl.innerHTML = '<div style="background:#fee2e2;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#991b1b;font-weight:700">🚫 마이크 차단됨 — 아래 빨간 박스 순서대로 해결하세요</div>';
          if (blockedGuide) blockedGuide.style.display = 'block';
          if (allowBtn) { allowBtn.style.background = '#ef4444'; allowBtn.textContent = '⚠️ 차단됨 — 위 단계 완료 후 여기 클릭'; }
          return;
        } else {
          stateEl.innerHTML = '<div style="background:#fef9c3;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#92400e">❓ 아직 허용 안 됨 — 아래 버튼을 눌러 허용해 주세요</div>';
        }
        // 상태 변화 감지
        result.onchange = () => RECORDER.autoDetect();
      } catch(e) {
        stateEl.innerHTML = '<div style="font-size:11px;color:#888">아래 버튼을 눌러 마이크 허용 여부를 확인하세요</div>';
      }
    } else {
      stateEl.innerHTML = '<div style="font-size:11px;color:#888">아래 버튼을 눌러 마이크 허용 여부를 확인하세요</div>';
    }
  },

  async checkPermission(btn) {
    const statusEl = document.getElementById('mic-status');
    const box = document.getElementById('mic-check-box');
    const blockedGuide = document.getElementById('mic-blocked-guide');
    const stateEl = document.getElementById('mic-perm-state');
    btn.textContent = '⏳ 확인 중...'; btn.disabled = true;

    if (location.protocol === 'file:') {
      if (statusEl) statusEl.innerHTML = '<span style="color:#ef4444">❌ file:// 불가 → <a href="https://elimg.com/KIIP_Level3_Lesson1.html" target="_blank" style="color:#1d4ed8;font-weight:700">elimg.com 에서 열기</a></span>';
      btn.textContent = '🎙️ 마이크 허용하기'; btn.disabled = false;
      return;
    }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      if (statusEl) statusEl.innerHTML = '<span style="color:#ef4444">❌ 미지원 브라우저 — <strong>Chrome</strong> 또는 <strong>Edge</strong>를 사용해 주세요</span>';
      btn.textContent = '🎙️ 마이크 허용하기'; btn.disabled = false;
      return;
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio: true});
      stream.getTracks().forEach(t => t.stop());
      // 성공
      if (stateEl) stateEl.innerHTML = '<div style="background:#dcfce7;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#166534;font-weight:700">✅ 마이크 허용됨! 아래에서 바로 녹음하세요!</div>';
      if (statusEl) statusEl.innerHTML = '<span style="color:#059669;font-weight:700">✅ 성공! 🇻🇳 Đã cho phép!</span>';
      if (box) { box.style.background = '#dcfce7'; box.style.borderColor = '#86efac'; }
      if (blockedGuide) blockedGuide.style.display = 'none';
      btn.textContent = '✅ 허용됨 — 바로 녹음하세요!'; btn.style.background = '#166534'; btn.disabled = false;
    } catch(e) {
      const name = e.name || '';
      btn.disabled = false;
      if (name === 'NotAllowedError' || name === 'PermissionDeniedError') {
        // 차단 가이드 표시
        if (blockedGuide) blockedGuide.style.display = 'block';
        if (stateEl) stateEl.innerHTML = '<div style="background:#fee2e2;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#991b1b;font-weight:700">🚫 마이크 차단됨 — 빨간 박스 순서대로 해결 후 다시 클릭</div>';
        if (statusEl) statusEl.innerHTML = '<span style="color:#ef4444;font-size:11px">🔒 허용 완료 후 이 버튼을 다시 눌러주세요</span>';
        btn.textContent = '🔄 허용 완료 후 다시 클릭'; btn.style.background = '#ef4444';
      } else if (name === 'NotFoundError' || name === 'DevicesNotFoundError') {
        if (statusEl) statusEl.innerHTML = '<span style="color:#ef4444">❌ 마이크 장치 없음 — 마이크를 연결하고 다시 시도</span>';
        btn.textContent = '🔄 다시 시도'; btn.style.background = '#92400e';
      } else {
        if (statusEl) statusEl.innerHTML = `<span style="color:#ef4444">오류 (${name}) — Chrome/Edge에서 다시 시도</span>`;
        btn.textContent = '🔄 다시 시도'; btn.style.background = '#92400e';
      }
    }
  },

  stop(idx, targetText, recBtn) {
    if (this.recorders[idx] && this.recorders[idx].state !== 'inactive') {
      this.recorders[idx].stop();
    }
    if (this.streams[idx]) {
      this.streams[idx].getTracks().forEach(t => t.stop());
    }
    this.isRecording[idx] = false;
    recBtn.textContent = '🎤 다시 녹음';
    recBtn.style.background = '#059669';
  }
};

function startSTT(idx, targetText, recBtn) {
  RECORDER.start(idx, targetText, recBtn);
}

// SECTION RENDERER
function renderSection() {
  switch(STATE.section) {
    case 0: return renderIntro();
    case 1: return renderVocab();
    case 2: return renderGrammar();
    case 3: return renderSpeaking();
    case 4: return renderListening();
    case 5: return renderPronunciation();
    case 6: return renderReading();
    case 7: return renderWriting();
    case 8: return renderCulture();
    case 9: return renderQuiz();
    case 10: return renderAI();
    default: return renderIntro();
  }
}

// LANG
function setLang(lang) {
  STATE.lang = lang;
  localStorage.setItem('kiip_lang', lang);
  render();
}

// ===== RETURN TOAST =====
let _toastTimer = null;

function showReturnToast(appName, icon) {
  // 토스트 DOM이 없으면 생성
  let toast = document.getElementById('return-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'return-toast';
    toast.className = 'return-toast';
    document.body.appendChild(toast);
  }

  const shortcuts = /iPhone|iPad|iPod/i.test(navigator.userAgent)
    ? '하단 탭 버튼 → KIIP 탭 선택'
    : /Android/i.test(navigator.userAgent)
    ? '상단 탭 □ 버튼 → KIIP 탭 선택'
    : 'Ctrl+Tab 또는 탭 바에서 KIIP 탭 클릭';

  toast.innerHTML = `
    <div class="return-toast-icon">${icon}</div>
    <div class="return-toast-body">
      <div class="return-toast-title">📍 ${appName} 새 탭에서 열렸어요</div>
      <div class="return-toast-sub">
        돌아오려면: <strong>${shortcuts}</strong><br>
        🇻🇳 Để quay lại: chọn tab KIIP trên trình duyệt
      </div>
    </div>
    <button class="return-toast-close" onclick="hideReturnToast()">✕</button>
    <div class="return-toast-bar"></div>
  `;

  // 표시
  requestAnimationFrame(() => {
    toast.classList.add('show');
  });

  // 8초 후 자동 숨김
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => hideReturnToast(), 8000);
}

function hideReturnToast() {
  const toast = document.getElementById('return-toast');
  if (toast) toast.classList.remove('show');
  clearTimeout(_toastTimer);
}

// visibilitychange: 돌아왔을 때 토스트 숨기기
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') hideReturnToast();
});

// MAIN RENDER
function render() {
  const app = document.getElementById('app');
  app.innerHTML = renderNav() + renderLangBar() + renderTabs() + renderSection() + renderBottomNav();
  // Restore textarea value
  const ta = app.querySelector('.writing-area');
  if (ta) ta.value = STATE.writingText;
}

render();
</script>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
