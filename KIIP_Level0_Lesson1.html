<html lang="ko">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --green:#059669;--green-light:#10b981;--green-pale:#ecfdf5;
  --navy:#1B3A6B;--gold:#C49A22;--gold-light:#E8C05A;
  --red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;
  --bg:#f0fdf4;--white:#fff;--gray:#f8fafc;--dark:#1a2340;
}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);max-width:520px;margin:0 auto;min-height:100vh;overflow-x:hidden;padding-bottom:70px}
button{cursor:pointer;border:none;font-family:inherit}
/* NAV */
.nav{background:var(--green);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(5,150,105,.3)}
.nav-title{color:#fff;font-weight:800;font-size:14px}
.nav-sub{color:rgba(255,255,255,.65);font-size:10px}
.nav-btn{background:none;color:#fff;font-size:22px;padding:4px 8px}
.menu{background:#047857;position:sticky;top:48px;z-index:99}
.menu button{display:flex;align-items:center;gap:8px;width:100%;padding:10px 18px;background:transparent;color:#fff;font-size:13px;text-align:left}
.menu button.active{background:var(--green-light)}
/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:#fff;border-top:1px solid #d1fae5;display:flex;justify-content:space-around;padding:6px 0;z-index:100;box-shadow:0 -2px 8px rgba(5,150,105,.1)}
.bottom-nav button{background:none;display:flex;flex-direction:column;align-items:center;gap:1px;padding:2px 6px;opacity:.45;font-size:9px;color:#047857}
.bottom-nav button.active{opacity:1;color:var(--green);font-weight:700}
.bottom-nav .icon{font-size:20px}
/* PAGE */
.page{padding:16px}
h2{color:var(--green);font-size:19px;margin-bottom:4px}
.sub{color:#6b7280;font-size:11px;margin-bottom:14px}
.card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid #d1fae5;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card-green{border-left:4px solid var(--green)}
.card-gold{border-left:4px solid var(--gold)}
/* HANGUL GRID */
.hg-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:10px}
.hg-cell{background:#fff;border:2px solid #d1fae5;border-radius:10px;padding:8px 4px;text-align:center;cursor:pointer;transition:all .2s;user-select:none}
.hg-cell:hover,.hg-cell.active{border-color:var(--green);background:var(--green-pale)}
.hg-cell .char{font-size:26px;font-weight:900;color:var(--dark);line-height:1}
.hg-cell .rom{font-size:9px;color:#6b7280;margin-top:2px}
/* DETAIL CARD */
.detail-card{background:linear-gradient(135deg,var(--green),#047857);color:#fff;border-radius:16px;padding:20px;margin-bottom:14px;text-align:center}
.detail-char{font-size:72px;font-weight:900;line-height:1;margin-bottom:8px}
.detail-rom{font-size:18px;opacity:.85;margin-bottom:4px}
.detail-eng{font-size:13px;opacity:.7;margin-bottom:14px}
.tts-big-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;padding:10px 28px;border-radius:20px;font-size:14px;font-weight:700;margin:0 4px}
.tts-big-btn:hover{background:rgba(255,255,255,.3)}
/* EXAMPLE WORDS */
.ex-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.ex-word{background:#fff;border:1px solid #d1fae5;border-radius:10px;padding:10px;text-align:center;cursor:pointer;transition:.2s}
.ex-word:hover{border-color:var(--green);background:var(--green-pale)}
.ex-word .kor{font-size:18px;font-weight:800;color:var(--dark)}
.ex-word .eng{font-size:11px;color:#6b7280;margin-top:2px}
.ex-word .pos{font-size:9px;color:var(--green);font-weight:700}
/* QUIZ */
.quiz-opt{padding:13px;border-radius:10px;border:2px solid #d1fae5;background:#fff;font-size:16px;font-weight:700;text-align:center;width:100%;margin-bottom:8px;transition:.2s;color:var(--dark)}
.quiz-opt:hover{border-color:var(--green)}
.quiz-correct{background:#dcfce7;border-color:var(--green-light);color:#065f46}
.quiz-wrong{background:#fee2e2;border-color:var(--red);color:#991b1b}
/* COMBINE SECTION */
.combine-box{display:flex;align-items:center;justify-content:center;gap:16px;margin:16px 0;flex-wrap:wrap}
.comb-slot{width:60px;height:60px;border:2px dashed #d1fae5;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900;color:var(--green);background:#fff;transition:.2s}
.comb-slot.filled{border-color:var(--green);background:var(--green-pale)}
.comb-result{width:72px;height:72px;border-radius:14px;background:linear-gradient(135deg,var(--green),#047857);display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:900;color:#fff;box-shadow:0 4px 16px rgba(5,150,105,.3)}
.pick-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:8px}
.pick-btn{background:#fff;border:1px solid #d1fae5;border-radius:8px;padding:8px 12px;font-size:18px;font-weight:800;color:var(--dark);min-width:44px;min-height:44px;transition:.2s}
.pick-btn:hover{border-color:var(--green);background:var(--green-pale)}
.pick-btn.selected{background:var(--green);color:#fff;border-color:var(--green)}
/* PROGRESS */
.prog-bar{background:#d1fae5;border-radius:8px;height:6px;overflow:hidden;margin-bottom:14px}
.prog-fill{background:linear-gradient(90deg,var(--green-light),var(--green));height:100%;border-radius:8px;transition:width .5s}
/* BADGE */
.badge{display:inline-flex;align-items:center;gap:4px;background:var(--green-pale);border:1px solid #a7f3d0;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;color:var(--green)}
/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:7px 14px;border-radius:20px;background:#d1fae5;color:#047857;font-size:12px;font-weight:700;transition:.2s}
.tab.active{background:var(--green);color:#fff}
/* AI CHAT */
.ai-msgbox{background:#fff;border-radius:12px;border:1px solid #d1fae5;min-height:180px;max-height:360px;overflow-y:auto;padding:12px;margin-bottom:10px;display:flex;flex-direction:column;gap:8px}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ===== TTS =====
const TTS={
  speak(text,lang='ko-KR',rate=0.8){
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang=lang;u.rate=rate;u.pitch=1;
    const v=window.speechSynthesis.getVoices();
    const kv=v.find(x=>x.lang.startsWith('ko'))||v[0];
    if(kv)u.voice=kv;
    window.speechSynthesis.speak(u);
  },
  init(){if(window.speechSynthesis)window.speechSynthesis.getVoices();}
};
window.addEventListener('load',()=>{TTS.init();setTimeout(TTS.init,500);});

// ===== DATA =====
const CONSONANTS=[
  {char:'ㄱ',rom:'g/k',eng:'g as in go',word:'가방',wordEng:'bag',word2:'국',word2Eng:'soup'},
  {char:'ㄴ',rom:'n',eng:'n as in no',word:'나무',wordEng:'tree',word2:'눈',word2Eng:'eye/snow'},
  {char:'ㄷ',rom:'d/t',eng:'d as in do',word:'다리',wordEng:'leg/bridge',word2:'돈',word2Eng:'money'},
  {char:'ㄹ',rom:'r/l',eng:'r/l (between)',word:'라면',wordEng:'ramen',word2:'물',word2Eng:'water'},
  {char:'ㅁ',rom:'m',eng:'m as in mom',word:'마음',wordEng:'heart/mind',word2:'밥',word2Eng:'rice'},
  {char:'ㅂ',rom:'b/p',eng:'b as in boy',word:'바다',wordEng:'sea/ocean',word2:'밥',word2Eng:'rice'},
  {char:'ㅅ',rom:'s',eng:'s as in sun',word:'사람',wordEng:'person',word2:'손',word2Eng:'hand'},
  {char:'ㅇ',rom:'ng/silent',eng:'silent at start',word:'아버지',wordEng:'father',word2:'영어',word2Eng:'English'},
  {char:'ㅈ',rom:'j',eng:'j as in jump',word:'자동차',wordEng:'car',word2:'집',word2Eng:'house'},
  {char:'ㅊ',rom:'ch',eng:'ch as in chair',word:'차',wordEng:'car/tea',word2:'책',word2Eng:'book'},
  {char:'ㅋ',rom:'k',eng:'k (aspirated)',word:'카드',wordEng:'card',word2:'코',word2Eng:'nose'},
  {char:'ㅌ',rom:'t',eng:'t (aspirated)',word:'타다',wordEng:'to ride',word2:'토마토',word2Eng:'tomato'},
  {char:'ㅍ',rom:'p',eng:'p (aspirated)',word:'파란색',wordEng:'blue color',word2:'팔',word2Eng:'arm/eight'},
  {char:'ㅎ',rom:'h',eng:'h as in hat',word:'하늘',wordEng:'sky',word2:'한국',word2Eng:'Korea'},
];

const VOWELS=[
  {char:'ㅏ',rom:'a',eng:'a as in father',word:'아버지',wordEng:'father'},
  {char:'ㅑ',rom:'ya',eng:'ya as in yard',word:'야구',wordEng:'baseball'},
  {char:'ㅓ',rom:'eo',eng:'uh (open mouth)',word:'어머니',wordEng:'mother'},
  {char:'ㅕ',rom:'yeo',eng:'yuh',word:'여기',wordEng:'here'},
  {char:'ㅗ',rom:'o',eng:'o as in go',word:'오다',wordEng:'to come'},
  {char:'ㅛ',rom:'yo',eng:'yo as in yoga',word:'요리',wordEng:'cooking'},
  {char:'ㅜ',rom:'u',eng:'oo as in food',word:'우리',wordEng:'we/us'},
  {char:'ㅠ',rom:'yu',eng:'you',word:'유리',wordEng:'glass'},
  {char:'ㅡ',rom:'eu',eng:'eu (no lips round)',word:'으르렁',wordEng:'growl'},
  {char:'ㅣ',rom:'i',eng:'ee as in see',word:'이름',wordEng:'name'},
];

const COMBINE_PAIRS=[
  {con:'ㄱ',vow:'ㅏ',result:'가',eng:'ga'},
  {con:'ㄴ',vow:'ㅏ',result:'나',eng:'na'},
  {con:'ㅁ',vow:'ㅏ',result:'마',eng:'ma'},
  {con:'ㅂ',vow:'ㅏ',result:'바',eng:'ba'},
  {con:'ㅅ',vow:'ㅏ',result:'사',eng:'sa'},
  {con:'ㄱ',vow:'ㅣ',result:'기',eng:'gi'},
  {con:'ㄴ',vow:'ㅣ',result:'니',eng:'ni'},
  {con:'ㅎ',vow:'ㅏ',result:'하',eng:'ha'},
  {con:'ㅇ',vow:'ㅏ',result:'아',eng:'a'},
  {con:'ㄷ',vow:'ㅗ',result:'도',eng:'do'},
];

const QUIZ_QUESTIONS=[
  {q:'다음 중 모음은?',opts:['ㄱ','ㅏ','ㄴ','ㄷ'],ans:1,hint:'모음은 소리를 낼 때 입이 열려요.'},
  {q:'ㄱ의 로마자 표기는?',opts:['n','m','g/k','h'],ans:2,hint:'g as in "go"'},
  {q:'"ㅏ"의 발음은?',opts:['i','a','u','o'],ans:1,hint:'아버지의 첫 소리'},
  {q:'다음 중 자음은?',opts:['ㅏ','ㅣ','ㅂ','ㅗ'],ans:2,hint:'자음은 입이나 혀로 소리를 막아요.'},
  {q:'"ㅎ"이 들어간 단어는?',opts:['바다','나무','하늘','기차'],ans:2,hint:'sky in Korean'},
  {q:'자음 14개 중 첫 번째는?',opts:['ㄴ','ㄱ','ㄷ','ㄹ'],ans:1,hint:'알파벳 순서 생각해보세요'},
  {q:'"ㅜ"의 발음은?',opts:['ya','eu','oo','i'],ans:2,hint:'우리의 첫 소리'},
  {q:'"사람"에서 첫 자음은?',opts:['ㅅ','ㅏ','ㄹ','ㅁ'],ans:0,hint:'s as in sun'},
];

// ===== STATE =====
let STATE={
  page:'home',
  menuOpen:false,
  selCon:null, selVow:null,
  combIdx:0,
  qIdx:0, qSel:null, qScore:0, qDone:false,
  detailType:null, detailIdx:null, // 'con' or 'vow'
  tab:'con', // con / vow
};

function setState(u){STATE={...STATE,...u};render();}

// ===== AI 에이전트 (KIIP 0급 특화) =====
var AI_QUICK_BTNS=[
  {emoji:'🔤',label:'자음 설명해줘',
   q:'KIIP 0급 학습자입니다. 한글 자음 14개를 쉽게 설명해주세요. 각 자음의 발음과 영어 예시를 알려주세요. 초보자도 이해할 수 있게 간단하게 알려주세요.'},
  {emoji:'🅰️',label:'모음 설명해줘',
   q:'한글 모음 10개 (ㅏ ㅑ ㅓ ㅕ ㅗ ㅛ ㅜ ㅠ ㅡ ㅣ)를 쉽게 설명해주세요. 각 모음의 발음 방법과 영어 비교를 알려주세요.'},
  {emoji:'🔗',label:'음절 만드는 법',
   q:'한글 음절이 어떻게 만들어지는지 알려주세요. 자음 + 모음이 어떻게 합쳐지는지 예를 들어 설명해주세요. 예: ㄱ+ㅏ=가'},
  {emoji:'🗣️',label:'발음 어떻게 해요?',
   q:'한글 초보자입니다. "ㄹ" 발음이 영어의 r과 l 중 어느 것에 더 가까운지, 그리고 "ㅓ"와 "ㅡ" 발음의 차이를 설명해주세요.'},
  {emoji:'✏️',label:'퀴즈 틀렸어요',
   q:'KIIP 0급 자음·모음 퀴즈에서 틀렸습니다. 자음과 모음의 차이를 다시 설명해주시고, 구별하는 쉬운 방법을 알려주세요.'},
  {emoji:'🌍',label:'내 나라 언어와 비교',
   q:'한글과 베트남어/영어/네팔어를 비교해주세요. 비슷한 발음이 있는지, 어떤 점이 어려운지 알려주세요. 한글만의 특징을 설명해주세요.'},
];

var AICHAT={
  msgs:[],loading:false,
  addMsg(role,text){
    this.msgs.push({role,text,time:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})});
    render();
    setTimeout(()=>{const b=document.querySelector('.ai-msgbox');if(b)b.scrollTop=b.scrollHeight;},50);
  },
  quickSend(idx){
    const b=AI_QUICK_BTNS[idx];
    if(!b||this.loading)return;
    this.send(b.q,b.label);
  },
  send:async function(text,label){
    if(this.loading)return;
    text=text||(document.getElementById('ai-input')||{}).value||'';
    text=text.trim();
    if(!text)return;
    if(document.getElementById('ai-input'))document.getElementById('ai-input').value='';
    this.loading=true;
    this.addMsg('user',label||text);
    try{
      const sysP='You are a Korean language tutor for complete beginners learning Hangul (Korean alphabet). Students are at KIIP Level 0 — they cannot read Korean yet. Always: 1) Keep answers SHORT and SIMPLE 2) Include romanization (pronunciation guide) 3) Give English translations 4) Use encouragement. Focus on consonants, vowels, and syllable formation.';
      const url='/api/chat';
      const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'system',content:sysP},{role:'user',content:text}]})});
      const data=await res.json();
      const reply=data.choices[0].message.content;
      this.loading=false;
      this.addMsg('assistant',reply);
    }catch(e){
      this.loading=false;
      this.addMsg('assistant','⚠️ 연결 오류. 다시 시도해주세요.\nConnection error. Please try again.');
    }
  }
};

// ===== RENDER =====
function render(){
  document.getElementById('app').innerHTML=
    renderNav()+renderPage()+renderBottomNav();
}

function renderNav(){
  const items=[
    {id:'home',l:'홈',i:'🏠'},{id:'consonant',l:'자음',i:'🔤'},
    {id:'vowel',l:'모음',i:'🅰️'},{id:'combine',l:'음절',i:'🔗'},
    {id:'quiz',l:'퀴즈',i:'🎯'},{id:'ai',l:'AI실습',i:'🤖'},
  ];
  let menu='';
  if(STATE.menuOpen){
    menu='<div class="menu">'+items.map(it=>
      `<button class="${STATE.page===it.id?'active':''}" onclick="setState({page:'${it.id}',menuOpen:false})">${it.i} ${it.l}</button>`
    ).join('')+'</div>';
  }
  return `<div class="nav">
    <div style="display:flex;align-items:center;gap:8px">
      <a href="KIIP_Level0_Index.html" style="color:rgba(255,255,255,.7);text-decoration:none;font-size:18px;padding:4px">←</a>
      <div><div class="nav-title">KIIP 0급 1과 · 자음과 모음</div><div class="nav-sub">글로컬 아카데미 · Glocal Academy</div></div>
    </div>
    <button class="nav-btn" onclick="setState({menuOpen:!STATE.menuOpen})">${STATE.menuOpen?'✕':'☰'}</button>
  </div>${menu}`;
}

function renderBottomNav(){
  const items=[
    {id:'home',i:'🏠',l:'홈'},{id:'consonant',i:'🔤',l:'자음'},
    {id:'vowel',i:'🅰️',l:'모음'},{id:'combine',i:'🔗',l:'음절'},
    {id:'quiz',i:'🎯',l:'퀴즈'},{id:'ai',i:'🤖',l:'AI'},
  ];
  return `<div class="bottom-nav">${items.map(it=>
    `<button class="${STATE.page===it.id?'active':''}" onclick="setState({page:'${it.id}',menuOpen:false})">
      <span class="icon">${it.i}</span><span>${it.l}</span>
    </button>`
  ).join('')}</div>`;
}

function renderPage(){
  const pages={
    home:renderHome, consonant:renderConsonant,
    vowel:renderVowel, combine:renderCombine,
    quiz:renderQuiz, ai:renderAI,
  };
  return `<div class="page">${(pages[STATE.page]||renderHome)()}</div>`;
}

// ── HOME ──────────────────────────────────────────────────────────
function renderHome(){
  return `
  <div style="text-align:center;padding:10px 0 20px">
    <div style="font-size:56px;margin-bottom:10px">🌱</div>
    <h2 style="color:var(--green);font-size:22px;margin-bottom:4px">0급 1과 · 자음과 모음</h2>
    <div style="font-size:13px;color:#6b7280;margin-bottom:16px">Consonants & Vowels · Lesson 1 of 8</div>
    <div class="prog-bar"><div class="prog-fill" style="width:12%"></div></div>
    <div style="font-size:11px;color:#6b7280;margin-bottom:20px">전체 진도 12% · Overall Progress</div>
  </div>

  <div class="card card-green" style="background:linear-gradient(135deg,var(--green),#047857);border:none;color:#fff;margin-bottom:16px">
    <div style="font-size:15px;font-weight:800;margin-bottom:8px">📌 오늘 배울 내용</div>
    <div style="font-size:13px;opacity:.9;line-height:1.8">
      ✅ 자음 14개 (Consonants) — ㄱ ㄴ ㄷ ㄹ ㅁ ㅂ ㅅ ㅇ ㅈ ㅊ ㅋ ㅌ ㅍ ㅎ<br>
      ✅ 모음 10개 (Vowels) — ㅏ ㅑ ㅓ ㅕ ㅗ ㅛ ㅜ ㅠ ㅡ ㅣ<br>

    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
    <button onclick="setState({page:'consonant'})" style="background:#fff;border:2px solid #a7f3d0;border-radius:14px;padding:18px 10px;text-align:center;transition:.2s" onmouseover="this.style.borderColor='var(--green)'" onmouseout="this.style.borderColor='#a7f3d0'">
      <div style="font-size:32px;margin-bottom:6px">🔤</div>
      <div style="font-size:14px;font-weight:800;color:var(--green)">자음</div>
      <div style="font-size:11px;color:#6b7280">Consonants · 14개</div>
    </button>

// ── CONSONANT ─────────────────────────────────────────────────────
function renderConsonant(){
  const sel=STATE.detailIdx!==null&&STATE.detailType==='con'?CONSONANTS[STATE.detailIdx]:null;
  return `
  <h2>🔤 자음 (Consonants)</h2>
  <p class="sub">한글 기본 자음 14개 · Tap each to hear & learn</p>

  <div class="hg-grid">
    ${CONSONANTS.map((c,i)=>`
      <div class="hg-cell ${STATE.detailType==='con'&&STATE.detailIdx===i?'active':''}"
        onclick="TTS.speak('${c.char}');setState({detailType:'con',detailIdx:${i}})">
        <div class="char">${c.char}</div>
        <div class="rom">${c.rom}</div>
      </div>`).join('')}
  </div>

  ${sel?`
  <div class="detail-card">
    <div class="detail-char">${sel.char}</div>
    <div class="detail-rom">[${sel.rom}]</div>
    <div class="detail-eng">${sel.eng}</div>
    <button class="tts-big-btn" onclick="TTS.speak('${sel.char}')">🔊 듣기</button>
    <button class="tts-big-btn" onclick="TTS.speak('${sel.word}')">🔊 예시</button>
  </div>
  <div style="font-weight:700;color:var(--green);margin-bottom:8px;font-size:13px">📝 예시 단어 · Example Words</div>
  <div class="ex-grid">
    <div class="ex-word" onclick="TTS.speak('${sel.word}')">
      <div class="kor">${sel.word}</div>
      <div class="eng">${sel.wordEng}</div>
      <div class="pos">🔊 tap</div>
    </div>
    <div class="ex-word" onclick="TTS.speak('${sel.word2}')">
      <div class="kor">${sel.word2}</div>
      <div class="eng">${sel.word2Eng}</div>
      <div class="pos">🔊 tap</div>
    </div>
  </div>`
  :`<div class="card" style="text-align:center;color:#6b7280;padding:20px">
    <div style="font-size:24px;margin-bottom:8px">👆</div>
    <div style="font-size:13px">자음을 클릭하면 발음과 예시 단어가 나와요<br>Tap a consonant to see details</div>
  </div>`}

  <div class="card card-green" style="margin-top:10px">
    <div style="font-size:13px;color:#047857;line-height:1.8">
      💡 <strong>자음 = Consonants</strong><br>
      소리를 낼 때 입, 혀, 또는 목이 막혀요.<br>
      <span style="font-size:12px;color:#6b7280">When making consonant sounds, your mouth, tongue, or throat is blocked.</span>
    </div>
  </div>`;
}

// ── VOWEL ─────────────────────────────────────────────────────────

  const sel=STATE.detailIdx!==null&&STATE.detailType==='vow'?VOWELS[STATE.detailIdx]:null;

  <p class="sub">한글 기본 모음 10개 · Tap each to hear & learn</p>

  <div class="hg-grid" style="grid-template-columns:repeat(5,1fr)">
    ${VOWELS.map((v,i)=>`

        onclick="TTS.speak('${v.char}');setState({detailType:'vow',detailIdx:${i}})">

  ${sel?`
  <div class="detail-card">
    <div class="detail-char">${sel.char}</div>
    <div class="detail-rom">[${sel.rom}]</div>
    <div class="detail-eng">${sel.eng}</div>
    <button class="tts-big-btn" onclick="TTS.speak('${sel.char}')">🔊 듣기</button>
    <button class="tts-big-btn" onclick="TTS.speak('${sel.word}')">🔊 예시</button>
  </div>
  <div class="ex-grid">
    <div class="ex-word" onclick="TTS.speak('${sel.word}')">
      <div class="kor">${sel.word}</div>
      <div class="eng">${sel.wordEng}</div>
      <div class="pos">🔊 tap</div>

  :`<div class="card" style="text-align:center;color:#6b7280;padding:20px">
    <div style="font-size:24px;margin-bottom:8px">👆</div>
    <div style="font-size:13px">모음을 클릭하면 발음과 예시 단어가 나와요<br>Tap a vowel to see details</div>

    <div style="font-size:13px;color:#047857;line-height:1.8">
      💡 <strong>모음 = Vowels</strong><br>
      소리를 낼 때 입이 열려요. 혼자서도 소리가 나요.<br>
      <span style="font-size:12px;color:#6b7280">Vowels are open sounds. They can stand alone (with ㅇ).</span><br>
      예: ㅇ+ㅏ = 아 (a), ㅇ+ㅣ = 이 (i)
    </div>
  </div>`;

// ── COMBINE ──────────────────────────────────────────────────────
function renderCombine(){
  const pair=COMBINE_PAIRS[STATE.combIdx];
  return `
  <h2>🔗 음절 만들기</h2>
  <p class="sub">자음 + 모음 = 글자 · Consonant + Vowel = Syllable</p>

  <div class="card" style="background:linear-gradient(135deg,#ecfdf5,#d1fae5);border:none;text-align:center;padding:20px;margin-bottom:16px">
    <div style="font-size:13px;color:#047857;font-weight:700;margin-bottom:14px">
      ${STATE.combIdx+1} / ${COMBINE_PAIRS.length}
    </div>
    <div class="combine-box">
      <div>
        <div class="comb-slot filled" style="font-size:36px">${pair.con}</div>
        <div style="font-size:11px;color:#6b7280;margin-top:4px">자음</div>
      </div>
      <div style="font-size:28px;color:#9ca3af">+</div>
      <div>
        <div class="comb-slot filled" style="font-size:36px">${pair.vow}</div>
        <div style="font-size:11px;color:#6b7280;margin-top:4px">모음</div>
      </div>
      <div style="font-size:28px;color:#9ca3af">=</div>
      <div>
        <div class="comb-result" onclick="TTS.speak('${pair.result}')">${pair.result}</div>
        <div style="font-size:11px;color:#6b7280;margin-top:4px">[${pair.eng}]</div>
      </div>
    </div>
    <button onclick="TTS.speak('${pair.result}')" style="background:var(--green);color:#fff;padding:10px 28px;border-radius:20px;font-size:14px;font-weight:700;margin-top:8px">
      🔊 ${pair.result} 듣기
    </button>
  </div>

  <div style="display:flex;gap:10px;margin-bottom:16px">
    <button onclick="setState({combIdx:Math.max(0,STATE.combIdx-1)})"
      style="flex:1;padding:12px;border-radius:10px;background:#fff;border:2px solid #d1fae5;color:var(--green);font-size:14px;font-weight:700">
      ← 이전
    </button>
    <button onclick="setState({combIdx:Math.min(${COMBINE_PAIRS.length-1},STATE.combIdx+1)})"
      style="flex:1;padding:12px;border-radius:10px;background:var(--green);color:#fff;font-size:14px;font-weight:700">
      다음 →
    </button>
  </div>

  <div class="card card-green">
    <div style="font-weight:700;color:var(--green);margin-bottom:10px;font-size:13px">📋 전체 조합표 · All Combinations</div>
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px">
      ${COMBINE_PAIRS.map((p,i)=>`
        <div onclick="TTS.speak('${p.result}');setState({combIdx:${i}})"
          style="background:${STATE.combIdx===i?'var(--green)':'#fff'};color:${STATE.combIdx===i?'#fff':'var(--dark)'};border:1px solid ${STATE.combIdx===i?'var(--green)':'#d1fae5'};border-radius:8px;padding:8px;text-align:center;cursor:pointer;transition:.2s">
          <div style="font-size:20px;font-weight:900">${p.result}</div>
          <div style="font-size:9px;opacity:.7">${p.eng}</div>
        </div>`).join('')}
    </div>
  </div>`;
}

// ── QUIZ ─────────────────────────────────────────────────────────
function renderQuiz(){
  if(STATE.qDone){
    const pct=Math.round(STATE.qScore/QUIZ_QUESTIONS.length*100);
    return `
    <div style="text-align:center;padding:30px 0">
      <div style="font-size:60px;margin-bottom:12px">${pct>=80?'🏆':pct>=60?'😊':'📖'}</div>
      <h2 style="color:var(--green);margin-bottom:8px">퀴즈 완료!</h2>
      <div style="font-size:32px;font-weight:900;color:var(--green);margin-bottom:4px">${STATE.qScore}/${QUIZ_QUESTIONS.length}</div>
      <div style="font-size:14px;color:#6b7280;margin-bottom:20px">${pct}% 정답 · ${pct>=80?'훌륭해요! Excellent!':pct>=60?'잘했어요! Good job!':'다시 도전해요! Try again!'}</div>
      <button onclick="setState({qIdx:0,qSel:null,qScore:0,qDone:false})"
        style="background:var(--green);color:#fff;padding:13px 32px;border-radius:10px;font-size:14px;font-weight:700">
        🔄 다시 풀기 / Retry
      </button>
      <div style="margin-top:14px">
        <button onclick="setState({page:'ai'})"
          style="background:transparent;border:1.5px solid var(--green);color:var(--green);padding:10px 24px;border-radius:10px;font-size:13px;font-weight:700">
          🤖 AI에게 질문하기
        </button>
      </div>
    </div>`;
  }
  const q=QUIZ_QUESTIONS[STATE.qIdx];
  return `
  <h2>🎯 퀴즈</h2>
  <p class="sub">${STATE.qIdx+1} / ${QUIZ_QUESTIONS.length} · Score: ${STATE.qScore}</p>
  <div class="prog-bar"><div class="prog-fill" style="width:${(STATE.qIdx/QUIZ_QUESTIONS.length)*100}%"></div></div>

  <div class="card" style="text-align:center;padding:24px;margin:14px 0;background:var(--green-pale)">
    <div style="font-size:18px;font-weight:800;color:var(--dark)">${q.q}</div>
  </div>

  ${q.opts.map((opt,i)=>{
    let cls='quiz-opt';
    if(STATE.qSel!==null){
      if(i===q.ans)cls+=' quiz-correct';
      else if(i===STATE.qSel&&STATE.qSel!==q.ans)cls+=' quiz-wrong';
    }
    return `<button class="${cls}" onclick="${STATE.qSel===null?`setState({qSel:${i},qScore:STATE.qScore+(${i}===QUIZ_QUESTIONS[STATE.qIdx].ans?1:0)})`:''}">
      ${opt}
    </button>`;
  }).join('')}

  ${STATE.qSel!==null?`
  <div class="card" style="background:${STATE.qSel===q.ans?'#dcfce7':'#fef3c7'};border-color:${STATE.qSel===q.ans?'#86efac':'#fde68a'};margin-top:6px">
    <div style="font-size:13px;color:#1a2340">💡 ${q.hint}</div>
  </div>
  <button onclick="setState(${STATE.qIdx<QUIZ_QUESTIONS.length-1?`{qIdx:STATE.qIdx+1,qSel:null}`:`{qDone:true}`})"
    style="width:100%;padding:13px;border-radius:10px;background:var(--green);color:#fff;font-size:14px;font-weight:700;margin-top:8px">
    ${STATE.qIdx<QUIZ_QUESTIONS.length-1?'다음 문제 →':'결과 보기 🏆'}
  </button>`:''}`;
}

function renderAI(){

        </div>`).join('')}
    ${AICHAT.loading?`<div style="align-self:flex-start;background:#f0fdf4;border-radius:14px 14px 14px 4px;padding:10px 14px;font-size:13px;color:var(--green)">⏳ 답변 생성 중... / Generating...</div>`:''}
  </div>

  <div style="display:flex;gap:8px">
    <input id="ai-input" type="text" placeholder="한글에 대해 질문하세요 / Ask about Hangul..."

      onfocus="this.style.borderColor='var(--green)'" onblur="this.style.borderColor='#d1fae5'"
      onkeydown="if(event.key==='Enter'){AICHAT.send();}">
    <button onclick="AICHAT.send()"
      style="background:var(--green);color:#fff;border-radius:10px;padding:0 18px;font-size:20px;min-width:52px;border:none;cursor:pointer">
      ➤
    </button>
  </div>
  <p style="font-size:11px;color:#9ca3af;text-align:center;margin-top:8px">🤖 Powered by Pollinations AI · 무료 · Free forever<br>© 글로컬 아카데미 · elimg.com</p>`;
}
