<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1F3C"/>
      <stop offset="60%" style="stop-color:#1B3A6B"/>
      <stop offset="100%" style="stop-color:#0D1F3C"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C49A22"/>
      <stop offset="100%" style="stop-color:#E8C05A"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="50%" r="45%">
      <stop offset="0%" style="stop-color:rgba(196,154,34,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#C49A22" stroke-width="1">
    <line x1="0" y1="63" x2="1200" y2="63"/><line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="189" x2="1200" y2="189"/><line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="441" x2="1200" y2="441"/><line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="0" y1="567" x2="1200" y2="567"/>
    <line x1="100" y1="0" x2="100" y2="630"/><line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/><line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
  </g>
  <!-- Left accent bar -->
  <rect x="72" y="120" width="4" height="390" fill="url(#gold)" rx="2"/>
  <!-- Badge -->
  <rect x="96" y="110" width="220" height="32" rx="16" fill="rgba(196,154,34,0.15)" stroke="rgba(196,154,34,0.4)" stroke-width="1"/>
  <text x="206" y="131" font-family="sans-serif" font-size="13" font-weight="700" fill="#E8C05A" text-anchor="middle" letter-spacing="2">GLOCAL BRIDGE AI</text>
  <!-- Main headline -->
  <text x="96" y="210" font-family="Georgia, serif" font-size="58" font-weight="700" fill="white">Your Glocal Business</text>
  <text x="96" y="280" font-family="Georgia, serif" font-size="58" font-style="italic" fill="#E8C05A">Starts Here</text>
  <!-- Subtitle -->
  <text x="96" y="330" font-family="sans-serif" font-size="20" fill="rgba(255,255,255,0.65)">로컬의 강점으로 세계와 연결되는 당신의 비즈니스</text>
  <!-- Stats row -->
  <g transform="translate(96, 390)">
    <rect width="140" height="80" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(196,154,34,0.2)" stroke-width="1"/>
    <text x="70" y="35" font-family="Georgia, serif" font-size="30" font-weight="700" fill="#E8C05A" text-anchor="middle">30+</text>
    <text x="70" y="58" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle">년 현장 경험</text>
    <rect x="158" width="140" height="80" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(196,154,34,0.2)" stroke-width="1"/>
    <text x="228" y="35" font-family="Georgia, serif" font-size="30" font-weight="700" fill="#E8C05A" text-anchor="middle">18</text>
    <text x="228" y="58" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle">개국 네트워크</text>
    <rect x="316" width="140" height="80" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(196,154,34,0.2)" stroke-width="1"/>
    <text x="386" y="35" font-family="Georgia, serif" font-size="30" font-weight="700" fill="#E8C05A" text-anchor="middle">105</text>
    <text x="386" y="58" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle">사이트 구축</text>
  </g>
  <!-- Right side photo frame -->
  <rect x="780" y="80" width="340" height="470" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(196,154,34,0.25)" stroke-width="1.5"/>
  <text x="950" y="295" font-family="sans-serif" font-size="80" text-anchor="middle" fill="rgba(255,255,255,0.08)">✦</text>
  <text x="950" y="360" font-family="Georgia, serif" font-size="22" font-weight="700" fill="rgba(255,255,255,0.4)" text-anchor="middle">한진준</text>
  <text x="950" y="385" font-family="sans-serif" font-size="14" fill="rgba(196,154,34,0.5)" text-anchor="middle">GlocalBridge AI 대표</text>
  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(196,154,34,0.08)"/>
  <rect x="0" y="598" width="1200" height="2" fill="url(#gold)"/>
  <text x="96" y="619" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.35)">elimg.com</text>
  <text x="1104" y="619" font-family="sans-serif" font-size="13" fill="rgba(196,154,34,0.6)" text-anchor="end">AI · Mission · Glocal</text>
</svg>
