<script>
// ===== TTS ENGINE =====
const TTS = {
  speak(text, lang='ko-KR', rate=0.8) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang; u.rate = rate; u.pitch = 1;
    const voices = window.speechSynthesis.getVoices();
    const koVoice = voices.find(v => v.lang.startsWith('ko')) || voices.find(v => v.lang.includes('ko'));
    if (koVoice) u.voice = koVoice;
    window.speechSynthesis.speak(u);
  },
  init() { if (window.speechSynthesis) window.speechSynthesis.getVoices(); }
};
window.addEventListener('load', () => { TTS.init(); setTimeout(TTS.init, 500); });

function ttsBtn(text) {
  return `<button class="tts-btn" onclick="event.stopPropagation();TTS.speak('${text.replace(/'/g,"\\'")}')" title="발음 듣기">🔊</button>`;
}

// ===== DATA =====
const VOCAB_VOWELS = [
  {kor:"ㅏ",pron:"a",eng:"like 'a' in 'father'"},
  {kor:"ㅓ",pron:"eo",eng:"like 'u' in 'fun'"},
  {kor:"ㅗ",pron:"o",eng:"like 'o' in 'go'"},
  {kor:"ㅜ",pron:"u",eng:"like 'oo' in 'food'"},
  {kor:"ㅡ",pron:"eu",eng:"like 'u' in 'rude' (no lip rounding)"},
  {kor:"ㅣ",pron:"i",eng:"like 'ee' in 'see'"},
  {kor:"ㅐ",pron:"ae",eng:"like 'e' in 'bed'"},
  {kor:"ㅔ",pron:"e",eng:"like 'e' in 'bed'"},
  {kor:"ㅑ",pron:"ya",eng:"like 'ya' in 'yard'"},
  {kor:"ㅕ",pron:"yeo",eng:"like 'yo' in 'yonder'"},
  {kor:"ㅛ",pron:"yo",eng:"like 'yo'"},
  {kor:"ㅠ",pron:"yu",eng:"like 'you'"},
];

const VOWEL_PRINCIPLES = [
  {symbol:"·",name:"하늘 Heaven",desc:"둥근 점 · 하늘을 상징해요",eng:"Round dot · Symbolizes heaven/sky"},
  {symbol:"ㅡ",name:"땅 Earth",desc:"평평한 선 · 땅을 상징해요",eng:"Flat line · Symbolizes earth/ground"},
  {symbol:"ㅣ",name:"사람 Human",desc:"수직선 · 서 있는 사람을 상징해요",eng:"Vertical line · Symbolizes a standing person"},
];

const SAFETY_VOWELS = [
  {kor:"위험",pron:"wi-heom",eng:"DANGER",note:"ㅣ+ㅓ 포함"},
  {kor:"주의",pron:"ju-ui",eng:"CAUTION",note:"ㅜ+ㅡ+ㅣ 포함"},
  {kor:"금지",pron:"geum-ji",eng:"PROHIBITED",note:"ㅡ+ㅣ 포함"},
  {kor:"비상구",pron:"bi-sang-gu",eng:"EMERGENCY EXIT",note:"ㅣ+ㅏ+ㅜ 포함"},
  {kor:"대피",pron:"dae-pi",eng:"EVACUATE",note:"ㅐ+ㅣ 포함"},
  {kor:"착용",pron:"chag-yong",eng:"WEAR/PUT ON",note:"ㅏ+ㅛ 포함"},
];

const QUIZ = [
  {q:"ㅏ의 발음은?",o:["a (father)","eo (fun)","o (go)","u (food)"],a:0},
  {q:"ㅜ의 발음은?",o:["a","eo","o","u (food)"],a:3},
  {q:"한글 모음의 기본 원리 중 '하늘'을 상징하는 것은?",o:["ㅡ","ㅣ","·(점)","ㅏ"],a:2},
  {q:"'위험'에서 찾을 수 없는 모음은?",o:["ㅣ","ㅓ","ㅏ","ㅔ"],a:3},
  {q:"'ya'로 발음되는 모음은?",o:["ㅑ","ㅕ","ㅛ","ㅠ"],a:0},
  {q:"세종대왕이 한글을 만든 해는?",o:["1443년","1543년","1343년","1643년"],a:0},
  {q:"ㅡ는 무엇을 상징해요?",o:["하늘","땅","사람","바람"],a:1},
  {q:"현재 한글에서 사용하는 모음의 개수는?",o:["6개","8개","10개","14개"],a:2},
];

const CULTURE = [
  {icon:"👑",t:"세종대왕 King Sejong",eng:"King Sejong the Great",d:"조선 4대 왕(재위 1418-1450). 1443년 훈민정음을 창제해 백성들이 쉽게 글을 읽고 쓸 수 있게 했습니다.",de:"4th king of Joseon (r.1418-1450). Created Hunminjeongeum in 1443 so people could easily read and write."},
  {icon:"📅",t:"한글날 Hangul Day",eng:"October 9th",d:"매년 10월 9일은 한글날입니다. 한글 창제를 기념하는 국경일로, 법정 공휴일입니다.",de:"October 9th every year is Hangul Day. A national holiday commemorating the creation of Hangul."},
  {icon:"🌍",t:"유네스코 인정",eng:"UNESCO Recognition",d:"한글은 세계에서 가장 과학적인 문자 중 하나로 인정받습니다. 유네스코 세종대왕 문해상도 있습니다.",de:"Hangul is recognized as one of the most scientific writing systems. UNESCO also has a King Sejong Literacy Prize."},
  {icon:"⚡",t:"빠른 학습",eng:"Quick to Learn",d:"한글은 과학적으로 설계되어 보통 성인이 하루~일주일 만에 읽는 법을 배울 수 있습니다.",de:"Hangul is scientifically designed — most adults can learn to read it in a day to a week."},
];

// ===== APP STATE =====
let state = {
  page: 'vowels',
  menuOpen: false,
  vowelSelected: null,
  qIdx: 0, qSel: null, qScore: 0, qDone: false,
};

function setState(updates) {
  Object.assign(state, updates);
  render();
}

// ===== RENDER ENGINE =====
function render() {
  const app = document.getElementById('app');
  app.innerHTML = renderNav() + renderPage() + renderBottomNav();
}

function renderNav() {
  let menu = '';
  if (state.menuOpen) {
    const items = [
      {id:'vowels',l:'모음표',i:'🔤'},{id:'principles',l:'원리',i:'🌐'},
      {id:'shipyard',l:'조선소',i:'⚓'},{id:'quiz',l:'퀴즈',i:'🎯'},{id:'culture',l:'문화',i:'🏛️'},
      {id:'ai',l:'AI 선생님',i:'🤖'},
    ];
    menu = '<div class="menu">' + items.map(it =>
      `<button class="${state.page===it.id?'active':''}" onclick="setState({page:'${it.id}',menuOpen:false})">${it.i} ${it.l}</button>`
    ).join('') + '</div>';
  }
  return `<div class="nav">
    <a href="HanwhaOcean_Level0_Index.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;color:inherit" title="목차로 돌아가기">
      <span style="font-size:18px">📋</span>
      <div><div class="nav-title">0급 입문 1과 · 모음 기초</div><div class="nav-sub">Hello Hangul · 한화오션 한국어</div></div>
    </a>
    <button class="nav-btn" onclick="setState({menuOpen:!state.menuOpen})">${state.menuOpen?'✕':'☰'}</button>
  </div>${menu}`;
}

function renderBottomNav() {
  const items = [
    {id:'vowels',i:'🔤',l:'모음표'},
    {id:'principles',i:'🌐',l:'원리'},
    {id:'shipyard',i:'⚓',l:'조선소'},
    {id:'quiz',i:'🎯',l:'퀴즈'},
    {id:'culture',i:'🏛️',l:'문화'},
  ];
  return `<div class="bottom-nav">${items.map(it =>
    `<button class="${state.page===it.id?'active':''}" onclick="setState({page:'${it.id}',menuOpen:false})">
      <span class="icon">${it.i}</span><span>${it.l}</span></button>`
  ).join('')}</div>`;
}

function renderPage() {
  const pages = {
    vowels: renderVowels,
    principles: renderPrinciples,
    shipyard: renderShipyard,
    quiz: renderQuiz,
    culture: renderCulture,
    ai: renderAI,
  };
  return `<div class="page">${(pages[state.page]||renderVowels)()}</div>`;
}

function renderVowels() {
  return `
  <div style="background:linear-gradient(135deg,#14532d,#15803d);border-radius:16px;padding:16px;margin-bottom:14px;color:#fff;text-align:center">
    <div style="font-size:12px;opacity:.8;margin-bottom:4px">0급 입문 1과 · KIIP 0단계</div>
    <div style="font-size:22px;font-weight:800;margin-bottom:2px">한글 학습을 시작합니다!</div>
    <div style="font-size:13px;opacity:.85">Welcome to Hangul! · 모음(母音) 기초</div>
  </div>
  <div style="background:#f0fdf4;border:2px solid #15803d;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#14532d">
    💡 <b>이 내용은 초급1 1과와 연결됩니다</b> · This content connects to Level 1 Lesson 1
  </div>
  <h2>🔤 모음표 · Vowel Chart</h2>
  <p class="sub">한글의 기본 모음 12개 · 12 Basic Korean Vowels</p>
  <div class="grid3" style="margin-bottom:14px">
    ${VOCAB_VOWELS.map((v,i)=>`
    <div class="hangul-cell ${i===state.vowelSelected?'active':''}" onclick="setState({vowelSelected:${i===state.vowelSelected?'null':i}});TTS.speak('${v.pron}','en-US',0.7)">
      <div class="char" style="font-size:36px">${v.kor}</div>
      <div class="rom">[${v.pron}]</div>
      ${ttsBtn(v.pron)}
    </div>`).join('')}
  </div>
  ${state.vowelSelected !== null ? `
  <div class="card card-green" style="background:#f0fdf4;text-align:center">
    <div style="font-size:64px;font-weight:800;color:var(--navy);margin-bottom:8px">${VOCAB_VOWELS[state.vowelSelected].kor}</div>
    <div style="font-size:20px;color:var(--level0);font-weight:700;margin-bottom:4px">[${VOCAB_VOWELS[state.vowelSelected].pron}]</div>
    <div style="font-size:14px;color:#555">${VOCAB_VOWELS[state.vowelSelected].eng}</div>
    <button class="btn btn-primary" style="margin-top:12px;width:auto;padding:8px 24px" onclick="TTS.speak('${VOCAB_VOWELS[state.vowelSelected].pron}','en-US',0.7)">🔊 발음 듣기 Listen</button>
  </div>`:''}
  <div class="card card-accent" style="margin-top:8px">
    <div style="font-weight:700;color:var(--navy);margin-bottom:6px">📝 발음 가이드 Pronunciation Guide</div>
    <div style="font-size:13px;color:#333;line-height:1.8">
      • <b>ㅏ</b> = "아" — 입을 크게 벌려요. Open your mouth wide.<br>
      • <b>ㅓ</b> = "어" — 입을 조금 벌려요. Half-open mouth.<br>
      • <b>ㅗ</b> = "오" — 입술을 둥글게 모아요. Round your lips.<br>
      • <b>ㅜ</b> = "우" — 입술을 앞으로 내밀어요. Pucker lips forward.<br>
      • <b>ㅡ</b> = "으" — 입술을 평평하게 해요. Flat lips, no rounding.<br>
      • <b>ㅣ</b> = "이" — 입꼬리를 당겨요. Stretch corners of mouth.
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-top:12px">
    <a href="HanwhaOcean_Level0_Index.html" style="flex:1;padding:12px;border-radius:10px;background:#e5e7eb;color:#555;font-size:13px;font-weight:700;text-align:center;text-decoration:none">← 목차</a>
    <a href="HanwhaOcean_Level0_Lesson2.html" style="flex:1;padding:12px;border-radius:10px;background:var(--level0);color:#fff;font-size:13px;font-weight:700;text-align:center;text-decoration:none">2과 자음1 →</a>
  </div>`;
}

function renderPrinciples() {
  const combos = [
    {base:"·+ㅣ",result:"ㅏ",note:"하늘이 사람 오른쪽에"},
    {base:"ㅣ+·",result:"ㅓ",note:"하늘이 사람 왼쪽에"},
    {base:"·+ㅡ",result:"ㅗ",note:"하늘이 땅 위에"},
    {base:"ㅡ+·",result:"ㅜ",note:"하늘이 땅 아래에"},
    {base:"ㅡ",result:"ㅡ",note:"땅 그대로"},
    {base:"ㅣ",result:"ㅣ",note:"사람 그대로"},
  ];
  return `
  <h2>🌐 천지인 원리 · Heaven·Earth·Human</h2>
  <p class="sub">한글 모음의 창제 원리 · The Principle of Hangul Vowels</p>
  <div class="card" style="background:linear-gradient(135deg,#1E3A5F,#2E75B6);color:#fff;border:none;margin-bottom:14px">
    <div style="font-size:16px;font-weight:800;margin-bottom:6px">훈민정음 창제 원리</div>
    <div style="font-size:13px;opacity:.9;line-height:1.6">세종대왕(1443년)은 하늘(·), 땅(ㅡ), 사람(ㅣ) 세 가지 요소를 결합해 모음을 만들었어요.</div>
    <div style="font-size:12px;opacity:.7;margin-top:4px">King Sejong combined three elements — heaven(·), earth(ㅡ), human(ㅣ) — to create vowels.</div>
  </div>
  <div class="grid3" style="margin-bottom:14px">
    ${VOWEL_PRINCIPLES.map(p=>`
    <div class="card" style="text-align:center;border:2px solid #15803d">
      <div style="font-size:36px;font-weight:800;color:var(--navy);margin-bottom:4px">${p.symbol}</div>
      <div style="font-size:13px;font-weight:700;color:#15803d">${p.name}</div>
      <div style="font-size:11px;color:#555;margin-top:2px">${p.desc}</div>
      <div style="font-size:10px;color:#888;margin-top:2px">${p.eng}</div>
    </div>`).join('')}
  </div>
  <div class="section-label">🔗 조합 방법 · How to Combine</div>
  <div class="grid2">
    ${combos.map(c=>`
    <div class="card" style="text-align:center;padding:10px">

function renderQuiz() {
  if (state.qDone) {
    const pct = Math.round(state.qScore/QUIZ.length*100);
    // save progress
    try {
      var prog = JSON.parse(localStorage.getItem('hw_l0_progress')||'{}');
      prog[1] = true;
      localStorage.setItem('hw_l0_progress', JSON.stringify(prog));
      localStorage.setItem('hw_l0_last', '1');
    } catch(e){}
    return `<div style="text-align:center;padding:20px 0">
      <div style="font-size:56px">${pct>=80?'🎉':pct>=50?'👍':'💪'}</div>
      <h2>퀴즈 결과 · Quiz Result</h2>
      <div style="font-size:44px;font-weight:800;color:${pct>=80?'var(--level0)':pct>=50?'var(--orange)':'var(--red)'};margin:14px 0">${state.qScore}/${QUIZ.length}</div>
      <div style="font-size:15px;color:#888;margin-bottom:20px">${pct}% 정답 · Correct</div>
      <div class="progress"><div class="progress-bar" style="width:${pct}%;background:${pct>=80?'var(--level0)':pct>=50?'var(--orange)':'var(--red)'}"></div></div>
      <button onclick="setState({qIdx:0,qSel:null,qScore:0,qDone:false})" class="btn btn-navy" style="margin-top:20px">↺ 다시 풀기 · Retry</button>
      <a href="HanwhaOcean_Level0_Lesson2.html" class="btn btn-primary" style="display:block;margin-top:10px;text-decoration:none;text-align:center">2과 자음1 →</a>
    </div>`;
  }
  const q = QUIZ[state.qIdx];
  return `<h2>🎯 퀴즈 · Quiz</h2>
  <div style="display:flex;justify-content:space-between;margin-bottom:8px">
    <span style="font-size:12px;color:#888">문제 ${state.qIdx+1}/${QUIZ.length}</span>
    <span style="font-size:12px;color:var(--level0);font-weight:600">점수: ${state.qScore}</span>
  </div>
  <div class="progress"><div class="progress-bar" style="width:${(state.qIdx+1)/QUIZ.length*100}%;background:var(--level0)"></div></div>
  <div class="card" style="background:#f0fdf4;border:2px solid #15803d;text-align:center;margin:14px 0">
    <div style="font-size:16px;font-weight:700;color:var(--navy)">${q.q}</div>
  </div>
  ${q.o.map((opt,i)=>{
    let cls = 'quiz-opt';
    if(state.qSel!==null){
      if(i===q.a) cls+=' quiz-correct';
      else if(i===state.qSel) cls+=' quiz-wrong';
    }
    return `<button class="${cls}" onclick="${state.qSel===null?`setState({qSel:${i},qScore:state.qScore+${i===q.a?1:0}})`:''}">${String.fromCharCode(65+i)}. ${opt}</button>`;
  }).join('')}
  ${state.qSel!==null?`<button onclick="${state.qIdx<QUIZ.length-1?`setState({qIdx:state.qIdx+1,qSel:null})`:`setState({qDone:true})`}" class="btn btn-primary" style="margin-top:8px">${state.qIdx<QUIZ.length-1?'다음 문제 → Next':'결과 보기 → Result'}</button>`:''}`;
}

function renderAI() {
  return `
<div class="card card-green">
  <div class="section-label">🤖 AI 한국어 선생님</div>
  <div style="font-size:13px;color:#555;margin-bottom:10px">궁금한 것을 물어보세요! Ask anything about this lesson.</div>
  <div id="ai-chat" style="min-height:60px;margin-bottom:10px"></div>
  <div style="display:flex;gap:6px">
    <textarea id="ai-input" class="input" style="min-height:44px;resize:none" placeholder="예: 이 모음을 어떻게 발음해요? / How do I pronounce this vowel?"></textarea>
    <button class="btn btn-primary" style="width:auto;padding:10px 14px" onclick="sendAI()">전송</button>
  </div>
  <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap" id="ai-quick">
    ${["이 모음/자음을 어떻게 발음해요?","이 단어가 무슨 뜻이에요?","예문을 만들어 주세요","한글 모음과 자음의 차이는?"]
      .map(q=>`<button onclick="document.getElementById('ai-input').value='${q}'" style="background:#f0fdf4;border:1px solid #15803d;color:#15803d;border-radius:20px;padding:5px 12px;font-size:11px">${q}</button>`).join('')}
  </div>
</div>`;
}

function sendAI() {
  const input = document.getElementById('ai-input');
  const chat = document.getElementById('ai-chat');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  chat.innerHTML += `<div class="bubble bubble-right" style="margin-left:auto;margin-bottom:8px"><b>나:</b> ${msg}</div>`;
  chat.innerHTML += `<div id="ai-loading" class="bubble bubble-left" style="margin-bottom:8px">⏳ 생각 중...</div>`;
  chat.scrollTop = chat.scrollHeight;
  const systemPrompt = `You are a Korean language tutor for foreign workers at Hanwha Ocean shipyard. This is Level 0 (beginner), Lesson 1 on Korean vowels (모음). Answer in Korean with English translation. Be encouraging, simple, and practical. Keep answers under 150 words.`;
  fetch('/api/chat', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({messages:[{role:'system',content:systemPrompt},{role:'user',content:msg}]})
  })
  .then(r=>r.json())
  .then(d=>{
    document.getElementById('ai-loading')?.remove();
    const reply = d.choices?.[0]?.message?.content || '죄송합니다, 다시 시도해 주세요.';
    chat.innerHTML += `<div class="bubble bubble-left" style="margin-bottom:8px"><b>AI 선생님:</b> ${reply}</div>`;
    chat.scrollTop = chat.scrollHeight;
  })
  .catch(()=>{
    document.getElementById('ai-loading')?.remove();
    chat.innerHTML += `<div class="bubble bubble-left" style="color:#e00;margin-bottom:8px">연결 오류. 다시 시도해 주세요.</div>`;
  });
}

render();
