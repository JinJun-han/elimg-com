// ===== TTS ENGINE =====
const TTS = {
  speak(text, lang='ko-KR', rate=0.8) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang; u.rate = rate; u.pitch = 1;
    const voices = window.speechSynthesis.getVoices();
    const koVoice = voices.find(v => v.lang.startsWith('ko')) || voices.find(v => v.lang.includes('ko'));
    if (koVoice) u.voice = koVoice;
    window.speechSynthesis.speak(u);
  },
  init() { if (window.speechSynthesis) window.speechSynthesis.getVoices(); }
};
window.addEventListener('load', () => { TTS.init(); setTimeout(TTS.init, 500); });

function ttsBtn(text) {
  if(!text) return '';
  return `<button class="tts-btn" onclick="event.stopPropagation();TTS.speak('${text.replace(/'/g,"\\'")}')" title="발음 듣기">🔊</button>`;
}

function render() {

function speakTopikListening(idx) {
  var item = TOPIK_PRACTICE.listening[idx];
  if(!item) return;
  var text = item.q;
  // Extract dialogue part after \n\n
  var parts = text.split('\n\n');
  if(parts.length > 1) {
    text = parts.slice(1).join(' ');
  }
  // Clean up [듣기 유형] prefix
  text = text.replace(/\[.*?\]/g, '').trim();
  TTS.speak(text);
}

            let bg = '#fff'; let border = '#ddd'; let color = '#333';
            if(answered && isCorrectOpt) { bg = '#dcfce7'; border = '#22c55e'; color = '#166534'; }
            else if(answered && isSelected && !correct) { bg = '#fef2f2'; border = '#ef4444'; color = '#991b1b'; }
            return `<button onclick="setState({'tpListen${idx}':${oi}})" style="text-align:left;padding:10px 12px;border-radius:8px;border:2px solid ${border};background:${bg};color:${color};font-size:13px;cursor:${answered?'default':'pointer'};font-weight:${isSelected||isCorrectOpt&&answered?'700':'400'}" ${answered?'disabled':''}>${'①②③④'[oi]} ${opt}</button>`;
          }).join('')}
        </div>
        ${answered?`<div style="margin-top:8px;font-size:12px;font-weight:700;color:${correct?'#22c55e':'#ef4444'}">${correct?'✅ 정답입니다! Correct!':'❌ 오답입니다. 정답을 확인하세요.'}</div>`:''}
      </div>`;
    }).join('');
  } else {
    // Tab 3: Strategy
    content = `<div class="card" style="background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff;border:none;margin-bottom:14px">
      <div style="font-size:18px;font-weight:800">📋 TOPIK I 핵심 전략</div>
      <div style="font-size:12px;opacity:.8">Key Strategies for TOPIK I</div>
    </div>
    <div class="card card-accent" style="margin-bottom:10px">
      <div style="font-size:14px;font-weight:700;color:var(--ocean);margin-bottom:8px">📖 읽기 전략 · Reading Strategy</div>
      <div style="font-size:13px;color:#333;line-height:1.8">
        1️⃣ 먼저 질문을 읽고 핵심 단어를 파악하세요.<br>
        2️⃣ 지문에서 질문의 답을 찾으세요.<br>
        3️⃣ 모르는 단어는 앞뒤 문맥으로 추측하세요.<br>
        4️⃣ 시간이 부족하면 쉬운 문제부터 푸세요.<br>
        5️⃣ 답을 고른 후 다시 한번 확인하세요.
      </div>
      <div style="font-size:11px;color:#888;margin-top:8px;line-height:1.8">
        1️⃣ Read questions first, identify key words.<br>
        2️⃣ Find answers in the passage.<br>
        3️⃣ Guess unknown words from context.<br>
        4️⃣ Solve easy questions first if time is short.<br>
        5️⃣ Double-check your answers.
      </div>
    </div>
    <div class="card card-accent" style="margin-bottom:10px">
      <div style="font-size:14px;font-weight:700;color:#a855f7;margin-bottom:8px">🎧 듣기 전략 · Listening Strategy</div>
      <div style="font-size:13px;color:#333;line-height:1.8">
        1️⃣ 듣기 전에 보기를 먼저 읽으세요.<br>
        2️⃣ 핵심 단어와 숫자에 집중하세요.<br>
        3️⃣ 대화의 상황(장소, 관계)을 파악하세요.<br>
        4️⃣ 마지막 문장에 답이 있는 경우가 많아요.<br>
        5️⃣ 놓쳤으면 다음 문제에 집중하세요.
      </div>
      <div style="font-size:11px;color:#888;margin-top:8px;line-height:1.8">
        1️⃣ Read options before listening.<br>
        2️⃣ Focus on key words and numbers.<br>
        3️⃣ Identify the situation (place, relationship).<br>
        4️⃣ Answers are often in the last sentence.<br>
        5️⃣ If you miss one, focus on the next question.
      </div>
    </div>
    <div class="card" style="background:#ecfdf5;border:2px solid #22c55e">
      <div style="font-size:14px;font-weight:700;color:#166534;margin-bottom:8px">🎯 시간 관리 · Time Management</div>
      <div style="font-size:13px;color:#333;line-height:1.8">
        📌 읽기: 문제당 1.5분 (40문제 = 60분)<br>
        📌 듣기: 자동 진행 (40분 고정)<br>
        📌 쉬운 문제 먼저, 어려운 문제 나중에<br>
        📌 마킹 시간 2~3분 확보
      </div>
    </div>`;
  }

  // Count answered questions for progress
  let answered = 0;
  let total = (tp.reading?tp.reading.length:0) + (tp.listening?tp.listening.length:0);
  for(let i=0;i<(tp.reading?tp.reading.length:0);i++) if(state['tpRead'+i]!==undefined && state['tpRead'+i]!==null) answered++;
  for(let i=0;i<(tp.listening?tp.listening.length:0);i++) if(state['tpListen'+i]!==undefined && state['tpListen'+i]!==null) answered++;
  const pct = total>0?Math.round(answered/total*100):0;

  return `<h2>📊 TOPIK I 준비 · Exam Preparation</h2><p class="sub">${HANGUL_SUBTITLE}</p>
  <div style="margin-bottom:12px;background:#e5e7eb;border-radius:8px;overflow:hidden;position:relative;height:22px">
    <div style="width:${pct}%;height:100%;background:linear-gradient(90deg,#a855f7,#ec4899);border-radius:8px;transition:width 0.5s"></div>
    <div style="position:absolute;top:0;left:0;right:0;text-align:center;font-size:11px;font-weight:700;line-height:22px;color:${pct>50?'#fff':'#555'}">연습 진도 ${answered}/${total} (${pct}%)</div>
  </div>
  <div class="tabs">${tabs.map((t,i)=>`<button class="tab ${hTab===i?'active':''}" onclick="setState({hgTab:${i}})">${t}</button>`).join('')}</div>
  ${content}
  ${hTab===1||hTab===2?`<button class="btn btn-navy" style="margin-top:12px" onclick="${hTab===1?tp.reading.map((_,i)=>`setState({'tpRead${i}':undefined})`).join(';'):tp.listening.map((_,i)=>`setState({'tpListen${i}':undefined})`).join(';')}">↺ 다시 풀기 · Retry</button>`:''}`;
}

    q:'한국어 초급 퀴즈에서 틀렸습니다. 이/가, 은/는, 이에요/예요 차이를 쉽게 설명해주세요. 조선소 예문으로 설명해주고 영어로도 알려주세요.' },
];

var AICHAT = {
  msgs: [],
  loading: false,
  input: '',
  addMsg: function(role, text) {
    this.msgs.push({ role, text, time: new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) });
    render();
    setTimeout(function(){
      var box = document.querySelector('.ai-msgbox');
      if(box) box.scrollTop = box.scrollHeight;
    }, 50);
  },
  quickSend: function(idx) {
    var b = AI_QUICK_BTNS[idx];
    if (!b || this.loading) return;
    this.send(b.q, b.label);
  },
  send: async function(text, label) {
    if (this.loading) return;
    text = text || this.input.trim();
    if (!text) return;
    this.input = '';
    this.loading = true;
    var displayText = label || text;
    this.addMsg('user', displayText);
    try {
      var sysP = 'You are a Korean language tutor for foreign workers at Hanwha Ocean shipyard in Geoje, Korea. Students are beginner level (KIIP Level 1-2). Always: 1) Keep answers SHORT and CLEAR 2) Include English translations 3) Focus on practical shipyard expressions 4) Use simple grammar. Reply in Korean with English translation.';
      var url = '/api/chat';
      var res = await fetch(url, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'system',content:sysP},{role:'user',content:text}]})});
      var data = await res.json();
      var reply = data.choices[0].message.content;
      this.loading = false;
      this.addMsg('assistant', reply);
    } catch(e) {
      this.loading = false;
      this.addMsg('assistant', '⚠️ 연결 오류. 다시 시도해주세요.\nConnection error. Please try again.');
    }
  }
};

function renderAI() {
  return `
  <h2>🤖 AI 한국어 도우미</h2>
  <p class="sub">AI Korean Tutor · 로그인 불필요 · 24시간 무료</p>

  <div class="card" style="background:linear-gradient(135deg,#1E3A5F,#2E75B6);color:#fff;border:none;margin-bottom:14px">
    <div style="font-size:13px;opacity:.85;margin-bottom:10px">💡 빠른 질문 / Quick Questions</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      ${AI_QUICK_BTNS.map(function(b,i){return `
        <button onclick="AICHAT.quickSend(${i})" style="background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:10px;color:#fff;padding:10px 8px;font-size:12px;font-weight:600;text-align:left;line-height:1.4;font-family:inherit;cursor:pointer">
          ${b.emoji} ${b.label}
        </button>`;}).join('')}
    </div>
  </div>

  <div class="ai-msgbox" style="background:#fff;border-radius:12px;border:1px solid #e8edf2;min-height:180px;max-height:360px;overflow-y:auto;padding:12px;margin-bottom:10px;display:flex;flex-direction:column;gap:8px">
    ${AICHAT.msgs.length === 0
      ? `<div style="text-align:center;color:#aaa;padding:36px 16px;font-size:13px">
          🤖 위 버튼을 누르거나 아래에 직접 입력하세요<br>
          <span style="font-size:11px">Tap a button above or type below</span>
        </div>`
      : AICHAT.msgs.map(function(m){ return `
        <div style="align-self:${m.role==='user'?'flex-end':'flex-start'};max-width:90%">
          <div style="background:${m.role==='user'?'#2E75B6':'#f0f7ff'};color:${m.role==='user'?'#fff':'#1E3A5F'};border-radius:${m.role==='user'?'14px 14px 4px 14px':'14px 14px 14px 4px'};padding:10px 13px;font-size:13px;line-height:1.65;white-space:pre-wrap;word-break:break-word">${m.text}</div>
          <div style="font-size:10px;color:#aaa;margin-top:3px;text-align:${m.role==='user'?'right':'left'}">${m.time}</div>
        </div>`;}).join('')}
    ${AICHAT.loading ? `<div style="align-self:flex-start;background:#f0f7ff;border-radius:14px 14px 14px 4px;padding:10px 14px;font-size:13px;color:#2E75B6">⏳ 답변 생성 중... / Generating...</div>` : ''}
  </div>

  <div style="display:flex;gap:8px">
    <input id="ai-input" type="text" placeholder="한국어로 질문하세요 / Ask anything..."
      style="flex:1;padding:12px 14px;border:2px solid #e5e7eb;border-radius:10px;font-size:14px;font-family:inherit;outline:none"
      onfocus="this.style.borderColor='#2E75B6'" onblur="this.style.borderColor='#e5e7eb'"
      onkeydown="if(event.key==='Enter'){AICHAT.input=this.value;AICHAT.send();}">
    <button onclick="AICHAT.input=document.getElementById('ai-input').value;AICHAT.send()"
      style="background:#2E75B6;color:#fff;border-radius:10px;padding:0 18px;font-size:20px;min-width:52px;font-family:inherit;cursor:pointer;border:none">
      ➤
    </button>
  </div>
  <p style="font-size:11px;color:#aaa;text-align:center;margin-top:8px">🤖 Powered by Pollinations AI · 무료 · Free forever</p>
  `;
}

// ===== INIT =====
render();
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
