const TTS={
  speak(text,lang='ko-KR',rate=0.8){
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang=lang;u.rate=rate;
    window.speechSynthesis.speak(u);
  },
  init(){if(window.speechSynthesis)window.speechSynthesis.getVoices();}
};
window.addEventListener('load',()=>{TTS.init();setTimeout(TTS.init,500);});

function ttsBtn(text,lang='ko-KR'){
  const safe=text.replace(/'/g,"\\'").replace(/"/g,'&quot;');

const RECORDER = {
  streams: {},
  recorders: {},
  chunks: {},
  audioURLs: {},
  isRecording: {},

  async start(idx, targetText, recBtn) {
    const resultEl = document.getElementById('stt-result-' + idx);
    const playBtn  = document.getElementById('play-btn-' + idx);
    const scoreEl  = document.getElementById('score-bar-' + idx);
    if (this.isRecording[idx]) { this.stop(idx, targetText, recBtn); return; }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio: true});
      this.streams[idx] = stream;
    } catch(e) {
      const name = e.name || '';
      let msg = '';
      if (name === 'NotAllowedError' || name === 'PermissionDeniedError') {
        msg = '❌ <strong>마이크가 차단됨</strong> — 브라우저 주소창 🔒 → 마이크 → <strong>허용</strong> 후 새로고침';
      } else if (name === 'NotFoundError' || name === 'DevicesNotFoundError') {
        msg = '❌ <strong>마이크를 찾을 수 없어요</strong> — 마이크 연결을 확인하세요';
      } else {
        msg = '❌ <strong>오류: ' + name + '</strong> — Chrome/Edge에서 다시 시도하세요';
      }
      if (resultEl) resultEl.innerHTML = '<span style="color:#ef4444;font-size:11px;line-height:1.7">' + msg + '</span>';
      return;
    }
    this.chunks[idx] = [];
    const mr = new MediaRecorder(this.streams[idx]);
    this.recorders[idx] = mr;
    mr.ondataavailable = e => { if (e.data.size > 0) this.chunks[idx].push(e.data); };
    mr.onstop = () => {
      if (this.audioURLs[idx]) URL.revokeObjectURL(this.audioURLs[idx]);
      const blob = new Blob(this.chunks[idx], {type: 'audio/webm'});
      this.audioURLs[idx] = URL.createObjectURL(blob);
      if (playBtn) {
        playBtn.disabled = false;
        playBtn.style.opacity = '1';
        playBtn.onclick = () => { const a = new Audio(this.audioURLs[idx]); a.play(); };
      }
    };
    mr.start();
    this.isRecording[idx] = true;
    recBtn.textContent = '⏹ 중지';
    recBtn.style.background = '#ef4444';
    if (resultEl) resultEl.innerHTML = '<span style="color:#ef4444;font-weight:700">● 녹음 중...</span>';
    if (scoreEl) scoreEl.style.width = '0%';
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR) {
      const rec = new SR();
      rec.lang = 'ko-KR';
      rec.continuous = false;
      rec.interimResults = false;
      rec.onresult = (e) => {
        const said   = e.results[0][0].transcript.replace(/[\s,.?!]/g,'');
        const target = targetText.replace(/[\s,.?!]/g,'');
        const conf   = e.results[0][0].confidence;
        let match = 0;
        const minLen = Math.min(said.length, target.length);
        for (let i = 0; i < minLen; i++) { if (said[i] === target[i]) match++; }
        const pct = target.length > 0 ? Math.round(match / target.length * 100) : 0;
        const confPct = Math.round((conf || 0.5) * 100);
        const finalPct = Math.round((pct * 0.7) + (confPct * 0.3));
        const color = finalPct >= 80 ? '#22c55e' : finalPct >= 50 ? '#f59e0b' : '#ef4444';
        const msg   = finalPct >= 80 ? '✅ 완벽해요!' : finalPct >= 50 ? '🔄 조금 더 연습!' : '❌ 다시 시도!';
        if (resultEl) resultEl.innerHTML = '<span style="color:' + color + ';font-weight:800">' + msg + '</span><br><span style="font-size:10px;color:#555">인식: "' + e.results[0][0].transcript + '"</span>';
        if (scoreEl) { scoreEl.style.width = finalPct + '%'; scoreEl.style.background = color; }
      };
      rec.onerror = () => {};
      rec.start();
    }
  },

  async autoDetect() {
    const stateEl = document.getElementById('mic-perm-state');
    const blockedGuide = document.getElementById('mic-blocked-guide');
    const allowBtn = document.getElementById('mic-allow-btn');
    if (!stateEl) return;
    if (navigator.permissions) {
      try {
        const result = await navigator.permissions.query({name: 'microphone'});
        if (result.state === 'granted') {
          stateEl.innerHTML = '<div style="background:#dcfce7;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#166534;font-weight:700">✅ 마이크 이미 허용됨 — 바로 녹음하세요!</div>';
          if (allowBtn) { allowBtn.style.background = '#166534'; allowBtn.textContent = '✅ 허용됨 — 바로 녹음하세요'; }
          if (blockedGuide) blockedGuide.style.display = 'none';
          return;
        } else if (result.state === 'denied') {
          stateEl.innerHTML = '<div style="background:#fee2e2;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#991b1b;font-weight:700">🚫 마이크 차단됨 — 아래 안내대로 해결하세요</div>';
          if (blockedGuide) blockedGuide.style.display = 'block';
          if (allowBtn) { allowBtn.style.background = '#ef4444'; allowBtn.textContent = '⚠️ 차단됨 — 위 단계 완료 후 여기 클릭'; }
          return;
        } else {
          stateEl.innerHTML = '<div style="background:#fef9c3;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#92400e">❓ 아직 허용 안 됨 — 아래 버튼을 눌러 허용해 주세요</div>';
        }
        result.onchange = () => RECORDER.autoDetect();
      } catch(e) {
        stateEl.innerHTML = '<div style="font-size:11px;color:#888">아래 버튼을 눌러 마이크 허용 여부를 확인하세요</div>';
      }
    } else {
      stateEl.innerHTML = '<div style="font-size:11px;color:#888">아래 버튼을 눌러 마이크 허용 여부를 확인하세요</div>';
    }
  },

  async checkPermission(btn) {
    const statusEl = document.getElementById('mic-status');
    const box = document.getElementById('mic-check-box');
    const blockedGuide = document.getElementById('mic-blocked-guide');
    const stateEl = document.getElementById('mic-perm-state');
    btn.textContent = '⏳ 확인 중...'; btn.disabled = true;
    if (location.protocol === 'file:') {
      if (statusEl) statusEl.innerHTML = '<span style="color:#ef4444">❌ file:// 불가 → elimg.com에서 열기</span>';
      btn.textContent = '🎙️ 마이크 허용하기'; btn.disabled = false; return;
    }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      if (statusEl) statusEl.innerHTML = '<span style="color:#ef4444">❌ 미지원 브라우저 — Chrome 또는 Edge를 사용해 주세요</span>';
      btn.textContent = '🎙️ 마이크 허용하기'; btn.disabled = false; return;
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio: true});
      stream.getTracks().forEach(t => t.stop());
      if (stateEl) stateEl.innerHTML = '<div style="background:#dcfce7;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#166534;font-weight:700">✅ 마이크 허용됨! 아래에서 바로 녹음하세요!</div>';
      if (statusEl) statusEl.innerHTML = '<span style="color:#059669;font-weight:700">✅ 성공!</span>';
      if (box) { box.style.background = '#dcfce7'; box.style.borderColor = '#86efac'; }
      if (blockedGuide) blockedGuide.style.display = 'none';
      btn.textContent = '✅ 허용됨 — 바로 녹음하세요!'; btn.style.background = '#166534'; btn.disabled = false;
    } catch(e) {
      const name = e.name || '';
      btn.disabled = false;
      if (name === 'NotAllowedError' || name === 'PermissionDeniedError') {
        if (blockedGuide) blockedGuide.style.display = 'block';
        if (stateEl) stateEl.innerHTML = '<div style="background:#fee2e2;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#991b1b;font-weight:700">🚫 마이크 차단됨 — 안내대로 해결 후 다시 클릭</div>';
        if (statusEl) statusEl.innerHTML = '<span style="color:#ef4444;font-size:11px">🔒 허용 완료 후 이 버튼을 다시 눌러주세요</span>';
        btn.textContent = '🔄 허용 완료 후 다시 클릭'; btn.style.background = '#ef4444';
      } else {
        if (statusEl) statusEl.innerHTML = '<span style="color:#ef4444">오류 (' + name + ') — Chrome/Edge에서 다시 시도</span>';
        btn.textContent = '🔄 다시 시도'; btn.style.background = '#92400e';
      }
    }
  },

  stop(idx, targetText, recBtn) {
    if (this.recorders[idx] && this.recorders[idx].state !== 'inactive') {
      this.recorders[idx].stop();
    }
    if (this.streams[idx]) {
      this.streams[idx].getTracks().forEach(t => t.stop());
    }
    this.isRecording[idx] = false;
    recBtn.textContent = '🎤 다시 녹음';
    recBtn.style.background = '#059669';
  }
};

  history: [],

    var safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    d.innerHTML = '<div style="font-size:10px;color:#888;margin:0 4px">' + (isUser?'🙋 나':'🤖 AI') + '</div><div style="max-width:90%;padding:10px 13px;border-radius:' + (isUser?'14px 14px 4px 14px':'14px 14px 14px 4px') + ';background:' + (isUser?'#f59e0b':'#fff') + ';color:' + (isUser?'#fff':'#1a202c') + ';font-size:13px;line-height:1.7;border:1px solid ' + (isUser?'#d97706':'#fde68a') + ';word-break:break-word">' + safe + '</div>';
    box.appendChild(d); box.scrollTop = box.scrollHeight;
  },
  setLoading: function(on) {
    var box = document.getElementById('ai-chat-messages');
    var el = document.getElementById('ai-loading-dot');
    var btn = document.getElementById('ai-send-btn');
    if (on) {
      if (box && !el) {
        var ld = document.createElement('div'); ld.id = 'ai-loading-dot';
        ld.style.cssText = 'display:flex;align-items:center;gap:8px;padding:8px;margin-bottom:6px';

        box.appendChild(ld); box.scrollTop = box.scrollHeight;

    }
    this.loading = false;
  }
};

    <div class="card" style="margin-bottom:10px;border:2px solid #f59e0b">
      <div class="card-title" style="color:#92400e">⚙️ Agent Harness · 학습 진도</div>
      <div style="background:#fef3c7;border-radius:8px;padding:10px 12px;margin:8px 0">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-size:13px;font-weight:700;color:#92400e">진도율</span>
          <span style="font-size:18px;font-weight:800;color:#f59e0b">${pct}%</span>
        </div>
        <div style="background:#fde68a;border-radius:8px;height:8px;overflow:hidden">
          <div style="background:#f59e0b;height:100%;width:${pct}%;transition:width 0.5s"></div>
        </div>
      </div>
      ${[
        {label:'📝 어휘 학습 완료', done:done.vocab},
        {label:'📜 핵심 내용 확인 완료', done:done.concept},
        {label:'✅ 퀴즈 통과', done:done.quiz},
      ].map(t=>`
        <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #fde68a">
          <span style="font-size:15px">${t.done?'✅':'⬜'}</span>
          <div style="font-size:13px;color:${t.done?'#166534':'#555'};font-weight:${t.done?'700':'400'}">${t.label}</div>
        </div>
      `).join('')}
    </div>

    <div class="card" style="margin-bottom:10px;border:2px solid #f59e0b;background:#fffbeb">
      <div class="card-title" style="color:#d97706">⚡ 앱 내 AI 채팅 · 로그인 불필요</div>
      <div style="font-size:12px;color:#555;margin:6px 0 10px;line-height:1.6">계정 없이 바로 AI에게 질문하세요</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
        ${AI_QUICK_BTNS.map((b,i)=>`
          <button onclick="AICHAT.quickSend(${i})"
            style="background:#fff;border:1px solid #fbbf24;color:#92400e;border-radius:20px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer">
            ${b.emoji} ${b.label}
          </button>
        `).join('')}
      </div>
      <div id="ai-chat-messages" style="max-height:300px;overflow-y:auto;margin-bottom:10px;display:flex;flex-direction:column;gap:8px;min-height:60px;background:#fafafa;border-radius:10px;padding:8px">
        <div class="ai-placeholder" style="text-align:center;font-size:12px;color:#888;padding:16px">💡 버튼을 누르면 AI가 바로 답해줘요</div>
      </div>
      <div style="display:flex;gap:6px;align-items:flex-end">
        <textarea id="ai-chat-input" placeholder="한국어로 질문하세요..."
          style="flex:1;padding:12px;border:2px solid #fde68a;border-radius:10px;font-size:16px;font-family:inherit;min-height:48px;max-height:120px;resize:none;outline:none"
          onfocus="this.style.borderColor='#f59e0b'" onblur="this.style.borderColor='#fde68a'"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();AICHAT.send()}"></textarea>
        <button onclick="AICHAT.send()" id="ai-send-btn"
          style="background:#f59e0b;color:#fff;border-radius:10px;padding:10px 14px;font-size:18px;font-weight:700;flex-shrink:0;height:44px">➤</button>
      </div>
      <div style="font-size:10px;color:#888;margin-top:4px">Enter로 전송 · Shift+Enter 줄바꿈 · 🆓 완전 무료</div>
    </div>

    <div class="card" style="margin-bottom:10px">
      <div class="card-title">🌐 외부 AI 서비스 가이드</div>
      <details style="margin-bottom:8px">
        <summary style="background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff;padding:10px 14px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;list-style:none">🔵 Gemini AI — Google 계정 필요</summary>
        <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:0 0 8px 8px;padding:12px;font-size:12px;line-height:1.9">
          gemini.google.com에서 한국 과학기술·반도체·5G·우주개발·전자정부 내용 질문, 토론 연습에 활용하세요.<br>
          <button onclick="openGemini()" style="background:#1d4ed8;color:#fff;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;margin:4px 0;cursor:pointer">🔵 Gemini 열기</button>
        </div>
      </details>
      <details style="margin-bottom:8px">
        <summary style="background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;padding:10px 14px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;list-style:none">🟣 Claude AI — 이메일 계정 필요</summary>
        <div style="background:#f5f3ff;border:1px solid #ddd6fe;border-radius:0 0 8px 8px;padding:12px;font-size:12px;line-height:1.9">
          쓰기 첨삭 및 내용 검토에 특화. 쓰기 섹션 글을 자동 전송합니다.<br>
          <button onclick="openClaudeFeedback()" style="background:#7c3aed;color:#fff;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;margin:4px 0;cursor:pointer">🟣 내 글 첨삭 요청하기</button>
        </div>
      </details>
      <details>
        <summary style="background:linear-gradient(135deg,#ea4335,#fbbc04);color:#fff;padding:10px 14px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;list-style:none">📓 NotebookLM — Google 계정 필요</summary>
        <div style="background:#fff8f0;border:1px solid #fed7aa;border-radius:0 0 8px 8px;padding:12px;font-size:12px;line-height:1.9">
          이 과 내용을 복사해서 NotebookLM에 넣고 Q&amp;A 정리에 활용하세요.<br>
          <button onclick="copyNotebookContent()" style="background:#ea4335;color:#fff;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;margin:4px 0;cursor:pointer">📋 이 과 학습 내용 복사하기</button>
          <span id="copy-ok" style="font-size:11px;color:#059669;margin-left:6px"></span>
        </div>
      </details>
    </div>

    <div class="card" style="margin-bottom:10px;background:#f0fdf4;border:1px solid #86efac">
      <div class="card-title" style="color:#059669">🎤 AI 발음 코치 · 녹음 &amp; 재생</div>
      <div style="font-size:12px;color:#555;margin:6px 0;line-height:1.6">원어민 듣기 → 내가 녹음 → 다시 들으며 비교</div>
      <div style="background:#dcfce7;border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:11px;color:#166534">🆓 <strong>완전 무료</strong> — 브라우저 내장 API</div>

      <div id="mic-check-box" style="background:#fef9c3;border:2px solid #fbbf24;border-radius:10px;padding:14px;margin-bottom:10px">
        <div style="font-size:14px;font-weight:800;color:#92400e;margin-bottom:8px">🎙️ 마이크 허용 필요</div>
        <div id="mic-perm-state" style="margin-bottom:10px"></div>
        <div id="mic-blocked-guide" style="display:none;background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:12px;margin-bottom:10px">
          <div style="font-size:13px;font-weight:800;color:#991b1b;margin-bottom:8px">🚫 마이크 차단됨</div>
          <div style="font-size:12px;line-height:2;color:#1a202c">
            <strong>Chrome/Edge (PC):</strong> 🔒 → 마이크 → 허용 → F5<br>
            <strong>Android:</strong> ⋮ → 사이트 설정 → 마이크 → 허용
          </div>
        </div>
        <button id="mic-allow-btn" onclick="RECORDER.checkPermission(this)"
          style="width:100%;background:#059669;color:#fff;border-radius:8px;padding:12px;font-size:14px;font-weight:800">
          🎙️ 마이크 허용하기 (여기 클릭)
        </button>
        <div id="mic-status" style="font-size:11px;margin-top:6px;text-align:center;min-height:16px"></div>
      </div>

      ${PRON_SENTS_DATA.map((item,i)=>`
        <div style="background:#f0fdf4;border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid #86efac">
          <div style="font-size:13px;font-weight:700;color:#14532d;margin-bottom:4px">${item.text}</div>
          <div style="font-size:11px;color:#64748b;margin-bottom:8px">${item.trans}</div>
          <div style="background:#bbf7d0;border-radius:6px;height:6px;margin-bottom:8px;overflow:hidden">
            <div id="score-bar-${i}" style="height:100%;width:0%;background:#22c55e;transition:width 0.5s;border-radius:6px"></div>
          </div>
          <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
            <button onclick="TTS.speak('${item.text.replace(/'/g,"\\'")}'); this.textContent='🔊 재생 중...'; setTimeout(()=>this.textContent='🔊 원어민',2000)"
              style="background:#f59e0b;color:#fff;border-radius:16px;padding:5px 12px;font-size:11px;font-weight:700">🔊 원어민</button>
            <button id="rec-btn-${i}" onclick="RECORDER.start(${i},'${item.text.replace(/'/g,"\\'")}',this)"
              style="background:#059669;color:#fff;border-radius:16px;padding:5px 12px;font-size:11px;font-weight:700">🎤 녹음</button>
            <button id="play-btn-${i}" disabled
              style="background:#1d4ed8;color:#fff;border-radius:16px;padding:5px 12px;font-size:11px;font-weight:700;opacity:0.4">▶ 내 발음 듣기</button>
          </div>
          <div id="stt-result-${i}" style="font-size:11px;margin-top:6px;min-height:16px"></div>
        </div>
      `).join('')}

      <div style="background:#f0fdf4;border-radius:8px;padding:10px;font-size:11px;color:#166534;line-height:1.8;margin-top:4px">
        <strong>📖 사용법:</strong><br>
        1️⃣ 🔊 원어민 — 먼저 들으세요 · 2️⃣ 🎤 녹음 — 말하기<br>
        3️⃣ ▶ 내 발음 듣기 — 녹음 후 활성화 · 4️⃣ 🟢 80%+ · 🟡 50~79% · 🔴 50% 미만
      </div>
    </div>

    <div class="card" style="background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1px solid #86efac">
      <div class="card-title" style="color:#059669">🌐 글로컬 G스택 학습법</div>
      <div style="font-size:12px;color:#166634;margin:8px 0;line-height:1.8">
        <strong>글로컬 아카데미 AI 에이전트 기반 4단계 학습법:</strong><br>
        ① 어휘/핵심내용 → Gemini 설명 요청<br>
        ② 말하기 → Gemini 토론 실습<br>
        ③ 쓰기 → Claude AI 첨삭<br>
        ④ 복습 → NotebookLM Q&amp;A 정리
      </div>
    </div>
  `;
}

render();
</script>
</body>
</html>
