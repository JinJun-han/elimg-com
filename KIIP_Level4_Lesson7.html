const TTS={
  speak(text,lang='ko-KR',rate=0.8){
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang=lang;u.rate=rate;
    window.speechSynthesis.speak(u);
  },
  init(){if(window.speechSynthesis)window.speechSynthesis.getVoices();}
};
window.addEventListener('load',()=>{TTS.init();setTimeout(TTS.init,500);});

function ttsBtn(text,lang='ko-KR'){
  const safe=text.replace(/'/g,"\\'").replace(/"/g,'&quot;');
  return `<button class="tts-btn" onclick="TTS.speak('${safe}','${lang}');event.stopPropagation()">🔊</button>`;
}

function renderSection(){
  switch(STATE.section){
    case 0: return renderIntro();
    case 1: return renderVocab();
    case 2:{
      let gramHtml;
      if(STATE.grammarTab===0){gramHtml=renderGramBlock(GRAM1,'gram1');}
      else{gramHtml=renderGramBlock(GRAM2,'gram2');}
      return `<h2>📐 문법</h2>
        <div class="grammar-tabs">
          <button class="grammar-tab${STATE.grammarTab===0?' active':''}" onclick="setState({grammarTab:0})">1. -다시피</button>
          <button class="grammar-tab${STATE.grammarTab===1?' active':''}" onclick="setState({grammarTab:1})">2. -(으)ㄴ/는 나머지</button>
        </div>${gramHtml}`;
    }
    case 3: return renderSpeaking();
    case 4: return renderListening();
    case 5: return renderPronunciation();
    case 6: return renderReading();
    case 7: return renderWriting();
    case 8: return renderCulture();
    case 9: return renderQuiz();
    case 10: return renderAI();
    default: return '';
  }
}

function renderGramBlock(gram,prefix){
  const practiceHtml=gram.practice.map((p,i)=>{
    const shown=STATE.gramPracticeShown[prefix+'_'+i];
    const q=p.q.replace('___',`<input id="${prefix}-inp-${i}" placeholder="___" style="width:110px"/>`);
    return `<div class="practice-item">
      <div style="font-size:14px;color:var(--navy);margin-bottom:8px;line-height:1.6">${q}</div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <button class="check-btn" onclick="
          var v=document.getElementById('${prefix}-inp-${i}').value.trim();
          if(v==='${p.answer}'){document.getElementById('${prefix}-fb-${i}').innerHTML='<span class=answer-reveal>✅ 정답!</span>';}
          else{document.getElementById('${prefix}-fb-${i}').innerHTML='<span class=wrong-reveal>❌ 다시 해보세요</span>';}
        ">확인</button>
        <button class="check-btn" style="background:#64748b" onclick="STATE.gramPracticeShown['${prefix}_${i}']=true;render()">정답 보기</button>
      </div>
      <div id="${prefix}-fb-${i}">${shown?`<span class="answer-reveal">정답: ${p.answer}</span>`:''}</div>
    </div>`;
  }).join('');
  const topikHtml=gram.topik.map((t,i)=>{
    const key=prefix+'_topik_'+i;
    const chosen=STATE.topikAnswers[key];
    return `<div class="topik-card">
      <div class="q-text">${t.q}</div>
      <div class="topik-options">
        ${t.opts.map((opt,j)=>{
          let cls='topik-opt';
          if(chosen!==undefined){if(j===t.answer)cls+=' correct';else if(j===chosen)cls+=' wrong';}
          return `<button class="${cls}" onclick="STATE.topikAnswers['${key}']=${j};render()" ${chosen!==undefined?'disabled':''}>${j+1}. ${opt}</button>`;
        }).join('')}
      </div>
      ${chosen!==undefined?`<div style="margin-top:8px;font-size:13px;color:${chosen===t.answer?'#166534':'#991b1b'};font-weight:700">${chosen===t.answer?'✅ 정답!':'❌ 오답 - 정답: '+(t.answer+1)+'번'}</div>`:''}
    </div>`;
  }).join('');
  return `
    <div class="card">
      <div class="card-title">📌 ${gram.title}</div>
      <div class="rule-box"><div class="rule-title">의미</div><div style="font-size:14px;color:var(--navy);margin-bottom:4px">${gram.meaning}</div><div style="font-size:13px;color:#475569">🇺🇸 ${gram.en}</div></div>
      <div class="rule-box"><div class="rule-title">형태 규칙</div><div style="font-size:14px;color:var(--navy)">${gram.rule}</div></div>
    </div>
    <div class="card">
      <div class="card-title">📝 예문</div>
      <ul class="example-list">${gram.examples.map(e=>`<li><span class="ko">${e.ko} ${ttsBtn(e.ko)}</span><br><span class="en">${e.en}</span></li>`).join('')}</ul>
    </div>
    <div class="card"><div class="card-title">✏️ 빈칸 채우기 연습</div>${practiceHtml}</div>
    <div class="card"><div class="card-title">📋 TOPIK 유형</div>${topikHtml}</div>`;
}

const RECORDER={
  recognition:null,sttActive:false,currentIdx:-1,scores:{},
  init(){
    if(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia){
      navigator.mediaDevices.getUserMedia({audio:true})
        .then(s=>{s.getTracks().forEach(t=>t.stop());this.showUI('ready');})
        .catch(()=>this.showUI('denied'));
    }else{this.showUI('denied');}
  },
  showUI(state){
    const el=document.getElementById('rec-status');if(!el)return;
    if(state==='ready')el.innerHTML='<p style="color:#059669;font-weight:700">✅ 마이크 준비 완료!</p>';
    else el.innerHTML='<p style="color:#ef4444;font-weight:700">❌ 마이크를 사용할 수 없습니다.</p>';
  },
  toggle(idx){
    if(this.sttActive&&this.currentIdx===idx)this.stopSTT(idx);
    else{if(this.sttActive)this.stopSTT(this.currentIdx);startSTT(idx);}
  },
  stopSTT(idx){
    if(this.recognition){try{this.recognition.stop();}catch(e){}}
    this.sttActive=false;
    const btn=document.getElementById('rec-btn-'+idx);
    if(btn){btn.textContent='🎤 녹음';btn.classList.remove('recording');}
  },
  calcScore(transcript,target){
    if(!transcript||!target)return 0;
    const t=transcript.trim().replace(/[^가-힣a-zA-Z0-9\s]/g,'').toLowerCase();
    const g=target.trim().replace(/[^가-힣a-zA-Z0-9\s]/g,'').toLowerCase();
    if(t===g)return 100;
    const tw=t.split(/\s+/),gw=g.split(/\s+/);
    let m=0;gw.forEach(w=>{if(tw.includes(w))m++;});
    return Math.round((m/Math.max(gw.length,1))*100);
  }
};

async function startSTT(idx){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const rEl=document.getElementById('stt-result');
  if(!SR){if(rEl)rEl.innerHTML='<span style="color:#ef4444">음성 인식 미지원 브라우저입니다.</span>';return;}
  let stream;
  try{stream=await navigator.mediaDevices.getUserMedia({audio:true});}
  catch(e){if(rEl)rEl.innerHTML='<span style="color:#ef4444">마이크 권한이 필요합니다.</span>';return;}
  RECORDER.recognition=new SR();
  RECORDER.recognition.lang='ko-KR';RECORDER.recognition.interimResults=false;
  RECORDER.sttActive=true;RECORDER.currentIdx=idx;
  const btn=document.getElementById('rec-btn-'+idx);
  if(btn){btn.textContent='⏹ 중지';btn.classList.add('recording');}
  if(rEl)rEl.innerHTML='<span style="color:var(--blue)">🎤 듣는 중...</span>';
  RECORDER.recognition.onresult=(e)=>{
    const tr=e.results[0][0].transcript;
    const conf=e.results[0][0].confidence||0.8;
    const target=PRON_SENTS_DATA[idx].sent;
    const base=RECORDER.calcScore(tr,target);
    const score=Math.min(100,Math.round(base*0.7+conf*100*0.3));
    RECORDER.scores[idx]=score;
    const badge=document.getElementById('score-badge-'+idx);
    if(badge){badge.className='score-badge '+(score>=80?'good':score>=50?'ok':'bad');badge.textContent=score+'%';}
    if(rEl)rEl.innerHTML=`<span style="color:var(--navy)">인식: "${tr}"</span> <span style="font-weight:700;color:${score>=80?'#166534':score>=50?'#854d0e':'#991b1b'}">(${score}점)</span>`;
    RECORDER.sttActive=false;
    if(btn){btn.textContent='🎤 녹음';btn.classList.remove('recording');}
    stream.getTracks().forEach(t=>t.stop());
  };
  RECORDER.recognition.onerror=()=>{RECORDER.sttActive=false;if(btn){btn.textContent='🎤 녹음';btn.classList.remove('recording');}stream.getTracks().forEach(t=>t.stop());};
  RECORDER.recognition.onend=()=>{RECORDER.sttActive=false;if(btn){btn.textContent='🎤 녹음';btn.classList.remove('recording');}stream.getTracks().forEach(t=>t.stop());};
  RECORDER.recognition.start();
}

const AI_QUICK_BTNS=[
  {label:'7과 주제 설명',q:'KIIP 4급 7과 "인터넷과 AI" 주제를 한국어로 간단히 설명해 주세요.'},
  {label:'-다시피 연습',q:'"-다시피"를 사용한 예문 3개를 만들어 주세요.'},
  {label:'-(으)ㄴ/는 나머지 연습',q:'"-(으)ㄴ/는 나머지"를 사용한 예문 3개를 만들어 주세요.'},
  {label:'두 문법 비교',q:'"-다시피"와 "-(으)ㄴ/는 나머지"의 차이점을 설명해 주세요.'},
];

const AICHAT={msgs:[],
  add(role,text){this.msgs.push({role,text});this.render();},
  render(){
    const el=document.getElementById('ai-chat');if(!el)return;
    el.innerHTML=this.msgs.map(m=>`<div class="ai-msg ${m.role==='user'?'user':'bot'}">${m.text}</div>`).join('');
    el.scrollTop=el.scrollHeight;
  },
  loading(){
    const el=document.getElementById('ai-chat');if(!el)return;
    el.innerHTML+=`<div class="ai-msg bot" id="ai-loading"><span class="ai-dot"></span><span class="ai-dot"></span><span class="ai-dot"></span></div>`;
    el.scrollTop=el.scrollHeight;
  },
  removeLoading(){const el=document.getElementById('ai-loading');if(el)el.remove();}
};

async function sendAI(preset){
  const inp=document.getElementById('ai-input');
  const q=preset||(inp?inp.value.trim():'');
  if(!q)return;
  AICHAT.add('user',q);
  if(inp)inp.value='';
  AICHAT.loading();
  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'system',content:'당신은 KIIP 4급 한국어 교사입니다. 7과 인터넷과 AI 주제와 문법(-다시피, -(으)ㄴ/는 나머지)을 도와주세요. 항상 한국어로 친절하게 답변하세요.'},{role:'user',content:q}]})});
    const data=await res.json();
    AICHAT.removeLoading();
    AICHAT.add('bot',data.content||data.message||'답변을 가져올 수 없습니다.');
  }catch(e){AICHAT.removeLoading();AICHAT.add('bot','오류가 발생했습니다. 다시 시도해 주세요.');}
}

function showReturnToast(appName,url){
  let t=document.getElementById('return-toast');
  if(!t){t=document.createElement('div');t.id='return-toast';t.className='return-toast';document.body.appendChild(t);}
  t.innerHTML=`<div class="toast-icon">🤖</div><div class="toast-body"><div class="toast-title">${appName} 열기</div><div class="toast-sub">외부 AI 앱으로 이동합니다</div></div><button class="toast-btn" onclick="window.open('${url}','_blank');hideReturnToast()">열기</button><button class="toast-close" onclick="hideReturnToast()">✕</button><div class="toast-timer"></div>`;
  requestAnimationFrame(()=>t.classList.add('show'));
  clearTimeout(window._toastTimer);
  window._toastTimer=setTimeout(()=>hideReturnToast(),8000);
}
function hideReturnToast(){
  const t=document.getElementById('return-toast');
  if(t){t.classList.remove('show');setTimeout(()=>t.remove(),300);}
}

render();
