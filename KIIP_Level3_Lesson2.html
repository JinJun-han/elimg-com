*{margin:0;padding:0;box-sizing:border-box}
:root{--amber:#f59e0b;--dark:#451a03;--brown:#92400e;--orange:#b45309;--green:#22c55e;--red:#ef4444;--gray:#fdf6e3;--white:#fff;--text:#1a202c}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;background:var(--gray);max-width:520px;margin:0 auto;min-height:100vh;overflow-x:hidden}
button{cursor:pointer;border:none;font-family:inherit}
.hide{display:none!important}

/* NAV */
.nav{background:var(--dark);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;min-height:48px}
.nav-title{color:#fff;font-weight:700;font-size:14px}
.nav-sub{color:#d97706;font-size:12px}
.nav-back{background:none;color:#fff;font-size:14px;padding:8px 0;text-decoration:none;min-height:44px;display:flex;align-items:center}

/* SECTION TABS */
.section-tabs{background:#78350f;position:sticky;top:48px;z-index:99;overflow-x:auto;white-space:nowrap;display:flex;padding:6px 8px;gap:4px;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory}
.section-tabs::-webkit-scrollbar{height:3px}
.section-tabs::-webkit-scrollbar-thumb{background:#f59e0b;border-radius:2px}
.stab{display:inline-flex;align-items:center;gap:5px;padding:10px 14px;border-radius:20px;background:transparent;color:rgba(255,255,255,0.75);font-size:12px;font-weight:600;flex-shrink:0;min-height:44px;scroll-snap-align:start}
.stab.active{background:var(--amber);color:#fff}

/* CONTENT */
.page{padding:16px;padding-bottom:88px}
h2{color:var(--brown);font-size:18px;margin-bottom:4px;font-weight:800}
.sub{color:#888;font-size:12px;margin-bottom:14px}
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #fde68a}
.card-accent{border-left:4px solid var(--amber)}
.card-green{border-left:4px solid var(--green)}

/* VOCAB */
.vocab-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.vocab-card{background:#fff;border-radius:10px;padding:14px 12px;border:2px solid #fde68a;cursor:pointer;transition:all 0.2s;text-align:center;min-height:88px;display:flex;flex-direction:column;justify-content:center;align-items:center}
.vocab-card:active{border-color:var(--amber);transform:scale(0.98)}
.vocab-card.flipped{background:#fffbeb;border-color:var(--amber)}
.vocab-kor{font-size:15px;font-weight:800;color:var(--brown)}
.vocab-pron{font-size:12px;color:#b45309;margin-top:2px}
.vocab-eng{font-size:12px;color:#555;margin-top:4px}
.vocab-vi{font-size:12px;color:#888;margin-top:2px}
.vocab-cat{font-size:12px;font-weight:700;color:var(--amber);background:#fffbeb;padding:3px 10px;border-radius:8px;display:inline-block;margin-bottom:8px}

/* TTS */
.tts-btn{background:var(--amber);color:#fff;border-radius:50%;width:44px;height:44px;font-size:16px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:4px;vertical-align:middle;-webkit-tap-highlight-color:transparent}
.tts-btn:active{background:var(--brown);transform:scale(0.95)}

/* GRAMMAR */
.gram-box{background:#fffbeb;border-radius:12px;padding:14px;margin-bottom:12px;border:2px solid #fde68a}
.gram-title{font-size:16px;font-weight:800;color:var(--brown);margin-bottom:4px}
.gram-eng{font-size:12px;color:#888;margin-bottom:8px}

.gram-conj{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.conj-chip{background:var(--amber);color:#fff;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;min-height:36px;display:inline-flex;align-items:center}
.example-item{display:flex;align-items:flex-start;gap:8px;padding:10px 0;border-bottom:1px solid #fde68a}

.example-kor{font-size:14px;font-weight:600;color:var(--text);flex:1}
.example-eng{font-size:12px;color:#888;margin-top:2px}

.answer-reveal{background:var(--amber);color:#fff;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700}

.pron-phonetic{font-size:13px;color:var(--orange);margin-left:8px}

/* READING */
.reading-text{background:#fff;border-radius:12px;padding:16px;border:1px solid #fde68a;line-height:2;font-size:15px;color:var(--text);margin-bottom:12px}

/* WRITING */
.writing-guide{background:#fffbeb;border-radius:10px;padding:12px;margin-bottom:10px;border-left:4px solid var(--amber)}

.writing-area:focus{outline:none;border-color:var(--amber)}
.char-counter{text-align:right;font-size:12px;color:#888;margin-top:4px}
.sample-answer{background:#fffbeb;border-radius:10px;padding:14px;border:1px solid #fde68a;font-size:14px;line-height:1.9;color:var(--text)}

/* QUIZ */

.quiz-q{font-size:15px;font-weight:700;color:var(--brown);margin-bottom:12px;line-height:1.6}
.quiz-num{font-size:12px;color:var(--amber);font-weight:700;margin-bottom:6px}

.quiz-correct{background:#dcfce7;border-color:var(--green);color:#166534}
.quiz-wrong{background:#fee2e2;border-color:var(--red);color:#991b1b}

.score-big{font-size:48px;font-weight:800;color:var(--amber)}

.bnav-btn{background:none;padding:6px 4px;font-size:12px;color:#888;display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-height:44px;justify-content:center;-webkit-tap-highlight-color:transparent}
.bnav-btn.active{color:var(--amber);font-weight:700}
.bnav-icon{font-size:20px}

.intro-header{background:linear-gradient(135deg,#451a03,#92400e,#b45309);color:#fff;border-radius:12px;padding:20px;margin-bottom:12px;text-align:center}
.intro-header h3{font-size:20px;font-weight:800;margin-bottom:4px}
.obj-item{display:flex;align-items:flex-start;gap:8px;padding:10px 0;border-bottom:1px solid #fde68a;font-size:14px;color:var(--text)}
.obj-item:last-child{border-bottom:none}
.obj-check{color:var(--amber);font-size:16px;flex-shrink:0;margin-top:1px}
.think-q{background:#fef3c7;border-radius:10px;padding:14px;margin-bottom:8px;font-size:14px;color:var(--brown);border-left:4px solid var(--amber);line-height:1.6}
.think-q .eng{font-size:12px;color:#888;margin-top:4px;font-style:italic}

.section-label{display:inline-block;background:var(--amber);color:#fff;font-size:12px;font-weight:700;padding:4px 12px;border-radius:12px;margin-bottom:8px}

.lang-bar{background:#fef3c7;display:flex;justify-content:center;gap:8px;padding:8px}
.lang-btn-sm{background:rgba(180,83,9,0.1);border:1px solid #fbbf24;color:#92400e;padding:8px 16px;border-radius:20px;font-size:13px;cursor:pointer;min-height:44px;display:inline-flex;align-items:center}
.lang-btn-sm.active{background:var(--amber);color:#fff;border-color:var(--amber)}

/* AI CHAT LOADING DOTS */
@keyframes aiDot{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}

<script>
// ===== TTS =====
const TTS = {
  speak(text, lang='ko-KR', rate=0.8) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang; u.rate = rate; u.pitch = 1;
    const voices = window.speechSynthesis.getVoices();
    const koVoice = voices.find(v => v.lang.startsWith('ko')) || voices.find(v => v.lang.includes('ko'));
    if (koVoice) u.voice = koVoice;
    window.speechSynthesis.speak(u);
  },
  init() { if (window.speechSynthesis) window.speechSynthesis.getVoices(); }
};
window.addEventListener('load', () => { TTS.init(); setTimeout(TTS.init, 500); });

function ttsBtn(text) {
  return `<button class="tts-btn" onclick="event.stopPropagation();TTS.speak('${text.replace(/'/g,"\\'").replace(/"/g,"&quot;")}')" title="발음 듣기">🔊</button>`;

  history: [],

  quickSend: function(idx) {

      + '<div style="max-width:90%;padding:10px 13px;border-radius:' + (isUser?'14px 14px 4px 14px':'14px 14px 14px 4px') + ';'
      + 'background:' + (isUser?'#f59e0b':'#fff') + ';color:' + (isUser?'#fff':'#1a202c') + ';'

  setLoading: function(on) {
    var box = document.getElementById('ai-chat-messages');
    var el  = document.getElementById('ai-loading-dot');
    var btn = document.getElementById('ai-send-btn');
    if (on) {
      if (box && !el) {
        var ld = document.createElement('div');
        ld.id = 'ai-loading-dot';
        ld.style.cssText = 'display:flex;align-items:center;gap:8px;padding:8px;margin-bottom:6px';
        ld.innerHTML = '<div style="display:flex;gap:4px">'
          + '<div style="width:9px;height:9px;border-radius:50%;background:#f59e0b;animation:aiDot 1s 0s ease-in-out infinite"></div>'

        box.appendChild(ld);
        box.scrollTop = box.scrollHeight;
      }
      if (btn) { btn.textContent = '⏳'; btn.disabled = true; }
    } else {
      if (el) el.remove();
      if (btn) { btn.textContent = '➤'; btn.disabled = false; }
    }
  },

  send: async function() {
    if (this.loading) return;
    var inp  = document.getElementById('ai-chat-input');
    var text = inp ? inp.value.trim() : '';
    if (!text) return;
    this.history.push({role:'user', content:text});
    this.addMsg('user', text);
    if (inp) inp.value = '';
    this.loading = true;
    this.setLoading(true);
    var sys = 'You are a Korean language tutor for KIIP Level 3 Lesson 2 (건강한 생활 / Healthy Living). The student is likely Vietnamese. Answer in Korean with Vietnamese translation. Be concise and friendly. Focus on KIIP content.';
    try {
      var res = await fetch('/kiip/ai', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'system',content:sys},{role:'user',content:text}]})});
      var data = await res.json();
      var reply = data.choices[0].message.content;
      if (!reply || reply.trim() === '') throw new Error('빈 응답');
      this.history.push({role:'assistant', content:reply});
      this.setLoading(false);
      this.addMsg('assistant', reply);
    } catch(e) {
      this.setLoading(false);
      this.addMsg('assistant', '⚠️ AI 연결 오류\n오류: ' + e.message + '\n\n해결 방법:\n1. 잠시 후 다시 시도해 주세요\n2. 인터넷 연결을 확인해 주세요\n🇻🇳 Lỗi kết nối AI — Thử lại sau ít phút');
    }
    this.loading = false;
  }
};

const RECORDER = {
  streams: {}, recorders: {}, chunks: {}, audioURLs: {}, isRecording: {},

  async start(idx, targetText, recBtn) {
    const resultEl = document.getElementById('stt-result-' + idx);
    const playBtn  = document.getElementById('play-btn-' + idx);
    const scoreEl  = document.getElementById('score-bar-' + idx);
    if (this.isRecording[idx]) { this.stop(idx, targetText, recBtn); return; }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio: true});
      this.streams[idx] = stream;
    } catch(e) {
      const name = e.name || '';
      let msg = '';
      if (name === 'NotAllowedError' || name === 'PermissionDeniedError') {
        msg = '❌ <strong>마이크가 차단됨</strong> — 주소창 왼쪽 🔒 → 마이크 → <strong>허용</strong> 후 새로고침<br><span style="color:#555">🇻🇳 Micro bị chặn — Nhấn 🔒 → Micro → Cho phép → F5</span>';
      } else if (name === 'NotFoundError') {
        msg = '❌ <strong>마이크를 찾을 수 없어요</strong> — 마이크 연결 확인';
      } else {
        msg = '❌ <strong>오류: ' + name + '</strong> — Chrome/Edge에서 다시 시도';
      }
      if (resultEl) resultEl.innerHTML = '<span style="color:#ef4444;font-size:11px;line-height:1.7">' + msg + '</span>';
      return;
    }
    this.chunks[idx] = [];
    const mr = new MediaRecorder(this.streams[idx]);
    this.recorders[idx] = mr;
    mr.ondataavailable = e => { if (e.data.size > 0) this.chunks[idx].push(e.data); };
    mr.onstop = () => {
      if (this.audioURLs[idx]) URL.revokeObjectURL(this.audioURLs[idx]);
      const blob = new Blob(this.chunks[idx], {type: 'audio/webm'});
      this.audioURLs[idx] = URL.createObjectURL(blob);
      if (playBtn) {
        playBtn.disabled = false; playBtn.style.opacity = '1';
        playBtn.onclick = () => { const a = new Audio(this.audioURLs[idx]); a.play(); };
      }
    };
    mr.start();
    this.isRecording[idx] = true;
    recBtn.textContent = '⏹ 중지'; recBtn.style.background = '#ef4444';
    if (resultEl) resultEl.innerHTML = '<span style="color:#ef4444;font-weight:700">● 녹음 중... · 🇻🇳 Đang ghi âm...</span>';
    if (scoreEl) scoreEl.style.width = '0%';
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR) {
      const rec = new SR();
      rec.lang = 'ko-KR'; rec.continuous = false; rec.interimResults = false;
      rec.onresult = (e) => {
        const said = e.results[0][0].transcript.replace(/[\s,.?!]/g,'');
        const target = targetText.replace(/[\s,.?!]/g,'');
        const conf = e.results[0][0].confidence;
        let match = 0;
        const minLen = Math.min(said.length, target.length);
        for (let i = 0; i < minLen; i++) { if (said[i] === target[i]) match++; }
        const pct = target.length > 0 ? Math.round(match / target.length * 100) : 0;
        const confPct = Math.round((conf || 0.5) * 100);
        const finalPct = Math.round((pct * 0.7) + (confPct * 0.3));
        const color = finalPct >= 80 ? '#22c55e' : finalPct >= 50 ? '#f59e0b' : '#ef4444';
        const msg = finalPct >= 80 ? '✅ 완벽해요! · Tuyệt vời!' : finalPct >= 50 ? '🔄 조금 더 연습! · Luyện thêm chút!' : '❌ 다시 시도! · Thử lại!';
        if (resultEl) resultEl.innerHTML = '<span style="color:' + color + ';font-weight:800">' + msg + '</span><br><span style="font-size:10px;color:#555">인식: "' + e.results[0][0].transcript + '"</span>';
        if (scoreEl) { scoreEl.style.width = finalPct + '%'; scoreEl.style.background = color; }
      };
      rec.onerror = () => {};
      rec.start();
    }
  },

  async autoDetect() {
    const stateEl = document.getElementById('mic-perm-state');
    const blockedGuide = document.getElementById('mic-blocked-guide');
    const allowBtn = document.getElementById('mic-allow-btn');
    if (!stateEl) return;
    if (navigator.permissions) {
      try {
        const result = await navigator.permissions.query({name: 'microphone'});
        if (result.state === 'granted') {
          stateEl.innerHTML = '<div style="background:#dcfce7;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#166534;font-weight:700">✅ 마이크 이미 허용됨 — 바로 녹음하세요! · 🇻🇳 Đã cho phép!</div>';
          if (allowBtn) { allowBtn.style.background = '#166534'; allowBtn.textContent = '✅ 허용됨 — 바로 녹음하세요'; }
          if (blockedGuide) blockedGuide.style.display = 'none';
          return;
        } else if (result.state === 'denied') {
          stateEl.innerHTML = '<div style="background:#fee2e2;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#991b1b;font-weight:700">🚫 마이크 차단됨 — 아래 빨간 박스 순서대로 해결하세요</div>';
          if (blockedGuide) blockedGuide.style.display = 'block';
          if (allowBtn) { allowBtn.style.background = '#ef4444'; allowBtn.textContent = '⚠️ 차단됨 — 위 단계 완료 후 여기 클릭'; }
          return;
        } else {
          stateEl.innerHTML = '<div style="background:#fef9c3;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#92400e">❓ 아직 허용 안 됨 — 아래 버튼을 눌러 허용해 주세요</div>';
        }
        result.onchange = () => RECORDER.autoDetect();
      } catch(e) {
        stateEl.innerHTML = '<div style="font-size:11px;color:#888">아래 버튼을 눌러 마이크 허용 여부를 확인하세요</div>';
      }
    } else {
      stateEl.innerHTML = '<div style="font-size:11px;color:#888">아래 버튼을 눌러 마이크 허용 여부를 확인하세요</div>';
    }
  },

  async checkPermission(btn) {
    const statusEl = document.getElementById('mic-status');
    const box = document.getElementById('mic-check-box');
    const blockedGuide = document.getElementById('mic-blocked-guide');
    const stateEl = document.getElementById('mic-perm-state');
    btn.textContent = '⏳ 확인 중...'; btn.disabled = true;
    if (location.protocol === 'file:') {
      if (statusEl) statusEl.innerHTML = '<span style="color:#ef4444">❌ file:// 불가 → elimg.com 에서 열기</span>';
      btn.textContent = '🎙️ 마이크 허용하기'; btn.disabled = false; return;
    }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      if (statusEl) statusEl.innerHTML = '<span style="color:#ef4444">❌ 미지원 브라우저 — Chrome 또는 Edge를 사용해 주세요</span>';
      btn.textContent = '🎙️ 마이크 허용하기'; btn.disabled = false; return;
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio: true});
      stream.getTracks().forEach(t => t.stop());
      if (stateEl) stateEl.innerHTML = '<div style="background:#dcfce7;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#166534;font-weight:700">✅ 마이크 허용됨! 아래에서 바로 녹음하세요!</div>';
      if (statusEl) statusEl.innerHTML = '<span style="color:#059669;font-weight:700">✅ 성공! 🇻🇳 Đã cho phép!</span>';
      if (box) { box.style.background = '#dcfce7'; box.style.borderColor = '#86efac'; }
      if (blockedGuide) blockedGuide.style.display = 'none';
      btn.textContent = '✅ 허용됨 — 바로 녹음하세요!'; btn.style.background = '#166534'; btn.disabled = false;
    } catch(e) {
      const name = e.name || '';
      btn.disabled = false;
      if (name === 'NotAllowedError' || name === 'PermissionDeniedError') {
        if (blockedGuide) blockedGuide.style.display = 'block';
        if (stateEl) stateEl.innerHTML = '<div style="background:#fee2e2;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#991b1b;font-weight:700">🚫 마이크 차단됨 — 빨간 박스 순서대로 해결 후 다시 클릭</div>';
        if (statusEl) statusEl.innerHTML = '<span style="color:#ef4444;font-size:11px">🔒 허용 완료 후 이 버튼을 다시 눌러주세요</span>';
        btn.textContent = '🔄 허용 완료 후 다시 클릭'; btn.style.background = '#ef4444';
      } else {
        if (statusEl) statusEl.innerHTML = '<span style="color:#ef4444">오류 (' + (name||'unknown') + ') — Chrome/Edge에서 다시 시도</span>';
        btn.textContent = '🔄 다시 시도'; btn.style.background = '#92400e';
      }
    }
  },

  stop(idx, targetText, recBtn) {
    if (this.recorders[idx] && this.recorders[idx].state !== 'inactive') this.recorders[idx].stop();
    if (this.streams[idx]) this.streams[idx].getTracks().forEach(t => t.stop());
    this.isRecording[idx] = false;
    recBtn.textContent = '🎤 다시 녹음'; recBtn.style.background = '#059669';
  }
};

function startSTT(idx, targetText, recBtn) {
  RECORDER.start(idx, targetText, recBtn);
}

// SECTION 9: 퀴즈
function answerQuiz(qi, oi) {
  if (STATE.quizDone || STATE.quizAnswers[qi] !== undefined) return;
  setState({quizAnswers: {...STATE.quizAnswers, [qi]: oi}});
}

function finishQuiz() {
  setState({quizDone: true});
}

function renderQuiz() {
  const answered = Object.keys(STATE.quizAnswers).length;
  const correct = QUIZ.filter((q,i) => STATE.quizAnswers[i] === q.ans).length;
  const pct = Math.round(correct / QUIZ.length * 100);

  if (STATE.quizDone) {
    return `
      <div class="page">
        <h2>✅ 퀴즈 결과</h2>
        <div class="quiz-result">
          <div style="font-size:36px;margin-bottom:8px">${pct>=80?'🏆':pct>=60?'👍':'💪'}</div>
          <div class="score-big">${correct}/${QUIZ.length}</div>
          <div style="font-size:18px;font-weight:700;color:#92400e;margin-top:4px">${pct}점</div>
          <div style="font-size:13px;color:#888;margin-bottom:16px">${pct>=80?'잘했어요! 다음 단원으로 이동하세요.':'틀린 문제를 다시 확인하고 복습하세요.'}</div>
          <button onclick="setState({quizAnswers:{},quizDone:false})" style="background:#f59e0b;color:#fff;border-radius:10px;padding:12px 24px;font-size:14px;font-weight:700;margin-bottom:8px;width:100%">다시 풀기</button>
          <a href="/KIIP_Level3_Lesson3" style="display:block;background:#92400e;color:#fff;border-radius:10px;padding:12px 24px;font-size:14px;font-weight:700;text-align:center;text-decoration:none">다음 과: 3과 →</a>
        </div>

        <div style="margin-top:16px">
          ${QUIZ.map((q,i)=>{
            const chosen = STATE.quizAnswers[i];
            const ok = chosen === q.ans;
            return `
              <div class="quiz-card" style="border-left:4px solid ${ok?'var(--green)':'var(--red)'}">
                <div class="quiz-num">Q${i+1} ${ok?'✅':'❌'}</div>
                <div class="quiz-q">${q.q}</div>
                <div style="font-size:13px;background:${ok?'#dcfce7':'#fee2e2'};border-radius:8px;padding:8px 10px;color:${ok?'#166534':'#991b1b'}">
                  정답: ${q.opts[q.ans]}
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }

  return `
    <div class="page">
      <h2>✅ 퀴즈</h2>
      <p class="sub">2과 건강한 생활 · ${QUIZ.length}문제 · ${answered}/${QUIZ.length} 완료</p>

      <div style="background:#d1fae5;border-radius:8px;height:6px;overflow:hidden;margin-bottom:12px">
        <div style="background:#22c55e;height:100%;width:${answered/QUIZ.length*100}%;transition:width 0.3s"></div>
      </div>

      ${QUIZ.map((q,qi)=>{
        const chosen = STATE.quizAnswers[qi];
        return `
          <div class="quiz-card">
            <div class="quiz-num">Q${qi+1}</div>
            <div class="quiz-q" style="white-space:pre-line">${q.q}</div>
            ${q.opts.map((o,oi)=>{
              let cls = 'quiz-opt';
              if (chosen !== undefined) {
                if (oi === q.ans) cls += ' quiz-correct';
                else if (oi === chosen) cls += ' quiz-wrong';
              }
              return `<button class="${cls}" onclick="answerQuiz(${qi},${oi})" ${chosen!==undefined?'disabled':''}>${o}</button>`;
            }).join('')}
          </div>
        `;
      }).join('')}

      ${answered === QUIZ.length ?
        `<button onclick="finishQuiz()" style="width:100%;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;border-radius:12px;padding:14px;font-size:16px;font-weight:700;margin-top:8px">결과 확인 →</button>` :
        `<div style="text-align:center;padding:12px;font-size:13px;color:#888">모든 문제에 답한 후 결과를 확인할 수 있어요 (${answered}/${QUIZ.length})</div>`
      }
    </div>
  `;
}

                주소창 왼쪽 🔒 클릭 → 마이크 → <strong>허용</strong> → F5<br>
                <strong style="color:#059669">📱 Android Chrome:</strong><br>
                주소창 ⋮ → 사이트 설정 → 마이크 → 허용
              </div>
              <div style="margin-top:8px;font-size:11px;color:#059669">
                🇻🇳 Nhấn 🔒 góc trái → Micro → Cho phép → F5
              </div>
            </div>
            <button id="mic-allow-btn" onclick="RECORDER.checkPermission(this)"
              style="width:100%;background:#059669;color:#fff;border-radius:8px;padding:12px;font-size:14px;font-weight:800">
              🎙️ 마이크 허용하기 (여기 클릭)
            </button>
            <div id="mic-status" style="font-size:11px;margin-top:6px;text-align:center;min-height:16px"></div>
          </div>
          ${PRON_SENTS.map((item,i)=>`
            <div style="background:#f0fdf4;border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid #86efac">
              <div style="font-size:13px;font-weight:700;color:#14532d;margin-bottom:2px">${item.sent}</div>
              <div style="font-size:10px;color:#059669;margin-bottom:8px">🇻🇳 ${item.vi}</div>
              <div style="background:#bbf7d0;border-radius:6px;height:6px;margin-bottom:8px;overflow:hidden">
                <div id="score-bar-${i}" style="height:100%;width:0%;background:#22c55e;transition:width 0.5s;border-radius:6px"></div>
              </div>
              <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
                <button onclick="TTS.speak('${item.sent.replace(/'/g,"\\'")}'); this.textContent='🔊 재생 중...'; setTimeout(()=>this.textContent='🔊 원어민',2000)"
                  style="background:#f59e0b;color:#fff;border-radius:16px;padding:5px 12px;font-size:11px;font-weight:700;flex-shrink:0">🔊 원어민</button>
                <button id="rec-btn-${i}" onclick="startSTT(${i},'${item.sent.replace(/'/g,"\\'")}',this)"
                  style="background:#059669;color:#fff;border-radius:16px;padding:5px 12px;font-size:11px;font-weight:700;flex-shrink:0">🎤 녹음</button>
                <button id="play-btn-${i}" disabled
                  style="background:#1d4ed8;color:#fff;border-radius:16px;padding:5px 12px;font-size:11px;font-weight:700;flex-shrink:0;opacity:0.4">▶ 내 발음 듣기</button>
              </div>
              <div id="stt-result-${i}" style="font-size:11px;margin-top:6px;min-height:16px"></div>
            </div>
          `).join('')}
          <div style="background:#f0fdf4;border-radius:8px;padding:10px;font-size:11px;color:#166534;line-height:1.8;margin-top:4px">
            <strong>📖 사용법:</strong><br>
            1️⃣ 🔊 원어민 — 원어민 발음 먼저 들으세요<br>
            2️⃣ 🎤 녹음 — 버튼 누르고 말하세요 → 다시 누르면 중지<br>
            3️⃣ ▶ 내 발음 듣기 — 녹음 후 활성화<br>
            4️⃣ 정확도 바: 🟢 80%+ 🟡 50~79% 🔴 50% 미만
          </div>
        </div>

        <div class="card" style="background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1px solid #86efac">
          <div class="section-label" style="background:#059669">🌐 글로컬 G스택 학습법</div>
          <div style="font-size:12px;color:#166534;margin:8px 0;line-height:1.8">
            <strong>글로컬 아카데미 AI 에이전트 기반 4단계 학습법:</strong><br>
            <span style="color:#555">① 어휘/문법 → Gemini 설명 요청</span><br>
            <span style="color:#555">② 말하기 → Gemini 롤플레이 실습</span><br>
            <span style="color:#555">③ 쓰기 → Claude AI 첨삭</span><br>
            <span style="color:#555">④ 복습 → NotebookLM Q&amp;A 정리</span><br>
            <br>
            <span style="color:#059669;font-size:11px">🇻🇳 <strong>Phương pháp 4 bước của Glocal Academy:</strong><br>
            ① Từ vựng/ngữ pháp → Hỏi Gemini<br>
            ② Nói → Nhập vai với Gemini<br>
            ③ Viết → Nhờ Claude sửa bài<br>
            ④ Ôn tập → Tổng hợp với NotebookLM</span>
          </div>
        </div>
        </div>
      `;
    }
    default: return renderIntro();
  }
}

function render() {
  document.getElementById('app').innerHTML =
    renderNav() +
    renderLangBar() +
    renderTabs() +
    renderSection() +
    renderBottomNav();
  window.scrollTo(0, 0);
}

render();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}
</script>
</body>
</html>
