const TTS={
  speak(text,lang='ko-KR',rate=0.8){
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang=lang;u.rate=rate;
    window.speechSynthesis.speak(u);
  },
  init(){if(window.speechSynthesis)window.speechSynthesis.getVoices();}
};
window.addEventListener('load',()=>{TTS.init();setTimeout(TTS.init,500);});

function ttsBtn(text,lang='ko-KR'){
  const safe=text.replace(/'/g,"\\'").replace(/"/g,'&quot;');

const RECORDER={
  stream:null,mediaRecorder:null,chunks:[],isRecording:false,
  recognition:null,sttActive:false,currentIdx:-1,scores:{},
  autoDetect(){
    const st=document.getElementById('rec-status');
    if(!st)return;
    if(!navigator.mediaDevices&&!window.SpeechRecognition&&!window.webkitSpeechRecognition){
      st.innerHTML='<p style="color:#ef4444;font-size:13px">⚠️ 이 기기는 음성 인식을 지원하지 않습니다.</p>';return;
    }
    st.innerHTML='<p style="color:#059669;font-size:13px">✅ 마이크 준비 완료. 문장 옆 🎤 버튼을 누르세요.</p>';
  },
  toggle(idx,sents){
    if(this.sttActive&&this.currentIdx===idx){this.stopSTT(idx);}
    else{if(this.sttActive)this.stopSTT(this.currentIdx);this.startSTT(idx,sents);}
  },
  startSTT(idx,sents){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR)return;
    this.recognition=new SR();
    this.recognition.lang='ko-KR';
    this.recognition.interimResults=false;
    this.recognition.maxAlternatives=1;
    this.sttActive=true;
    this.currentIdx=idx;
    const btn=document.getElementById('rec-btn-'+idx);
    if(btn){btn.textContent='⏹ 중지';btn.classList.add('recording');}
    this.recognition.onresult=(e)=>{
      const transcript=e.results[0][0].transcript;
      const score=this.calcScore(transcript,sents[idx]);
      this.scores[idx]=score;
      const badge=document.getElementById('score-badge-'+idx);
      if(badge){
        badge.textContent=score;
        badge.className='score-badge '+(score>=80?'good':score>=50?'ok':'bad');
      }
      const res=document.getElementById('stt-result');
      if(res)res.innerHTML=`<span style="color:#059669">인식: "${transcript}"</span>`;
      this.stopSTT(idx);
    };
    this.recognition.onerror=()=>this.stopSTT(idx);
    this.recognition.onend=()=>this.stopSTT(idx);
    this.recognition.start();
  },
  stopSTT(idx){
    if(this.recognition){try{this.recognition.stop();}catch(e){}}
    this.sttActive=false;
    const btn=document.getElementById('rec-btn-'+idx);
    if(btn){btn.textContent='🎤 녹음';btn.classList.remove('recording');}
  },
  calcScore(transcript,target){
    const t=transcript.replace(/[.,?!]/g,'').toLowerCase();
    const g=target.replace(/[.,?!]/g,'').toLowerCase();
    const tw=t.split(' ');const gw=g.split(' ');
    let match=0;
    gw.forEach(w=>{if(tw.includes(w))match++;});
    return Math.round((match/gw.length)*100);
  }
};

    {year:'BC 2333년',event:'고조선 건국',desc:'단군왕검이 아사달(평양)을 수도로 한국 최초의 국가를 세웠습니다.'},

    {year:'668년',event:'신라 삼국 통일',desc:'신라가 당나라와 동맹하여 백제와 고구려를 멸망시키고 한반도를 통일했습니다.'},
    {year:'918년',event:'고려 건국',desc:'왕건이 고려를 세우고 개성을 수도로 정했습니다. 불교가 국교로 발전했습니다.'},
    {year:'1234년',event:'세계 최초 금속활자',desc:'고려에서 세계 최초로 금속활자를 발명하여 책을 인쇄했습니다.'},
    {year:'1251년',event:'팔만대장경 완성',desc:'고려가 몽골 침략을 부처님의 힘으로 막기 위해 팔만대장경을 완성했습니다.'},
    {year:'1392년',event:'조선 건국',desc:'이성계가 조선을 세우고 유교를 기본 이념으로 채택했습니다. 수도는 한양(서울)입니다.'},
    {year:'1443년',event:'한글 창제',desc:'세종대왕이 훈민정음(한글)을 창제하여 백성들이 쉽게 글을 배울 수 있게 했습니다.'},
    {year:'1592~1598년',event:'임진왜란',desc:'일본의 침략에 이순신 장군이 거북선으로 맞서 싸워 나라를 지켰습니다.'},
  ];
  return `<h2>🗓️ 역사 연표</h2>
    <p style="font-size:13px;color:#64748b;margin-bottom:16px">주요 역사적 사건을 순서대로 정리했습니다.</p>
    ${events.map(e=>`
      <div class="timeline-item">
        <div class="timeline-year">📅 ${e.year}</div>
        <div class="timeline-event">⭐ ${e.event}</div>
        <div class="timeline-desc">${e.desc}</div>
      </div>`).join('')}`;
}

function renderReading(){
  return `<h2>📖 읽기</h2>
    <div class="card">
      <div class="card-title">📄 세종대왕과 한글</div>
      <div class="reading-text">
        조선의 제4대 왕 <span class="highlight">세종대왕</span>(1397~1450)은 한국 역사에서 가장 존경받는 왕입니다. 1443년, 세종대왕은 신하들과 함께 <span class="highlight">훈민정음</span>(訓民正音), 즉 오늘날의 한글을 창제했습니다.<br><br>
        한글 창제 이전에는 한자를 사용했습니다. 한자는 배우기 어려워 많은 백성들이 글을 읽고 쓸 수 없었습니다. 세종대왕은 이를 안타깝게 여겨 <span class="highlight">"백성을 가르치는 바른 소리"</span>라는 뜻의 훈민정음을 만들었습니다.<br><br>
        한글은 자음 14개와 모음 10개로 이루어진 과학적인 문자입니다. 하루 만에도 배울 수 있을 만큼 쉬운 것으로 유명합니다. 오늘날 한글은 유네스코에서 세계 최고의 문자 중 하나로 인정받고 있으며, 10월 9일은 한글날로 국경일입니다.
      </div>
      <div class="listen-q">
        <div class="q-text">세종대왕이 한글을 만든 이유는?</div>
        <button class="reveal-btn" onclick="setState({readAnswers:{...STATE.readAnswers,r1:true}})">정답 확인</button>
        ${STATE.readAnswers.r1?`<div class="answer-reveal">✅ 한자를 배우기 어려워 글을 못 읽는 백성들을 위해 쉬운 글자를 만들었습니다.</div>`:''}
      </div>
    </div>`;
}

function renderWriting(){
  return `<h2>✏️ 쓰기 연습</h2>
    <div class="card">
      <div class="card-title">📝 역사 정리 쓰기</div>
      <div class="writing-guide">
        <p style="font-size:14px;font-weight:700;color:var(--dark);margin-bottom:8px">📌 다음 내용을 포함하여 한국의 고대 역사를 150자 이상 써 보세요.</p>
        <ul>
          <li>고조선의 건국자와 건국 이념</li>
          <li>삼국시대의 세 나라</li>
          <li>고려 또는 조선의 특징</li>
        </ul>
      </div>
      <textarea placeholder="여기에 한국어로 써 보세요..." oninput="STATE.writingText=this.value">${STATE.writingText}</textarea>
      <div style="text-align:right;font-size:12px;color:#64748b;margin-top:4px">${STATE.writingText.length}자</div>
      <button class="reveal-btn" onclick="setState({sampleShown:!STATE.sampleShown})">${STATE.sampleShown?'예문 숨기기':'예문 보기'}</button>
      ${STATE.sampleShown?`<div class="sample-box">
        한국의 역사는 기원전 2333년 단군왕검이 세운 고조선에서 시작됩니다. 고조선의 건국 이념은 홍익인간, 즉 "인간 세계를 널리 이롭게 한다"는 뜻입니다. 이후 고구려, 백제, 신라의 삼국시대가 열렸고, 668년 신라가 삼국을 통일했습니다. 918년에는 왕건이 고려를 세웠고 불교 문화가 크게 발달했습니다. 1392년 이성계가 조선을 건국했으며, 세종대왕은 1443년 한글을 창제하여 모든 백성이 글을 배울 수 있게 하였습니다.
      </div>`:''}
    </div>`;
}

function renderCulture(){
  return `<h2>🎎 문화 알기</h2>
    <div class="culture-section">
      <h4>🏯 경복궁 — 조선의 으뜸 궁궐</h4>
      <p>경복궁은 1395년 조선 태조 이성계가 한양에 세운 첫 번째 궁궐입니다. "경복(景福)"이란 "큰 복을 누린다"는 뜻입니다. 임진왜란 때 소실되었다가 1867년 흥선대원군 때 재건되었습니다. 현재 서울 북쪽에 있으며 매년 수많은 관광객이 방문합니다.</p>
    </div>
    <div class="culture-section">
      <h4>📜 팔만대장경 — 세계 최고의 목판 인쇄물</h4>
      <p>팔만대장경(八萬大藏經)은 고려시대(1236~1251년) 몽골의 침략을 부처님의 힘으로 막기 위해 만든 불교 경전 목판입니다. 약 8만 1,258장의 목판으로 이루어져 있으며, 800년이 지난 지금도 온전히 보존되어 있습니다. 경남 합천 해인사에 보관되어 있으며 유네스코 세계기록유산입니다.</p>
    </div>
    <div class="culture-section">
      <h4>⚓ 거북선 — 이순신 장군의 전투선</h4>
      <p>거북선은 조선 임진왜란(1592~1598년) 때 이순신 장군이 만든 전투선입니다. 배 위에 덮개를 씌워 적의 공격을 막고, 앞부분에 용머리 모양의 대포를 달았습니다. 거북선은 세계 최초의 철갑선으로 알려져 있으며, 이를 이용해 일본 해군을 여러 번 크게 물리쳤습니다.</p>
    </div>
    <div class="culture-section">
      <h4>🏺 고려청자 — 천하 제일의 아름다움</h4>
      <p>고려청자(高麗靑瓷)는 고려시대(918~1392년)에 만들어진 청색빛 도자기입니다. 독특한 비취색과 섬세한 상감 기법이 특징으로, 당시 중국에서도 "천하제일"이라고 극찬했습니다. 현재 국내외 박물관에서 귀한 문화재로 소장되어 있습니다.</p>
    </div>`;
}

function renderQuiz(){
  if(STATE.quizDone){
    const correct=QUIZ.filter((q,i)=>STATE.quizAnswers[i]===q.answer).length;
    return `<h2>✅ 퀴즈 결과</h2>
      <div class="quiz-score">
        <div class="score-num">${correct}/${QUIZ.length}</div>
        <div style="font-size:16px;margin-top:8px">${correct>=8?'🎉 훌륭해요!':correct>=5?'👍 잘했어요!':'📚 다시 복습해 보세요'}</div>
      </div>
      <button class="reveal-btn" style="margin-top:16px;width:100%" onclick="setState({quizDone:false,quizAnswers:{}})">🔄 다시 풀기</button>`;
  }
  return `<h2>✅ 이해도 퀴즈</h2>
    <p style="font-size:13px;color:#64748b;margin-bottom:16px">한국의 역사 1에 대한 이해도를 확인하세요. (10문제)</p>
    ${QUIZ.map((q,i)=>`
      <div class="quiz-card${STATE.quizAnswers[i]!==undefined?(STATE.quizAnswers[i]===q.answer?' answered-correct':' answered-wrong'):''}">
        <div class="quiz-q">${i+1}. ${q.q}</div>
        <div class="quiz-opts">
          ${q.opts.map((opt,j)=>`
            <button class="quiz-opt${STATE.quizAnswers[i]===j?(j===q.answer?' selected-correct':' selected-wrong'):''}"
              onclick="setState({quizAnswers:{...STATE.quizAnswers,${i}:${j}}})"
              ${STATE.quizAnswers[i]!==undefined?'disabled':''}>
              ${j+1}. ${opt}
            </button>`).join('')}
        </div>
      </div>`).join('')}
    ${Object.keys(STATE.quizAnswers).length===QUIZ.length
      ?`<button class="reveal-btn" style="width:100%" onclick="setState({quizDone:true})">결과 보기 →</button>`:''}`;
}

render();
</script>
</body>
</html>
