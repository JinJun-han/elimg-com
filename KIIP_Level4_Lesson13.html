const TTS={
  speak(text,lang='ko-KR',rate=0.8){
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang=lang;u.rate=rate;
    window.speechSynthesis.speak(u);
  },
  init(){if(window.speechSynthesis)window.speechSynthesis.getVoices();}
};
window.addEventListener('load',()=>{TTS.init();setTimeout(TTS.init,500);});

function ttsBtn(text,lang='ko-KR'){
  const safe=text.replace(/'/g,"\\'").replace(/"/g,'&quot;');
  return `<button class="tts-btn" onclick="TTS.speak('${safe}','${lang}');event.stopPropagation()">🔊</button>`;
}

function renderGramBlock(gram,prefix){
  const practiceHtml=gram.practice.map((p,i)=>{
    const shown=STATE.gramPracticeShown[prefix+'_'+i];
    const q=p.q.replace('___',`<input id="${prefix}-inp-${i}" placeholder="___" style="width:110px"/>`);
    return `<div class="practice-item">
      <div style="font-size:14px;color:var(--navy);margin-bottom:8px;line-height:1.6">${q}</div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <button class="check-btn" onclick="
          var v=document.getElementById('${prefix}-inp-${i}').value.trim();
          if(v==='${p.answer}'){document.getElementById('${prefix}-fb-${i}').innerHTML='<span class=answer-reveal>✅ 정답!</span>';}
          else{document.getElementById('${prefix}-fb-${i}').innerHTML='<span class=wrong-reveal>❌ 다시 해보세요</span>';}
        ">확인</button>
        <button class="check-btn" style="background:#64748b" onclick="STATE.gramPracticeShown['${prefix}_${i}']=true;render()">정답 보기</button>
      </div>
      <div id="${prefix}-fb-${i}">${shown?`<span class="answer-reveal">정답: ${p.answer}</span>`:''}</div>
    </div>`;
  }).join('');
  const topikHtml=gram.topik.map((t,i)=>{
    const key=prefix+'_topik_'+i;
    const chosen=STATE.topikAnswers[key];
    return `<div class="topik-card">
      <div class="q-text">${t.q}</div>
      <div class="topik-options">
        ${t.opts.map((opt,j)=>{
          let cls='topik-opt';
          if(chosen!==undefined){if(j===t.answer)cls+=' correct';else if(j===chosen)cls+=' wrong';}
          return `<button class="${cls}" onclick="STATE.topikAnswers['${key}']=${j};render()" ${chosen!==undefined?'disabled':''}>${j+1}. ${opt}</button>`;
        }).join('')}
      </div>
      ${chosen!==undefined?`<div style="margin-top:8px;font-size:13px;color:${chosen===t.answer?'#166534':'#991b1b'};font-weight:700">${chosen===t.answer?'✅ 정답!':'❌ 오답 - 정답: '+(t.answer+1)+'번'}</div>`:''}
    </div>`;
  }).join('');
  return `
    <div class="card">
      <div class="card-title">📌 ${gram.title}</div>
      <div class="rule-box"><div class="rule-title">의미</div><div style="font-size:14px;color:var(--navy);margin-bottom:4px">${gram.meaning}</div><div style="font-size:13px;color:#475569">🇺🇸 ${gram.en}</div></div>
      <div class="rule-box"><div class="rule-title">형태 규칙</div><div style="font-size:14px;color:var(--navy)">${gram.rule}</div></div>
    </div>
    <div class="card">
      <div class="card-title">📝 예문</div>
      <ul class="example-list">${gram.examples.map(e=>`<li><span class="ko">${e.ko} ${ttsBtn(e.ko)}</span><br><span class="en">${e.en}</span></li>`).join('')}</ul>
    </div>
    <div class="card"><div class="card-title">✏️ 빈칸 채우기 연습</div>${practiceHtml}</div>
    <div class="card"><div class="card-title">📋 TOPIK 유형</div>${topikHtml}</div>`;
}

function renderQuiz(){
  const total=QUIZ.length;
  const answered=Object.keys(STATE.quizAnswers).length;
  const correct=QUIZ.filter((q,i)=>STATE.quizAnswers[i]===q.answer).length;
  return `<h2>✅ 퀴즈</h2>
    <div class="card" style="background:var(--navy);color:#fff;text-align:center;padding:14px">
      <div style="font-size:14px;opacity:0.8">진행: ${answered}/${total}</div>
      ${STATE.quizDone?`<div style="font-size:28px;font-weight:900;color:#60a5fa;margin-top:4px">${correct}/${total}</div>`:''}
    </div>
    ${QUIZ.map((q,i)=>{
      const chosen=STATE.quizAnswers[i];
      const isCorrect=chosen===q.answer;
      let cardCls='quiz-card';
      if(chosen!==undefined)cardCls+=isCorrect?' answered-correct':' answered-wrong';
      return `<div class="${cardCls}">
        <div class="quiz-q">${i+1}. ${q.q}</div>
        <div class="quiz-opts">
          ${q.opts.map((opt,j)=>{
            let cls='quiz-opt';
            if(chosen!==undefined){if(j===q.answer)cls+=' selected-correct';else if(j===chosen)cls+=' selected-wrong';}
            return `<button class="${cls}" onclick="if(STATE.quizAnswers[${i}]===undefined){STATE.quizAnswers[${i}]=${j};render();}" ${chosen!==undefined?'disabled':''}>${j+1}. ${opt}</button>`;
          }).join('')}
        </div>
        ${chosen!==undefined?`<div style="margin-top:8px;font-size:13px;font-weight:700;color:${isCorrect?'#166534':'#991b1b'}">${isCorrect?'✅ 정답!':'❌ 오답 - 정답: '+(q.answer+1)+'번'}</div>`:''}
      </div>`;
    }).join('')}
    ${answered===total&&!STATE.quizDone?`<div style="text-align:center;margin:12px 0"><button class="reveal-btn" onclick="setState({quizDone:true})">결과 보기</button></div>`:''}
    ${STATE.quizDone?`<div class="quiz-score"><div>최종 점수</div><div class="score-num">${correct}/${total}</div><div style="margin-top:8px">${correct>=9?'🎉 우수!':correct>=7?'👍 잘 했어요!':correct>=5?'📚 복습해 보세요.':'💪 더 열심히!'}</div><button class="check-btn" style="margin-top:12px;background:rgba(255,255,255,0.2)" onclick="setState({quizAnswers:{},quizDone:false})">다시 풀기</button></div>`:''}`;
}

const RECORDER={
  stream:null,mediaRecorder:null,chunks:[],isRecording:false,
  recognition:null,sttActive:false,currentIdx:-1,scores:{},
  autoDetect(){
    if(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia){
      navigator.mediaDevices.getUserMedia({audio:true})
        .then(s=>{s.getTracks().forEach(t=>t.stop());this.showUI('ready');})
        .catch(()=>this.showUI('denied'));
    }else{this.showUI('denied');}
  },
  showUI(state){
    const el=document.getElementById('rec-status');if(!el)return;
    if(state==='ready')el.innerHTML='<p style="color:#059669;font-weight:700">✅ 마이크 준비 완료!</p>';
    else el.innerHTML='<p style="color:#ef4444;font-weight:700">❌ 마이크를 사용할 수 없습니다.</p>';
  },
  toggle(idx,sents){
    if(this.sttActive&&this.currentIdx===idx)this.stopSTT(idx);
    else{if(this.sttActive)this.stopSTT(this.currentIdx);this.startSTT(idx,sents);}
  },
  startSTT(idx,sents){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){const el=document.getElementById('stt-result');if(el)el.innerHTML='<span style="color:#ef4444">음성 인식 미지원 브라우저입니다.</span>';return;}
    this.recognition=new SR();
    this.recognition.lang='ko-KR';this.recognition.interimResults=false;
    this.sttActive=true;this.currentIdx=idx;
    const btn=document.getElementById('rec-btn-'+idx);
    if(btn){btn.textContent='⏹ 중지';btn.classList.add('recording');}
    const rEl=document.getElementById('stt-result');
    if(rEl)rEl.innerHTML='<span style="color:var(--blue)">🎤 듣는 중...</span>';
    this.recognition.onresult=(e)=>{
      const tr=e.results[0][0].transcript;
      const score=this.calcScore(tr,sents[idx]);
      this.scores[idx]=score;
      const badge=document.getElementById('score-badge-'+idx);
      if(badge){badge.className='score-badge '+(score>=80?'good':score>=50?'ok':'bad');badge.textContent=score+'%';}
      if(rEl)rEl.innerHTML=`<span style="color:var(--navy)">인식: "${tr}"</span> <span style="font-weight:700;color:${score>=80?'#166534':score>=50?'#854d0e':'#991b1b'}">(${score}점)</span>`;
      this.sttActive=false;
      if(btn){btn.textContent='🎤 녹음';btn.classList.remove('recording');}
    };
    this.recognition.onerror=()=>{this.sttActive=false;if(btn){btn.textContent='🎤 녹음';btn.classList.remove('recording');}};
    this.recognition.onend=()=>{this.sttActive=false;if(btn){btn.textContent='🎤 녹음';btn.classList.remove('recording');}};
    this.recognition.start();
  },
  stopSTT(idx){
    if(this.recognition){try{this.recognition.stop();}catch(e){}}
    this.sttActive=false;
    const btn=document.getElementById('rec-btn-'+idx);
    if(btn){btn.textContent='🎤 녹음';btn.classList.remove('recording');}
  },
  calcScore(transcript,target){
    if(!transcript||!target)return 0;
    const t=transcript.trim().replace(/[^가-힣a-zA-Z0-9\s]/g,'').toLowerCase();
    const g=target.trim().replace(/[^가-힣a-zA-Z0-9\s]/g,'').toLowerCase();
    if(t===g)return 100;
    const tw=t.split(/\s+/),gw=g.split(/\s+/);
    let m=0;gw.forEach(w=>{if(tw.includes(w))m++;});
    return Math.round((m/Math.max(gw.length,1))*100);
  }
};

render();
