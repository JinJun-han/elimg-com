// ===== TTS ENGINE =====
const TTS = {
  speak(text, lang='ko-KR', rate=0.8) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang; u.rate = rate; u.pitch = 1;
    const voices = window.speechSynthesis.getVoices();
    const koVoice = voices.find(v => v.lang.startsWith('ko')) || voices.find(v => v.lang.includes('ko'));
    if (koVoice) u.voice = koVoice;
    window.speechSynthesis.speak(u);
  },
  init() { if (window.speechSynthesis) window.speechSynthesis.getVoices(); }
};
window.addEventListener('load', () => { TTS.init(); setTimeout(TTS.init, 500); });

function ttsBtn(text) {
  if(!text) return '';
  return `<button class="tts-btn" onclick="event.stopPropagation();TTS.speak('${text.replace(/'/g,"\\'")}')" title="발음 듣기">🔊</button>`;
}

function setState(updates) {
  Object.assign(state, updates);
  render();
}

// ===== RENDER ENGINE =====
function render() {
  const app = document.getElementById('app');
  app.innerHTML = renderNav() + renderPage() + renderBottomNav();
  document.querySelectorAll('[data-click]').forEach(el => {
    el.onclick = (e) => {
      const fn = el.dataset.click;
      if (fn) eval(fn);
    };
  });
}

function renderNav() {
  const items = [
    {id:'home',l:'홈',i:'🏠'},{id:'curriculum',l:'커리큘럼',i:'📋'},
    {id:'hangul',l:'TOPIK 준비',i:'📊'},{id:'vocab',l:'어휘',i:'📖'},
    {id:'grammar',l:'문법',i:'✏️'},{id:'dialogue',l:'대화',i:'💬'},
    {id:'reading',l:'읽기',i:'📕'},{id:'writing',l:'쓰기',i:'✍️'},
    {id:'flashcard',l:'복습카드',i:'🃏'},{id:'quiz',l:'퀴즈',i:'❓'},
    {id:'culture',l:'문화',i:'🎭'},{id:'review',l:'익힘',i:'⭐'},
    {id:'folktale',l:'문학',i:'📜'},{id:'ftquiz',l:'문학퀴즈',i:'📝'},
    {id:'topik',l:'TOPIK',i:'🎓'},{id:'geoje',l:'거제',i:'📍'},
  ];
  const btn = (id,l,i) => {
    const active = state.page === id ? 'active' : '';
    return `<button class="${active}" onclick="setState({page:'${id}'})">${i} ${l}</button>`;
  };
  return `<div class="nav"><div><div class="nav-title">초급 2-17과 · Beginner Level 2 Lesson 17</div><div class="nav-sub">면접을 준비해요 · Preparing for an Interview</div></div><button class="nav-btn" onclick="state.menuOpen=!state.menuOpen;render()">☰</button></div><div class="menu ${state.menuOpen?'':'hide'}">${items.map(({id,l,i})=>btn(id,l,i)).join('')}</div>`;
}

function renderBottomNav() {
  const btn = (id,l,i) => {
    const active = state.page === id ? 'active' : '';
    return `<button class="${active}" onclick="setState({page:'${id}'})"><div class="icon">${i}</div><div>${l}</div></button>`;
  };
  return `<div class="bottom-nav">${[{id:'home',l:'홈',i:'🏠'},{id:'vocab',l:'어휘',i:'📖'},{id:'grammar',l:'문법',i:'✏️'},{id:'dialogue',l:'대화',i:'💬'},{id:'quiz',l:'퀴즈',i:'❓'}].map(({id,l,i})=>btn(id,l,i)).join('')}</div>`;
}

function renderPage() {
  switch(state.page) {
    case 'home': return renderHome();
    case 'curriculum': return renderCurriculum();
    case 'hangul': return renderHangul();
    case 'vocab': return renderVocab();
    case 'grammar': return renderGrammar();
    case 'dialogue': return renderDialogue();
    case 'reading': return renderReading();
    case 'writing': return renderWriting();
    case 'flashcard': return renderFlashcard();
    case 'quiz': return renderQuiz();
    case 'culture': return renderCulture();
    case 'review': return renderReview();
    case 'folktale': return renderKoreanLiterature();
    case 'ftquiz': return renderLiteratureQuiz();
    case 'topik': return renderTopikPractice();
    case 'geoje': return renderGeoje();
    default: return renderHome();
  }
}

  const q = QUIZ[state.qIdx];
  return `<div class="page">

function speakTopikListening(idx) {
  var item = TOPIK_PRACTICE.listening[idx];
  if(!item) return;
  var text = item.q;
  var parts = text.split('\n\n');
  if(parts.length > 1) {
    text = parts.slice(1).join(' ');
  }
  text = text.replace(/\[.*?\]/g, '').replace(/'/g, '').trim();
  TTS.speak(text);
}
