<script>
// ===== TTS ENGINE =====
const TTS = {
  speak(text, lang='ko-KR', rate=0.8) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang; u.rate = rate; u.pitch = 1;
    const voices = window.speechSynthesis.getVoices();
    const koVoice = voices.find(v => v.lang.startsWith('ko')) || voices.find(v => v.lang.includes('ko'));
    if (koVoice) u.voice = koVoice;
    window.speechSynthesis.speak(u);
  },
  init() { if (window.speechSynthesis) window.speechSynthesis.getVoices(); }
};
window.addEventListener('load', () => { TTS.init(); setTimeout(TTS.init, 500); });

function ttsBtn(text) {
  return `<button class="tts-btn" onclick="event.stopPropagation();TTS.speak('${text.replace(/'/g,"\\'")}')" title="발음 듣기">🔊</button>`;
}

// ===== DATA =====
const BATCHIM_TYPES = [
  {batchim:"ㄱ",variants:"(ㄱ,ㄲ,ㅋ)",sound:"[k]",eg:"국, 작, 박",eng:"stops at back of throat"},
  {batchim:"ㄴ",variants:"(ㄴ만)",sound:"[n]",eg:"안전, 반장, 인사",eng:"nasal — tongue tip up"},
  {batchim:"ㄷ",variants:"(ㄷ,ㅅ,ㅆ,ㅈ,ㅊ,ㅌ,ㅎ)",sound:"[t]",eg:"옷, 낮, 밑",eng:"stops at tongue tip"},
  {batchim:"ㄹ",variants:"(ㄹ만)",sound:"[l]",eg:"일, 철판, 볼트",eng:"lateral — tongue tip up"},
  {batchim:"ㅁ",variants:"(ㅁ만)",sound:"[m]",eg:"함, 담당, 점검",eng:"nasal — lips closed"},
  {batchim:"ㅂ",variants:"(ㅂ,ㅍ)",sound:"[p]",eg:"답, 협력",eng:"stops at lips"},
  {batchim:"ㅇ",variants:"(ㅇ만)",sound:"[ng]",eg:"안전, 공장, 용접",eng:"nasal — back of throat"},
];

const BATCHIM_WORDS = [
  {kor:"용접",pron:"yong-jeop",eng:"welding",batchim:"ㅇ+ㅂ"},
  {kor:"안전",pron:"an-jeon",eng:"safety",batchim:"ㄴ+ㄴ"},
  {kor:"공장",pron:"gong-jang",eng:"factory/plant",batchim:"ㅇ+ㅇ"},
  {kor:"철판",pron:"cheol-pan",eng:"steel plate",batchim:"ㄹ+ㄴ"},
  {kor:"볼트",pron:"bol-teu",eng:"bolt",batchim:"ㄹ"},
  {kor:"작업",pron:"jag-eop",eng:"work/task",batchim:"ㄱ+ㅂ"},
  {kor:"점검",pron:"jeom-geom",eng:"inspection",batchim:"ㅁ+ㅁ"},
  {kor:"출입",pron:"chul-ip",eng:"entry/exit",batchim:"ㄹ+ㅂ"},
  {kor:"반장",pron:"ban-jang",eng:"foreman",batchim:"ㄴ+ㅇ"},
  {kor:"협력",pron:"hyeop-ryeok",eng:"cooperation",batchim:"ㅂ+ㄱ"},
  {kor:"도움",pron:"do-um",eng:"help",batchim:"ㅁ"},
  {kor:"일",pron:"il",eng:"work/day",batchim:"ㄹ"},
];

const LIAISON_EXAMPLES = [
  {before:"용접이",after:"용저비 (yong-jeo-bi)",rule:"받침 + 모음 → 연음"},
  {before:"안전을",after:"안저늘 (an-jeo-neul)",rule:"받침 + 모음 → 연음"},
  {before:"작업이",after:"자거비 (ja-geo-bi)",rule:"받침 + 모음 → 연음"},
];

const QUIZ = [
  {q:"'안전'의 마지막 받침 소리는?",o:["[k]","[n]","[t]","[ng]"],a:1},
  {q:"'용접'에서 마지막 받침 소리는?",o:["[m]","[p]","[n]","[ng]"],a:1},
  {q:"받침의 대표음은 몇 가지?",o:["5가지","6가지","7가지","8가지"],a:2},
  {q:"'ㅅ'이 받침에서 내는 소리는?",o:["[s]","[n]","[t]","[l]"],a:2},
  {q:"'철판'에서 첫 번째 받침은?",o:["ㄴ","ㄹ","ㅁ","ㅂ"],a:1},
  {q:"연음(liaison)이 일어나는 조건은?",o:["자음+자음","받침+모음","모음+모음","받침+자음"],a:1},
  {q:"'ㅇ'이 받침에서 내는 소리는?",o:["[k]","[n]","[ng]","[m]"],a:2},
  {q:"'공장'의 두 번째 받침은?",o:["ㄴ","ㄹ","ㅁ","ㅇ"],a:3},
];

const CULTURE = [
  {icon:"🔤",t:"받침의 과학",eng:"The Science of Batchim",d:"한글 받침은 어떤 자음이 와도 7개 대표음 중 하나로 발음됩니다. 이것이 한글의 과학적 체계성입니다.",de:"Any consonant in final position is pronounced as one of 7 representative sounds. This is Hangul's scientific system."},
  {icon:"🏭",t:"조선소 핵심 용어",eng:"Key Shipyard Terms",d:"'용접', '안전', '공장', '작업' — 조선소에서 매일 듣는 단어들입니다. 받침이 있어 처음엔 발음이 어렵지만 연습하면 됩니다.",de:"'Welding', 'safety', 'factory', 'work' — words you hear daily at the shipyard. Final consonants are tricky at first but practice makes perfect."},
  {icon:"🔗",t:"연음 법칙",eng:"Liaison Rule",d:"받침 다음에 모음이 오면 받침이 다음 음절의 초성으로 이어서 발음됩니다. 예: '안전이' → '안저니'",de:"When a final consonant is followed by a vowel, it moves to the next syllable. E.g., '안전이' → '안저니'"},
  {icon:"📢",t:"실전 발음",eng:"Practical Pronunciation",d:"조선소에서 지시를 들을 때, 받침 발음을 정확히 들어야 의미를 이해할 수 있습니다. '작업 시작', '작업 종료'의 차이가 중요해요.",de:"At the shipyard, you must hear final consonants correctly to understand instructions. The difference between '시작' (start) and '종료' (end) is important."},
];

// ===== APP STATE =====
let state = {
  page: 'batchim',
  menuOpen: false,
  batchimSelected: null,
  wordReveal: {},
  qIdx: 0, qSel: null, qScore: 0, qDone: false,
};

function setState(updates) {
  Object.assign(state, updates);
  render();
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = renderNav() + renderPage() + renderBottomNav();
}

function renderNav() {
  let menu = '';
  if (state.menuOpen) {
    const items = [
      {id:'batchim',l:'받침표',i:'🔚'},{id:'words',l:'단어',i:'📝'},
      {id:'liaison',l:'연음',i:'🔗'},{id:'quiz',l:'퀴즈',i:'🎯'},{id:'culture',l:'문화',i:'🏛️'},
      {id:'ai',l:'AI 선생님',i:'🤖'},
    ];
    menu = '<div class="menu">' + items.map(it =>
      `<button class="${state.page===it.id?'active':''}" onclick="setState({page:'${it.id}',menuOpen:false})">${it.i} ${it.l}</button>`
    ).join('') + '</div>';
  }
  return `<div class="nav">
    <a href="HanwhaOcean_Level0_Index.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;color:inherit" title="목차로 돌아가기">
      <span style="font-size:18px">📋</span>
      <div><div class="nav-title">0급 입문 5과 · 받침</div><div class="nav-sub">Final Consonants · 한화오션 한국어</div></div>
    </a>
    <button class="nav-btn" onclick="setState({menuOpen:!state.menuOpen})">${state.menuOpen?'✕':'☰'}</button>
  </div>${menu}`;
}

function renderBottomNav() {
  const items = [
    {id:'batchim',i:'🔚',l:'받침표'},
    {id:'words',i:'📝',l:'단어'},
    {id:'liaison',i:'🔗',l:'연음'},
    {id:'quiz',i:'🎯',l:'퀴즈'},
    {id:'culture',i:'🏛️',l:'문화'},
  ];
  return `<div class="bottom-nav">${items.map(it =>
    `<button class="${state.page===it.id?'active':''}" onclick="setState({page:'${it.id}',menuOpen:false})">
      <span class="icon">${it.i}</span><span>${it.l}</span></button>`
  ).join('')}</div>`;
}

function renderPage() {
  const pages = {
    batchim: renderBatchim,
    words: renderWords,
    liaison: renderLiaison,
    quiz: renderQuiz,
    culture: renderCulture,
    ai: renderAI,
  };
  return `<div class="page">${(pages[state.page]||renderBatchim)()}</div>`;
}

function renderBatchim() {
  const bColors = ['#1E3A5F','#15803d','#DC2626','#2E75B6','#D97706','#7C3AED','#059669'];
  return `
  <div style="background:linear-gradient(135deg,#14532d,#15803d);border-radius:16px;padding:16px;margin-bottom:14px;color:#fff;text-align:center">
    <div style="font-size:12px;opacity:.8;margin-bottom:4px">0급 입문 5과 · KIIP 0단계</div>
    <div style="font-size:22px;font-weight:800;margin-bottom:2px">받침 · Final Consonants</div>
    <div style="font-size:13px;opacity:.85">종성(終聲) · 7개 대표음</div>
  </div>
  <h2>🔚 받침표 · Batchim Chart</h2>
  <p class="sub">받침 7대표음 · 7 Representative Final Consonant Sounds</p>
  <div class="card" style="background:#f0fdf4;border:2px solid #15803d;margin-bottom:14px">
    <div style="font-weight:700;color:#14532d;margin-bottom:4px">💡 핵심 원리 · Key Principle</div>
    <div style="font-size:13px;color:#333;line-height:1.6">받침(종성)에는 어떤 자음이 와도 7가지 소리 중 하나로 발음돼요!<br><span style="color:#888;font-size:12px">Any consonant in final position is pronounced as one of only 7 sounds!</span></div>
  </div>
  ${BATCHIM_TYPES.map((b,i)=>`
  <div class="card ${i===state.batchimSelected?'card-green':'card-accent'}" onclick="setState({batchimSelected:${i===state.batchimSelected?'null':i}});TTS.speak('${b.eg.split(',')[0].trim()}')">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="background:${bColors[i]};color:#fff;border-radius:10px;width:50px;height:50px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">
        <div style="font-size:22px;font-weight:800">${b.batchim}</div>
        <div style="font-size:10px;opacity:.8">${b.sound}</div>
      </div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700;color:var(--navy)">${b.batchim} ${b.variants}</div>
        <div style="font-size:12px;color:var(--ocean)">${b.eng}</div>
        ${i===state.batchimSelected?`
        <div style="margin-top:8px">
          <div style="font-size:12px;color:#555">예시: <b>${b.eg}</b> ${ttsBtn(b.eg.split(',')[0].trim())}</div>
        </div>
        `:`<div style="font-size:11px;color:#ccc;margin-top:2px">탭하면 예시가 나타나요</div>`}
      </div>
    </div>
  </div>`).join('')}
  <div style="display:flex;gap:8px;margin-top:12px">
    <a href="HanwhaOcean_Level0_Lesson4.html" style="flex:1;padding:12px;border-radius:10px;background:#e5e7eb;color:#555;font-size:13px;font-weight:700;text-align:center;text-decoration:none">← 4과</a>
    <a href="HanwhaOcean_Level0_Index.html" style="padding:12px 16px;border-radius:10px;background:var(--navy);color:#fff;font-size:13px;font-weight:700;text-align:center;text-decoration:none">목차</a>
    <a href="HanwhaOcean_Level0_Lesson6.html" style="flex:1;padding:12px;border-radius:10px;background:var(--level0);color:#fff;font-size:13px;font-weight:700;text-align:center;text-decoration:none">6과 →</a>
  </div>`;
}

function renderWords() {
  return `
  <h2>📝 조선소 핵심 단어 · Key Shipyard Words</h2>
  <p class="sub">받침이 있는 조선소 단어 · Shipyard words with final consonants</p>
  <div class="grid2">
    ${BATCHIM_WORDS.map((w,i)=>`
    <div class="card ${state.wordReveal[i]?'card-green':'card-accent'}" style="cursor:pointer" onclick="setState({wordReveal:{...state.wordReveal,${i}:!state.wordReveal[${i}]}});TTS.speak('${w.kor}')">
      <div style="font-size:20px;font-weight:800;color:var(--navy)">${w.kor} ${ttsBtn(w.kor)}</div>
      <div style="font-size:11px;color:var(--ocean)">[${w.pron}]</div>
      ${state.wordReveal[i]?`
      <div style="font-size:13px;color:#15803d;font-weight:600;margin-top:4px">${w.eng}</div>
      <div style="font-size:10px;color:#888;margin-top:2px">받침: ${w.batchim}</div>
      `:`<div style="font-size:10px;color:#ccc;margin-top:4px">탭하여 뜻 보기</div>`}
    </div>`).join('')}
  </div>
  <button onclick="TTS.speak('${BATCHIM_WORDS.map(w=>w.kor).join(' ')}')" class="btn btn-primary" style="margin-top:8px">🔊 전체 듣기 · Listen All</button>
  <div style="display:flex;gap:8px;margin-top:12px">
    <a href="HanwhaOcean_Level0_Lesson4.html" style="flex:1;padding:12px;border-radius:10px;background:#e5e7eb;color:#555;font-size:13px;font-weight:700;text-align:center;text-decoration:none">← 4과</a>
    <a href="HanwhaOcean_Level0_Lesson6.html" style="flex:1;padding:12px;border-radius:10px;background:var(--level0);color:#fff;font-size:13px;font-weight:700;text-align:center;text-decoration:none">6과 →</a>
  </div>`;
}

function renderLiaison() {
  return `
  <h2>🔗 연음 법칙 · Liaison Rule</h2>
  <p class="sub">받침 + 모음 = 연음 · When batchim is followed by a vowel</p>
  <div class="card" style="background:linear-gradient(135deg,#1E3A5F,#2E75B6);color:#fff;border:none;margin-bottom:14px">
    <div style="font-weight:800;font-size:15px;margin-bottom:6px">🔗 연음 규칙 · Liaison Rule</div>
    <div style="font-size:13px;opacity:.9;line-height:1.7">받침 다음에 모음으로 시작하는 글자가 오면 받침이 다음 음절의 첫소리(초성)로 이어서 발음돼요.</div>
    <div style="font-size:12px;opacity:.7;margin-top:4px">When a syllable ending in a consonant is followed by a vowel-starting syllable, the final consonant moves to become the initial consonant of the next syllable.</div>
  </div>
  <div class="section-label">📌 조선소 예시 · Shipyard Examples</div>
  ${LIAISON_EXAMPLES.map(ex=>`
  <div class="card card-green">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <div style="font-size:18px;font-weight:800;color:var(--navy)">${ex.before} ${ttsBtn(ex.before)}</div>
      <div style="font-size:20px;color:#888">→</div>
      <div style="font-size:16px;font-weight:700;color:#15803d">${ex.after}</div>
    </div>
    <div style="font-size:11px;color:#888;margin-top:4px">${ex.rule}</div>
  </div>`).join('')}
  <div class="card card-orange" style="margin-top:6px">
    <div style="font-weight:700;color:var(--orange);margin-bottom:6px">💡 연습 · Practice</div>
    <div style="font-size:13px;color:#333;line-height:1.8">
      • 작업이 → 자거비<br>
      • 용접을 → 용저블<br>
      • 공장에서 → 공장에서 (장이 잇따름)<br>
      • 안전을 → 안저늘
    </div>
    <button onclick="TTS.speak('작업이 용접을 안전을')" class="btn btn-primary" style="margin-top:10px;width:auto;padding:8px 20px;font-size:13px">🔊 연습 듣기 · Listen</button>
  </div>
  <div class="card card-accent">
    <div style="font-weight:700;color:var(--navy);margin-bottom:6px">📐 구조도 · Structure</div>
    <div style="font-size:14px;text-align:center;color:#333;line-height:2">
      안 (an) + 전 (jeon) + 을 (eul)<br>
      <span style="color:var(--ocean)">→ 안 · 저 · 늘 (an-jeo-neul)</span>
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-top:12px">
    <a href="HanwhaOcean_Level0_Lesson4.html" style="flex:1;padding:12px;border-radius:10px;background:#e5e7eb;color:#555;font-size:13px;font-weight:700;text-align:center;text-decoration:none">← 4과</a>
    <a href="HanwhaOcean_Level0_Lesson6.html" style="flex:1;padding:12px;border-radius:10px;background:var(--level0);color:#fff;font-size:13px;font-weight:700;text-align:center;text-decoration:none">6과 →</a>
  </div>`;
}

function renderQuiz() {
  if (state.qDone) {
    const pct = Math.round(state.qScore/QUIZ.length*100);
    try {
      var prog = JSON.parse(localStorage.getItem('hw_l0_progress')||'{}');
      prog[5] = true;
      localStorage.setItem('hw_l0_progress', JSON.stringify(prog));
      localStorage.setItem('hw_l0_last', '5');
    } catch(e){}
    return `<div style="text-align:center;padding:20px 0">
      <div style="font-size:56px">${pct>=80?'🎉':pct>=50?'👍':'💪'}</div>
      <h2>퀴즈 결과 · Quiz Result</h2>
      <div style="font-size:44px;font-weight:800;color:${pct>=80?'var(--level0)':pct>=50?'var(--orange)':'var(--red)'};margin:14px 0">${state.qScore}/${QUIZ.length}</div>
      <div style="font-size:15px;color:#888;margin-bottom:20px">${pct}% 정답 · Correct</div>
      <div class="progress"><div class="progress-bar" style="width:${pct}%;background:${pct>=80?'var(--level0)':pct>=50?'var(--orange)':'var(--red)'}"></div></div>
      ${pct>=80?`<div style="background:#f0fdf4;border:2px solid #15803d;border-radius:12px;padding:14px;margin-top:14px">
        <div style="font-size:20px;margin-bottom:4px">🌟</div>
        <div style="font-weight:800;color:#15803d;font-size:15px">한글 기초 5과 완료!</div>
        <div style="font-size:12px;color:#555;margin-top:4px">모음, 자음 1&2, 음절, 받침 — 한글의 기초를 모두 배웠어요!</div>
        <div style="font-size:11px;color:#888;margin-top:2px">You've learned all Hangul basics: vowels, consonants, syllables, and final consonants!</div>
      </div>`:''}
      <button onclick="setState({qIdx:0,qSel:null,qScore:0,qDone:false})" class="btn btn-navy" style="margin-top:16px">↺ 다시 풀기 · Retry</button>
      <a href="HanwhaOcean_Level0_Lesson6.html" class="btn btn-primary" style="display:block;margin-top:10px;text-decoration:none;text-align:center">6과 숫자 →</a>
      <a href="HanwhaOcean_Level0_Index.html" style="display:block;margin-top:8px;padding:12px;border-radius:10px;background:#e5e7eb;color:#555;font-size:13px;font-weight:700;text-align:center;text-decoration:none">← 목차로 돌아가기</a>
    </div>`;
  }
  const q = QUIZ[state.qIdx];
  return `<h2>🎯 퀴즈 · Quiz</h2>
  <div style="display:flex;justify-content:space-between;margin-bottom:8px">
    <span style="font-size:12px;color:#888">문제 ${state.qIdx+1}/${QUIZ.length}</span>
    <span style="font-size:12px;color:var(--level0);font-weight:600">점수: ${state.qScore}</span>
  </div>
  <div class="progress"><div class="progress-bar" style="width:${(state.qIdx+1)/QUIZ.length*100}%;background:var(--level0)"></div></div>
  <div class="card" style="background:#f0fdf4;border:2px solid #15803d;text-align:center;margin:14px 0">
    <div style="font-size:16px;font-weight:700;color:var(--navy)">${q.q}</div>
  </div>
  ${q.o.map((opt,i)=>{
    let cls = 'quiz-opt';
    if(state.qSel!==null){
      if(i===q.a) cls+=' quiz-correct';
      else if(i===state.qSel) cls+=' quiz-wrong';
    }
    return `<button class="${cls}" onclick="${state.qSel===null?`setState({qSel:${i},qScore:state.qScore+${i===q.a?1:0}})`:''}">${String.fromCharCode(65+i)}. ${opt}</button>`;
  }).join('')}
  ${state.qSel!==null?`<button onclick="${state.qIdx<QUIZ.length-1?`setState({qIdx:state.qIdx+1,qSel:null})`:`setState({qDone:true})`}" class="btn btn-primary" style="margin-top:8px">${state.qIdx<QUIZ.length-1?'다음 문제 → Next':'결과 보기 → Result'}</button>`:''}`;
}

  <p class="sub">받침의 과학과 조선소 · Batchim Science & Shipyard</p>
  ${CULTURE.map(c=>`<div class="card" style="display:flex;gap:12px;align-items:flex-start">

    <a href="HanwhaOcean_Level0_Lesson6.html" style="flex:1;padding:12px;border-radius:10px;background:var(--level0);color:#fff;font-size:13px;font-weight:700;text-align:center;text-decoration:none">6과 숫자 →</a>
  </div>`;

function renderAI() {
  return `
<div class="card card-green">
  <div class="section-label">🤖 AI 한국어 선생님</div>
  <div style="font-size:13px;color:#555;margin-bottom:10px">궁금한 것을 물어보세요! Ask anything about this lesson.</div>
  <div id="ai-chat" style="min-height:60px;margin-bottom:10px"></div>
  <div style="display:flex;gap:6px">
    <textarea id="ai-input" class="input" style="min-height:44px;resize:none" placeholder="예: 받침 'ㅅ'은 어떻게 발음해요? / How do you pronounce batchim ㅅ?"></textarea>
    <button class="btn btn-primary" style="width:auto;padding:10px 14px" onclick="sendAI()">전송</button>
  </div>
  <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap" id="ai-quick">
    ${["이 모음/자음을 어떻게 발음해요?","이 단어가 무슨 뜻이에요?","예문을 만들어 주세요","연음 규칙 더 알려줘"]
      .map(q=>`<button onclick="document.getElementById('ai-input').value='${q}'" style="background:#f0fdf4;border:1px solid #15803d;color:#15803d;border-radius:20px;padding:5px 12px;font-size:11px">${q}</button>`).join('')}
  </div>
</div>`;
}

function sendAI() {
  const input = document.getElementById('ai-input');
  const chat = document.getElementById('ai-chat');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  chat.innerHTML += `<div class="bubble bubble-right" style="margin-left:auto;margin-bottom:8px"><b>나:</b> ${msg}</div>`;
  chat.innerHTML += `<div id="ai-loading" class="bubble bubble-left" style="margin-bottom:8px">⏳ 생각 중...</div>`;
  chat.scrollTop = chat.scrollHeight;
  const systemPrompt = `You are a Korean language tutor for foreign workers at Hanwha Ocean shipyard. This is Level 0 (beginner), Lesson 5 on Korean final consonants (받침) and liaison rules (연음). Answer in Korean with English translation. Be encouraging, simple, and practical. Keep answers under 150 words.`;
  fetch('/api/chat', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({messages:[{role:'system',content:systemPrompt},{role:'user',content:msg}]})
  })
  .then(r=>r.json())
  .then(d=>{
    document.getElementById('ai-loading')?.remove();
    const reply = d.choices?.[0]?.message?.content || '죄송합니다, 다시 시도해 주세요.';
    chat.innerHTML += `<div class="bubble bubble-left" style="margin-bottom:8px"><b>AI 선생님:</b> ${reply}</div>`;
    chat.scrollTop = chat.scrollHeight;
  })
  .catch(()=>{
    document.getElementById('ai-loading')?.remove();
    chat.innerHTML += `<div class="bubble bubble-left" style="color:#e00;margin-bottom:8px">연결 오류. 다시 시도해 주세요.</div>`;
  });
}

render();
