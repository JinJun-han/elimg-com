<div id="app"></div>
<script>
const TTS = {
  speak(text, lang='ko-KR', rate=0.8) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang; u.rate = rate; u.pitch = 1;
    const voices = window.speechSynthesis.getVoices();
    const koVoice = voices.find(v => v.lang.startsWith('ko')) || voices.find(v => v.lang.includes('ko'));
    if (koVoice) u.voice = koVoice;
    window.speechSynthesis.speak(u);
  },
  init() { if (window.speechSynthesis) window.speechSynthesis.getVoices(); }
};
window.addEventListener('load', () => { TTS.init(); setTimeout(TTS.init, 500); });
function ttsBtn(text) {
  return `<button class="tts-btn" onclick="event.stopPropagation();TTS.speak('${text.replace(/'/g,"\\'")}')" title="발음 듣기">🔊</button>`;
}

const SYSTEM_PROMPT = `You are a Korean language tutor for Hanwha Ocean shipyard foreign workers. This lesson is about Korean numbers (고유어 and 한자어 counting systems). Answer in Korean with English. Be simple and practical. Under 150 words.`;

const SINO_NUMS = [
  {n:1,kor:"일",pron:"il"},{n:2,kor:"이",pron:"i"},{n:3,kor:"삼",pron:"sam"},
  {n:4,kor:"사",pron:"sa"},{n:5,kor:"오",pron:"o"},{n:6,kor:"육",pron:"yuk"},
  {n:7,kor:"칠",pron:"chil"},{n:8,kor:"팔",pron:"pal"},{n:9,kor:"구",pron:"gu"},
  {n:10,kor:"십",pron:"sip"},{n:20,kor:"이십",pron:"i-sip"},{n:30,kor:"삼십",pron:"sam-sip"},
  {n:100,kor:"백",pron:"baek"},{n:1000,kor:"천",pron:"cheon"},{n:10000,kor:"만",pron:"man"},
];
const NATIVE_NUMS = [
  {n:1,kor:"하나",pron:"ha-na",abbr:"한"},{n:2,kor:"둘",pron:"dul",abbr:"두"},
  {n:3,kor:"셋",pron:"set",abbr:"세"},{n:4,kor:"넷",pron:"net",abbr:"네"},
  {n:5,kor:"다섯",pron:"da-seot",abbr:"다섯"},{n:6,kor:"여섯",pron:"yeo-seot",abbr:"여섯"},
  {n:7,kor:"일곱",pron:"il-gop",abbr:"일곱"},{n:8,kor:"여덟",pron:"yeo-deol",abbr:"여덟"},
  {n:9,kor:"아홉",pron:"a-hop",abbr:"아홉"},{n:10,kor:"열",pron:"yeol",abbr:"열"},
  {n:20,kor:"스물",pron:"seu-mul",abbr:"스무"},{n:30,kor:"서른",pron:"seo-reun",abbr:"서른"},
  {n:40,kor:"마흔",pron:"ma-heun",abbr:"마흔"},{n:50,kor:"쉰",pron:"swin",abbr:"쉰"},
  {n:100,kor:"백",pron:"baek",abbr:"백"},
];
const COUNTERS = [
  {counter:"개",eng:"things/items",eg:"볼트 3개 (3 bolts)"},
  {counter:"명/분",eng:"people (명=informal, 분=formal)",eg:"작업자 5명 (5 workers)"},
  {counter:"시간",eng:"hours",eg:"8시간 (8 hours)"},
  {counter:"번",eng:"times/numbers",eg:"3번 확인 (check 3 times)"},
  {counter:"층",eng:"floor/level",eg:"3층 (3rd floor)"},
  {counter:"킬로",eng:"kilograms",eg:"10킬로 (10 kg)"},
];
const SHIPYARD_NUMS = [
  {situation:"작업 시간",example:"오전 8시부터 오후 5시까지 (8 AM to 5 PM)"},
  {situation:"볼트 수량",example:"볼트 열 개 주세요 (Please give me 10 bolts)"},
  {situation:"작업 인원",example:"작업자 다섯 명입니다 (There are 5 workers)"},
  {situation:"도면 번호",example:"도면 번호 삼백이십오 (Drawing number 325)"},
  {situation:"층수",example:"삼 층 작업장 (3rd floor workshop)"},
  {situation:"안전 교육 시간",example:"교육 두 시간 (2 hours of training)"},
];
const QUIZ = [
  {q:"'7'을 한자어로?",o:["육","칠","팔","구"],a:1},
  {q:"'3개'의 '개'는 무슨 뜻?",o:["people","hours","things/items","floor"],a:2},
  {q:"'다섯'은 몇이에요?",o:["3","4","5","6"],a:2},
  {q:"시간(hours)을 셀 때 쓰는 수사는?",o:["한자어 수사","고유어 수사","둘 다","없음"],a:1},
  {q:"'이십'은 몇이에요?",o:["12","20","21","22"],a:1},
  {q:"사람을 셀 때 쓰는 단위명사는?",o:["개","번","명","층"],a:2},
  {q:"'볼트 열 개'에서 '열'은?",o:["7","8","9","10"],a:3},
  {q:"'백'은 몇이에요?",o:["10","100","1000","10000"],a:1},
];
const CULTURE = [
  {icon:"🔢",t:"두 가지 숫자 체계",eng:"Two Number Systems",d:"한국어에는 두 가지 숫자 체계가 있어요. 한자어 수사(일,이,삼...)는 날짜, 돈, 전화번호에, 고유어 수사(하나,둘,셋...)는 물건 개수, 나이, 시간에 사용합니다.",de:"Korean has two number systems. Sino-Korean (일,이,삼...) for dates, money, phone. Native Korean (하나,둘,셋...) for counting items, age, hours."},
  {icon:"📅",t:"날짜 읽기",eng:"Reading Dates",d:"한국에서 날짜는 '년 월 일' 순서로 읽습니다. 예: 2024년 4월 3일 → 이천이십사년 사월 삼일. 모두 한자어 수사를 씁니다.",de:"In Korea, dates are read as year-month-day. E.g., April 3, 2024 = 이천이십사년 사월 삼일. All use Sino-Korean numbers."},
  {icon:"⏰",t:"시간 읽기",eng:"Telling Time",d:"시(hour)는 고유어: 한 시, 두 시, 세 시... 분(minute)은 한자어: 십 분, 이십 분... 예: 8시 30분 → '여덟 시 삼십 분'",de:"Hours use native Korean: 한 시, 두 시... Minutes use Sino-Korean: 십 분, 이십 분... E.g., 8:30 = 여덟 시 삼십 분."},
  {icon:"💰",t:"돈 세기",eng:"Counting Money",d:"한국 돈(원)은 한자어로 셉니다. 천 원(1,000원), 만 원(10,000원), 십만 원(100,000원). 한국 최저임금은 2024년 기준 시급 9,860원.",de:"Korean won uses Sino-Korean. 천 원=1,000₩, 만 원=10,000₩. Minimum wage in 2024 is 9,860₩/hour."},
];

let currentTab = 0;
let quizState = {idx:0, score:0, answered:false};

function sendAI() {
  const input = document.getElementById('ai-input');
  const chat = document.getElementById('ai-chat');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  chat.innerHTML += `<div class="bubble bubble-right" style="margin-left:auto;margin-bottom:8px"><b>나:</b> ${msg}</div>`;
  chat.innerHTML += `<div id="ai-loading" class="bubble bubble-left" style="margin-bottom:8px">⏳ 생각 중...</div>`;
  chat.scrollTop = chat.scrollHeight;
  fetch('/api/chat', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({messages:[
      {role:'system',content:SYSTEM_PROMPT},
      {role:'user',content:msg}
    ]})
  })
  .then(r=>r.json())
  .then(d=>{
    document.getElementById('ai-loading')?.remove();
    const reply = d.choices?.[0]?.message?.content || '죄송합니다, 다시 시도해 주세요.';
    chat.innerHTML += `<div class="bubble bubble-left" style="margin-bottom:8px"><b>AI 선생님:</b> ${reply}</div>`;
    chat.scrollTop = chat.scrollHeight;
  })
  .catch(()=>{
    document.getElementById('ai-loading')?.remove();
    chat.innerHTML += `<div class="bubble bubble-left" style="color:#e00;margin-bottom:8px">연결 오류. 다시 시도해 주세요.</div>`;
  });
}

function showTab(idx) {
  currentTab = idx;
  render();
}

function answerQuiz(optIdx) {
  if (quizState.answered) return;
  quizState.answered = true;
  const correct = QUIZ[quizState.idx].a === optIdx;
  if (correct) quizState.score++;
  document.querySelectorAll('.quiz-opt').forEach((el, i) => {
    if (i === QUIZ[quizState.idx].a) el.classList.add('quiz-correct');
    else if (i === optIdx && !correct) el.classList.add('quiz-wrong');
    el.disabled = true;
  });
  document.getElementById('quiz-next-btn').classList.remove('hide');
}

function nextQuiz() {
  if (quizState.idx < QUIZ.length - 1) {
    quizState.idx++;
    quizState.answered = false;
    render();
  } else {
    quizState.idx = 0;
    quizState.answered = false;
    render();
  }
}

function aiSection() {
  return `<div class="card card-accent" style="margin-top:16px">
    <div style="font-weight:700;color:var(--navy);margin-bottom:8px">🤖 AI 선생님께 질문하기</div>
    <div id="ai-chat" style="min-height:60px;max-height:200px;overflow-y:auto;margin-bottom:8px;display:flex;flex-direction:column;gap:4px"></div>
    <div style="display:flex;gap:6px">
      <input class="input" id="ai-input" placeholder="숫자에 대해 질문해 보세요..." style="margin:0;flex:1" onkeydown="if(event.key==='Enter')sendAI()">
      <button class="btn btn-primary" style="width:auto;padding:10px 14px" onclick="sendAI()">전송</button>
    </div>
  </div>`;
}

function render() {
  const tabs = ['한자어','고유어','단위','퀴즈','문화'];
  const tabHtml = tabs.map((t,i)=>`<button class="tab${currentTab===i?' active':''}" onclick="showTab(${i})">${t}</button>`).join('');

  let content = '';
  if (currentTab === 0) {
    // Sino-Korean numbers
    let rows = SINO_NUMS.map(item=>`<tr><td><b>${item.n}</b></td><td><b style="font-size:16px">${item.kor}</b> ${ttsBtn(item.kor)}</td><td style="color:#666">${item.pron}</td></tr>`).join('');
    content = `
    <h2>한자어 수사 (Sino-Korean Numbers)</h2>
    <p class="sub">날짜, 돈, 전화번호, 층수에 사용 / Used for dates, money, phone, floors</p>
    <div class="card card-accent">
      <div class="section-label">📌 용법: 날짜 · 금액 · 전화번호 · 도면번호</div>
      <table><thead><tr><th>숫자</th><th>한자어</th><th>발음</th></tr></thead><tbody>${rows}</tbody></table>
    </div>
    <div class="card card-green">
      <div style="font-weight:700;color:var(--level0);margin-bottom:8px">💡 조선소 활용 예시</div>
      <div style="font-size:13px;line-height:1.8">
        <div>• 도면 번호: 삼백이십오 (325) ${ttsBtn('삼백이십오')}</div>
        <div>• 층수: 삼 층 (3F) ${ttsBtn('삼 층')}</div>
        <div>• 전화번호: 공일공 (010) ${ttsBtn('공일공')}</div>
        <div>• 오늘 날짜: 사월 삼일 (April 3rd) ${ttsBtn('사월 삼일')}</div>
      </div>
    </div>
    ${aiSection()}`;
  } else if (currentTab === 1) {
    // Native Korean numbers
    let cards = NATIVE_NUMS.map(item=>`
      <div class="vocab-item" style="background:#f0f9f4;border:1px solid #bbf7d0" onclick="TTS.speak('${item.kor}')">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:22px;font-weight:800;color:var(--level0)">${item.n}</span>
          <span style="font-size:11px;color:#888">약형: <b>${item.abbr}</b></span>
        </div>
        <div class="kor">${item.kor} ${ttsBtn(item.kor)}</div>
        <div class="pron">${item.pron}</div>
      </div>`).join('');
    content = `
    <h2>고유어 수사 (Native Korean Numbers)</h2>
    <p class="sub">물건 개수, 나이, 시간(시)에 사용 / Used for counting items, age, hours</p>
    <div class="card card-orange">
      <div style="font-weight:700;color:var(--orange);margin-bottom:6px">⚠️ 단위 앞에서 약형(줄임형) 사용!</div>
      <div style="font-size:12px;color:#555">하나→한, 둘→두, 셋→세, 넷→네, 스물→스무<br>예: 한 개, 두 명, 세 시, 네 개, 스무 살</div>
    </div>
    <div class="grid2">${cards}</div>
    <div class="card card-accent" style="margin-top:10px">
      <div style="font-weight:700;color:var(--navy);margin-bottom:8px">시간 읽기 예시</div>
      <div style="font-size:13px;line-height:2">
        <div>한 시 (1:00) ${ttsBtn('한 시')}</div>
        <div>두 시 삼십 분 (2:30) ${ttsBtn('두 시 삼십 분')}</div>
        <div>여덟 시 (8:00) ${ttsBtn('여덟 시')}</div>
        <div>열두 시 (12:00) ${ttsBtn('열두 시')}</div>
      </div>
    </div>
    ${aiSection()}`;
  } else if (currentTab === 2) {
    // Counters + shipyard
    let counterCards = COUNTERS.map(c=>`
      <div class="card card-accent">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:24px;font-weight:800;color:var(--ocean);min-width:40px">${c.counter}</span>
          <div>
            <div style="font-size:12px;color:#555;font-weight:600">${c.eng}</div>
            <div style="font-size:12px;color:var(--level0);margin-top:2px">${c.eg} ${ttsBtn(c.eg.split(' (')[0])}</div>
          </div>
        </div>
      </div>`).join('');
    let shipCards = SHIPYARD_NUMS.map(s=>`
      <div class="card card-green">
        <div style="font-size:11px;font-weight:700;color:var(--level0);margin-bottom:4px">${s.situation}</div>
        <div style="font-size:13px;color:var(--navy)">${s.example} ${ttsBtn(s.example.split(' (')[0])}</div>
      </div>`).join('');
    content = `
    <h2>단위명사 & 현장 활용</h2>
    <p class="sub">Counter words + Shipyard number context</p>
    <div class="section-label">📦 단위명사 (Counter Words)</div>
    ${counterCards}
    <div class="section-label" style="margin-top:14px">⚓ 조선소 숫자 표현</div>
    ${shipCards}
    ${aiSection()}`;
  } else if (currentTab === 3) {
    // Quiz
    const q = QUIZ[quizState.idx];
    const opts = q.o.map((opt,i)=>`<button class="quiz-opt" onclick="answerQuiz(${i})">${opt}</button>`).join('');
    content = `
    <h2>퀴즈 · Quiz</h2>
    <p class="sub">숫자 지식을 테스트하세요!</p>
    <div class="card card-accent">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span class="badge" style="background:var(--level0)">${quizState.idx+1} / ${QUIZ.length}</span>
        <span style="font-size:13px;color:var(--level0);font-weight:700">점수: ${quizState.score}</span>
      </div>
      <div class="progress" style="margin-bottom:14px"><div class="progress-bar" style="background:var(--level0);width:${((quizState.idx)/QUIZ.length)*100}%"></div></div>
      <div style="font-size:16px;font-weight:700;color:var(--navy);margin-bottom:14px">${q.q}</div>
      ${opts}
      <button id="quiz-next-btn" class="btn btn-green hide" onclick="nextQuiz()" style="margin-top:6px">다음 문제 →</button>
    </div>
    ${aiSection()}`;
  } else {
    // Culture
    let cards = CULTURE.map(c=>`
      <div class="card card-green">
        <div style="font-size:28px;margin-bottom:6px">${c.icon}</div>
        <div style="font-weight:700;color:var(--navy);margin-bottom:2px">${c.t}</div>
        <div style="font-size:11px;color:var(--level0);margin-bottom:6px">${c.eng}</div>
        <div style="font-size:12px;color:#444;line-height:1.6;margin-bottom:6px">${c.d}</div>
        <div style="font-size:11px;color:#888;line-height:1.5;font-style:italic">${c.de}</div>
      </div>`).join('');
    content = `
    <h2>문화 & 배경 지식</h2>
    <p class="sub">Korean number system culture</p>
    ${cards}
    ${aiSection()}`;
  }

  document.getElementById('app').innerHTML = `
    <nav class="nav">
      <div>
        <div class="nav-title">0급 입문 6과 · 숫자</div>
        <div class="nav-sub">Numbers 1-100</div>
      </div>
      <div style="display:flex;gap:4px">
        <a href="HanwhaOcean_Level0_Lesson5.html"><button class="nav-btn">◀</button></a>
        <a href="HanwhaOcean_Level0_Index.html"><button class="nav-btn">🏠</button></a>
        <a href="HanwhaOcean_Level0_Lesson7.html"><button class="nav-btn">▶</button></a>
      </div>
    </nav>
    <div class="page">
      <div class="tabs">${tabHtml}</div>
      ${content}
    </div>
    <nav class="bottom-nav">
      <button class="${currentTab===0?'active':''}" onclick="showTab(0)"><span class="icon">🔢</span>한자어</button>
      <button class="${currentTab===1?'active':''}" onclick="showTab(1)"><span class="icon">🌿</span>고유어</button>
      <button class="${currentTab===2?'active':''}" onclick="showTab(2)"><span class="icon">📦</span>단위</button>
      <button class="${currentTab===3?'active':''}" onclick="showTab(3)"><span class="icon">❓</span>퀴즈</button>
      <button class="${currentTab===4?'active':''}" onclick="showTab(4)"><span class="icon">🌏</span>문화</button>
    </nav>`;
}

render();
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('/sw.js').catch(()=>{});});}
