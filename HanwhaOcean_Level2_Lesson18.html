// ===== TTS ENGINE =====
const TTS = {
  speak(text, lang='ko-KR', rate=0.8) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang; u.rate = rate; u.pitch = 1;
    const voices = window.speechSynthesis.getVoices();
    const koVoice = voices.find(v => v.lang.startsWith('ko')) || voices.find(v => v.lang.includes('ko'));
    if (koVoice) u.voice = koVoice;
    window.speechSynthesis.speak(u);
  },
  init() { if (window.speechSynthesis) window.speechSynthesis.getVoices(); }
};
window.addEventListener('load', () => { TTS.init(); setTimeout(TTS.init, 500); });

function ttsBtn(text) {
  if(!text) return '';
  return `<button class="tts-btn" onclick="event.stopPropagation();TTS.speak('${text.replace(/'/g,"\\'")}')" title="발음 듣기">🔊</button>`;
}

// ===== RENDER ENGINE =====
function render() {
  const app = document.getElementById('app');
  app.innerHTML = renderNav() + renderPage() + renderBottomNav();
  document.querySelectorAll('[data-click]').forEach(el => {
    el.onclick = (e) => {
      const fn = el.dataset.click;
      if (fn) eval(fn);
    };
  });
}

      :'<div style="font-size:10px;color:#ccc;margin-top:4px">탭하여 영어 보기 · Tap for English</div>'}
    </div>`).join('');
  else if (t===1) content = VOCAB_SHIPYARD.map((v,i)=>`
    <div class="card card-orange vocab-item" onclick="setState({vocabReveal:{...state.vocabReveal,['s'+${i}]:!state.vocabReveal['s'+${i}]}})">
      <div class="kor">${v.a} ${ttsBtn(v.a)}</div>
      <div style="font-size:11px;color:#888">${v.sit}</div>
      ${state.vocabReveal['s'+i]?'<div style="margin-top:6px;padding:6px 10px;background:#fff7ed;border-radius:6px;font-size:13px;color:var(--orange);font-weight:600">'+v.eng+'</div>'
      :'<div style="font-size:10px;color:#ccc;margin-top:4px">탭하여 영어 보기</div>'}
    </div>`).join('');
  else if (t===2) content = '<div class="grid2">'+VOCAB_ADVANCED.map(v=>'<div class="vocab-item" style="background:#f0fdf4;border-radius:8px;padding:8px 10px;border-left:4px solid #22c55e" onclick="TTS.speak(\''+v.a.replace(/'/g,"\\'")+'\')">'
      +'<div class="kor" style="font-size:14px">'+v.a+' '+ttsBtn(v.a)+'</div><div class="eng">'+v.eng+'</div>'
      +'</div>').join('')+'</div>';
  else content = '<div class="grid2">'+VOCAB_SHIPYARD_NOUNS.map(v=>'<div class="vocab-item" style="background:#fff7ed;border-radius:8px;padding:8px 10px;border-left:4px solid #ED7D31" onclick="TTS.speak(\''+v.a.replace(/'/g,"\\'")+'\')">'

      +'</div>').join('')+'</div>';

  return '<h2><span class="section-icon">📖</span>어휘 · Vocabulary</h2><p class="sub">18과 · Lesson 18 · 한국 사회 ('+( VOCAB_PHONE.length+VOCAB_SHIPYARD.length+VOCAB_ADVANCED.length+VOCAB_SHIPYARD_NOUNS.length)+'단어)</p>'

  +content;

  const q = LITERATURE_QUIZ[state.fqIdx];
  return `<h2><span class="section-icon">🧩</span>시 이해 퀴즈 · Poetry Quiz</h2>
  <p class="sub">그 꽃 · That Flower</p>

  <div class="progress"><div class="progress-bar" style="width:${(state.fqIdx+1)/LITERATURE_QUIZ.length*100}%;background:#a855f7"></div></div>

  <div class="card" style="background:#faf5ff;text-align:center;margin:14px 0;border:2px solid #a855f7">
    <div style="font-size:16px;font-weight:700;color:var(--navy)">${q.q}</div>
    <button onclick="TTS.speak('${q.q.replace(/'/g,"\\'")}')" class="tts-btn" style="margin-top:8px;background:#a855f7">🔊</button>

  ${q.o.map((opt,i)=>{
    let cls='quiz-opt';

    }

}

// ===== TOPIK PRACTICE =====
function speakTopikListening(idx) {
  var item = TOPIK_PRACTICE.listening[idx];
  if(!item) return;
  var text = item.script || item.q;
  var parts = text.split('\n\n');
  if(parts.length > 1) {
    text = parts.slice(1).join(' ');
  }
  text = text.replace(/\[.*?\]/g, '').replace(/'/g, '').trim();
  TTS.speak(text);
}

var AICHAT = {
  msgs: [],
  loading: false,
  input: '',
  addMsg: function(role, text) {
    this.msgs.push({ role, text, time: new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) });
    render();
    setTimeout(function(){
      var box = document.querySelector('.ai-msgbox');
      if(box) box.scrollTop = box.scrollHeight;
    }, 50);
  },
  quickSend: function(idx) {
    var b = AI_QUICK_BTNS[idx];
    if (!b || this.loading) return;
    this.send(b.q, b.label);
  },
  send: async function(text, label) {
    if (this.loading) return;
    text = text || this.input.trim();
    if (!text) return;
    this.input = '';
    this.loading = true;
    var displayText = label || text;
    this.addMsg('user', displayText);
    var sys = encodeURIComponent('You are a Korean language tutor for foreign workers at Hanwha Ocean shipyard in Geoje, Korea. Students are beginner level (KIIP Level 1-2). Always: 1) Keep answers SHORT and CLEAR 2) Include English translations 3) Focus on practical shipyard expressions 4) Use simple grammar. Reply in Korean with English translation.');
    try {
      var url = 'https://text.pollinations.ai/' + encodeURIComponent(text) + '?model=openai&system=' + sys;
      var res = await fetch(url);
      var reply = await res.text();
      this.loading = false;
      this.addMsg('assistant', reply);
    } catch(e) {
      this.loading = false;
      this.addMsg('assistant', '⚠️ 연결 오류. 다시 시도해주세요.\nConnection error. Please try again.');
    }
  }
};

function renderAI() {
  return `

    ${AICHAT.loading?`<div style="align-self:flex-start;background:#f0f7ff;border-radius:14px 14px 14px 4px;padding:10px 14px;font-size:13px;color:#2E75B6">⏳ 생성 중... / Generating...</div>`:''}
  </div>
  <div style="display:flex;gap:8px">
    <input id="ai-input" type="text" placeholder="한국어로 질문하세요 / Ask anything..." style="flex:1;padding:12px 14px;border:2px solid #e5e7eb;border-radius:10px;font-size:14px;font-family:inherit;outline:none" onfocus="this.style.borderColor='#2E75B6'" onblur="this.style.borderColor='#e5e7eb'" onkeydown="if(event.key==='Enter'){AICHAT.input=this.value;AICHAT.send();}">
    <button onclick="AICHAT.input=document.getElementById('ai-input').value;AICHAT.send()" style="background:#2E75B6;color:#fff;border-radius:10px;padding:0 18px;font-size:20px;min-width:52px;font-family:inherit;cursor:pointer;border:none">➤</button>
  </div>
  <p style="font-size:11px;color:#aaa;text-align:center;margin-top:8px">🤖 Powered by Pollinations AI · 무료 · Free forever</p>`;
}


render();
