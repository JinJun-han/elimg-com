const TTS={
  speak(text,lang='ko-KR',rate=0.8){
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang=lang;u.rate=rate;
    window.speechSynthesis.speak(u);
  },
  init(){if(window.speechSynthesis)window.speechSynthesis.getVoices();}
};
window.addEventListener('load',()=>{TTS.init();setTimeout(TTS.init,500);});

function ttsBtn(text,lang='ko-KR'){
  const safe=text.replace(/'/g,"\\'").replace(/"/g,'&quot;');
  return `<button class="tts-btn" onclick="TTS.speak('${safe}','${lang}');event.stopPropagation()">🔊</button>`;
}

const RECORDER = {
  streams: {},
  recorders: {},
  chunks: {},
  audioURLs: {},
  isRecording: {},

  async start(idx, targetText, recBtn) {
    const resultEl = document.getElementById('stt-result-' + idx);
    const playBtn  = document.getElementById('play-btn-' + idx);
    const scoreEl  = document.getElementById('score-bar-' + idx);
    if (this.isRecording[idx]) { this.stop(idx, targetText, recBtn); return; }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio: true});
      this.streams[idx] = stream;
    } catch(e) {
      const name = e.name || '';
      let msg = '';
      if (name === 'NotAllowedError' || name === 'PermissionDeniedError') {
        msg = '❌ <strong>마이크가 차단됨</strong> — 브라우저 주소창 🔒 → 마이크 → <strong>허용</strong> 후 새로고침';
      } else if (name === 'NotFoundError' || name === 'DevicesNotFoundError') {
        msg = '❌ <strong>마이크를 찾을 수 없어요</strong> — 마이크 연결을 확인하세요';
      } else {
        msg = '❌ <strong>오류: ' + name + '</strong> — Chrome/Edge에서 다시 시도하세요';
      }
      if (resultEl) resultEl.innerHTML = '<span style="color:#ef4444;font-size:11px;line-height:1.7">' + msg + '</span>';
      return;
    }
    this.chunks[idx] = [];
    const mr = new MediaRecorder(this.streams[idx]);
    this.recorders[idx] = mr;
    mr.ondataavailable = e => { if (e.data.size > 0) this.chunks[idx].push(e.data); };
    mr.onstop = () => {
      if (this.audioURLs[idx]) URL.revokeObjectURL(this.audioURLs[idx]);
      const blob = new Blob(this.chunks[idx], {type: 'audio/webm'});
      this.audioURLs[idx] = URL.createObjectURL(blob);
      if (playBtn) {
        playBtn.disabled = false;
        playBtn.style.opacity = '1';
        playBtn.onclick = () => { const a = new Audio(this.audioURLs[idx]); a.play(); };
      }
    };
    mr.start();
    this.isRecording[idx] = true;
    recBtn.textContent = '⏹ 중지';
    recBtn.style.background = '#ef4444';
    if (resultEl) resultEl.innerHTML = '<span style="color:#ef4444;font-weight:700">● 녹음 중...</span>';
    if (scoreEl) scoreEl.style.width = '0%';
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR) {
      const rec = new SR();
      rec.lang = 'ko-KR';
      rec.continuous = false;
      rec.interimResults = false;
      rec.onresult = (e) => {
        const said   = e.results[0][0].transcript.replace(/[\s,.?!]/g,'');
        const target = targetText.replace(/[\s,.?!]/g,'');
        const conf   = e.results[0][0].confidence;
        let match = 0;
        const minLen = Math.min(said.length, target.length);
        for (let i = 0; i < minLen; i++) { if (said[i] === target[i]) match++; }
        const pct = target.length > 0 ? Math.round(match / target.length * 100) : 0;
        const confPct = Math.round((conf || 0.5) * 100);
        const finalPct = Math.round((pct * 0.7) + (confPct * 0.3));
        const color = finalPct >= 80 ? '#22c55e' : finalPct >= 50 ? '#f59e0b' : '#ef4444';
        const msg   = finalPct >= 80 ? '✅ 완벽해요!' : finalPct >= 50 ? '🔄 조금 더 연습!' : '❌ 다시 시도!';
        if (resultEl) resultEl.innerHTML = '<span style="color:' + color + ';font-weight:800">' + msg + '</span><br><span style="font-size:10px;color:#555">인식: "' + e.results[0][0].transcript + '"</span>';
        if (scoreEl) { scoreEl.style.width = finalPct + '%'; scoreEl.style.background = color; }
      };
      rec.onerror = () => {};
      rec.start();
    }
  },

  async autoDetect() {
    const stateEl = document.getElementById('mic-perm-state');
    const blockedGuide = document.getElementById('mic-blocked-guide');
    const allowBtn = document.getElementById('mic-allow-btn');
    if (!stateEl) return;
    if (navigator.permissions) {
      try {
        const result = await navigator.permissions.query({name: 'microphone'});
        if (result.state === 'granted') {
          stateEl.innerHTML = '<div style="background:#dcfce7;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#166534;font-weight:700">✅ 마이크 이미 허용됨 — 바로 녹음하세요!</div>';
          if (allowBtn) { allowBtn.style.background = '#166534'; allowBtn.textContent = '✅ 허용됨 — 바로 녹음하세요'; }
          if (blockedGuide) blockedGuide.style.display = 'none';
          return;
        } else if (result.state === 'denied') {
          stateEl.innerHTML = '<div style="background:#fee2e2;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#991b1b;font-weight:700">🚫 마이크 차단됨 — 아래 안내대로 해결하세요</div>';
          if (blockedGuide) blockedGuide.style.display = 'block';
          if (allowBtn) { allowBtn.style.background = '#ef4444'; allowBtn.textContent = '⚠️ 차단됨 — 위 단계 완료 후 여기 클릭'; }
          return;
        } else {
          stateEl.innerHTML = '<div style="background:#fef9c3;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#92400e">❓ 아직 허용 안 됨 — 아래 버튼을 눌러 허용해 주세요</div>';
        }
        result.onchange = () => RECORDER.autoDetect();
      } catch(e) {
        stateEl.innerHTML = '<div style="font-size:11px;color:#888">아래 버튼을 눌러 마이크 허용 여부를 확인하세요</div>';
      }
    } else {
      stateEl.innerHTML = '<div style="font-size:11px;color:#888">아래 버튼을 눌러 마이크 허용 여부를 확인하세요</div>';
    }
  },

  async checkPermission(btn) {
    const statusEl = document.getElementById('mic-status');
    const box = document.getElementById('mic-check-box');
    const blockedGuide = document.getElementById('mic-blocked-guide');
    const stateEl = document.getElementById('mic-perm-state');
    btn.textContent = '⏳ 확인 중...'; btn.disabled = true;
    if (location.protocol === 'file:') {
      if (statusEl) statusEl.innerHTML = '<span style="color:#ef4444">❌ file:// 불가 → elimg.com에서 열기</span>';
      btn.textContent = '🎙️ 마이크 허용하기'; btn.disabled = false; return;
    }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      if (statusEl) statusEl.innerHTML = '<span style="color:#ef4444">❌ 미지원 브라우저 — Chrome 또는 Edge를 사용해 주세요</span>';
      btn.textContent = '🎙️ 마이크 허용하기'; btn.disabled = false; return;
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio: true});
      stream.getTracks().forEach(t => t.stop());
      if (stateEl) stateEl.innerHTML = '<div style="background:#dcfce7;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#166534;font-weight:700">✅ 마이크 허용됨! 아래에서 바로 녹음하세요!</div>';
      if (statusEl) statusEl.innerHTML = '<span style="color:#059669;font-weight:700">✅ 성공!</span>';
      if (box) { box.style.background = '#dcfce7'; box.style.borderColor = '#86efac'; }
      if (blockedGuide) blockedGuide.style.display = 'none';
      btn.textContent = '✅ 허용됨 — 바로 녹음하세요!'; btn.style.background = '#166534'; btn.disabled = false;
    } catch(e) {
      const name = e.name || '';
      btn.disabled = false;
      if (name === 'NotAllowedError' || name === 'PermissionDeniedError') {
        if (blockedGuide) blockedGuide.style.display = 'block';
        if (stateEl) stateEl.innerHTML = '<div style="background:#fee2e2;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#991b1b;font-weight:700">🚫 마이크 차단됨 — 안내대로 해결 후 다시 클릭</div>';
        if (statusEl) statusEl.innerHTML = '<span style="color:#ef4444;font-size:11px">🔒 허용 완료 후 이 버튼을 다시 눌러주세요</span>';
        btn.textContent = '🔄 허용 완료 후 다시 클릭'; btn.style.background = '#ef4444';
      } else {
        if (statusEl) statusEl.innerHTML = '<span style="color:#ef4444">오류 (' + name + ') — Chrome/Edge에서 다시 시도</span>';
        btn.textContent = '🔄 다시 시도'; btn.style.background = '#92400e';
      }
    }
  },

  stop(idx, targetText, recBtn) {
    if (this.recorders[idx] && this.recorders[idx].state !== 'inactive') {
      this.recorders[idx].stop();
    }
    if (this.streams[idx]) {
      this.streams[idx].getTracks().forEach(t => t.stop());
    }
    this.isRecording[idx] = false;
    recBtn.textContent = '🎤 다시 녹음';
    recBtn.style.background = '#059669';
  }
};

];
var AICHAT = {
  history: [],
  loading: false,
  quickSend: function(idx) {
    var b = AI_QUICK_BTNS[idx]; if (!b) return;
    var inp = document.getElementById('ai-chat-input'); if (!inp) return;
    inp.value = b.q; inp.style.borderColor = '#f59e0b';
    if (idx === 3) { inp.focus(); return; }
    this.send();
  },
  addMsg: function(role, text) {
    var box = document.getElementById('ai-chat-messages'); if (!box) return;
    var ph = box.querySelector('.ai-placeholder'); if (ph) ph.remove();
    var isUser = role === 'user';
    var d = document.createElement('div');
    d.style.cssText = 'display:flex;flex-direction:column;align-items:' + (isUser?'flex-end':'flex-start') + ';gap:2px;margin-bottom:6px';
    var safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    d.innerHTML = '<div style="font-size:10px;color:#888;margin:0 4px">' + (isUser?'🙋 나':'🤖 AI') + '</div><div style="max-width:90%;padding:10px 13px;border-radius:' + (isUser?'14px 14px 4px 14px':'14px 14px 14px 4px') + ';background:' + (isUser?'#f59e0b':'#fff') + ';color:' + (isUser?'#fff':'#1a202c') + ';font-size:13px;line-height:1.7;border:1px solid ' + (isUser?'#d97706':'#fde68a') + ';word-break:break-word">' + safe + '</div>';
    box.appendChild(d); box.scrollTop = box.scrollHeight;
  },
  setLoading: function(on) {
    var box = document.getElementById('ai-chat-messages');
    var el = document.getElementById('ai-loading-dot');
    var btn = document.getElementById('ai-send-btn');
    if (on) {
      if (box && !el) {
        var ld = document.createElement('div'); ld.id = 'ai-loading-dot';
        ld.style.cssText = 'display:flex;align-items:center;gap:8px;padding:8px;margin-bottom:6px';
        ld.innerHTML = '<div style="display:flex;gap:4px"><div style="width:9px;height:9px;border-radius:50%;background:#f59e0b;animation:aiDot 1s 0s ease-in-out infinite"></div><div style="width:9px;height:9px;border-radius:50%;background:#f59e0b;animation:aiDot 1s 0.2s ease-in-out infinite"></div><div style="width:9px;height:9px;border-radius:50%;background:#f59e0b;animation:aiDot 1s 0.4s ease-in-out infinite"></div></div><span style="font-size:12px;color:#888">AI 응답 중...</span>';
        box.appendChild(ld); box.scrollTop = box.scrollHeight;
      }
      if (btn) { btn.textContent = '⏳'; btn.disabled = true; }
    } else {
      if (el) el.remove();
      if (btn) { btn.textContent = '➤'; btn.disabled = false; }
    }
  },
  send: async function() {
    if (this.loading) return;
    var inp = document.getElementById('ai-chat-input');
    var text = inp ? inp.value.trim() : ''; if (!text) return;
    this.history.push({role:'user', content:text});
    this.addMsg('user', text);
    if (inp) inp.value = '';
    this.loading = true; this.setLoading(true);
    var sys = 'You are a Korean civics tutor for KIIP Level 5 (한국사회이해). The student is preparing for Korean naturalization. Focus on Korean economic history, Miracle on the Han River, industrialization, and chaebol. Answer in Korean. Be concise and friendly.';
    try {
      var res = await fetch('/api/chat', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'system',content:sys},{role:'user',content:text}]})});
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var data = await res.json();
      var reply = data.choices[0].message.content;
      if (!reply || reply.trim() === '') throw new Error('빈 응답');
      this.history.push({role:'assistant', content:reply});
      this.setLoading(false); this.addMsg('assistant', reply);
    } catch(e) {
      this.setLoading(false);
      this.addMsg('assistant', '⚠️ AI 연결 오류\n오류: ' + e.message + '\n\n해결: 잠시 후 다시 시도해 주세요');
    }
    this.loading = false;
  }
};
let _toastTimer = null;
function showReturnToast(appName, icon) {
  let toast = document.getElementById('return-toast');
  if (!toast) { toast = document.createElement('div'); toast.id = 'return-toast'; toast.className = 'return-toast'; document.body.appendChild(toast); }
  const shortcuts = /iPhone|iPad|iPod/i.test(navigator.userAgent) ? '하단 탭 버튼 → KIIP 탭 선택' : /Android/i.test(navigator.userAgent) ? '상단 탭 □ 버튼 → KIIP 탭 선택' : 'Ctrl+Tab 또는 탭 바에서 KIIP 탭 클릭';
  toast.innerHTML = '<div class="return-toast-icon">' + icon + '</div><div class="return-toast-body"><div class="return-toast-title">📍 ' + appName + ' 새 탭에서 열렸어요</div><div class="return-toast-sub">돌아오려면: <strong>' + shortcuts + '</strong></div></div><button class="return-toast-close" onclick="hideReturnToast()">✕</button><div class="return-toast-bar"></div>';
  requestAnimationFrame(() => { toast.classList.add('show'); });
  clearTimeout(_toastTimer); _toastTimer = setTimeout(() => hideReturnToast(), 8000);
}
function hideReturnToast() {
  const toast = document.getElementById('return-toast'); if (toast) toast.classList.remove('show'); clearTimeout(_toastTimer);
}
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') hideReturnToast(); });

function copyNotebookContent() {

  navigator.clipboard.writeText(content).then(() => {
    const el = document.getElementById('copy-ok');
    if (el) { el.textContent = '✅ 복사 완료!'; setTimeout(() => el.textContent = '', 3000); }
  }).catch(() => { const el = document.getElementById('copy-ok'); if (el) el.textContent = '❌ 직접 복사하세요'; });
}
