<script>
// ===== TTS ENGINE =====
const TTS = {
  speak(text, lang='ko-KR', rate=0.8) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang; u.rate = rate; u.pitch = 1;
    const voices = window.speechSynthesis.getVoices();
    const koVoice = voices.find(v => v.lang.startsWith('ko')) || voices.find(v => v.lang.includes('ko'));
    if (koVoice) u.voice = koVoice;
    window.speechSynthesis.speak(u);
  },
  init() { if (window.speechSynthesis) window.speechSynthesis.getVoices(); }
};
window.addEventListener('load', () => { TTS.init(); setTimeout(TTS.init, 500); });

function ttsBtn(text) {
  return `<button class="tts-btn" onclick="event.stopPropagation();TTS.speak('${text.replace(/'/g,"\\'")}')" title="발음 듣기">🔊</button>`;
}

// ===== DATA =====
const VOCAB_CONS1 = [
  {char:"ㄱ",rom:"g/k",name:"기역",shape:"어금니 모양 · back of throat",words:["가방 (bag)","고기 (meat)","기계 (machine)"]},
  {char:"ㄴ",rom:"n",name:"니은",shape:"혀끝이 위 잇몸에 닿는 모양",words:["나라 (country)","노동 (labor)","나사 (screw)"]},
  {char:"ㄷ",rom:"d/t",name:"디귿",shape:"혀끝이 위 잇몸에 닿는 모양",words:["도구 (tool)","도장 (painting)","드릴 (drill)"]},
  {char:"ㄹ",rom:"r/l",name:"리을",shape:"혀가 구부러지는 모양",words:["레버 (lever)","로프 (rope)","러닝 (running)"]},
  {char:"ㅁ",rom:"m",name:"미음",shape:"입술의 모양 · closed lips",words:["마스크 (mask)","모자 (hat)","망치 (hammer)"]},
  {char:"ㅂ",rom:"b/p",name:"비읍",shape:"두 입술의 모양",words:["방호복 (protective suit)","버튼 (button)","볼트 (bolt)"]},
];

const TOOLS_VOCAB = [
  {kor:"그라인더",rom:"geu-ra-in-deo",eng:"Grinder",cons:"ㄱ"},
  {kor:"나사",rom:"na-sa",eng:"Screw/Bolt",cons:"ㄴ"},
  {kor:"드릴",rom:"deu-ril",eng:"Drill",cons:"ㄷ"},
  {kor:"레버",rom:"re-beo",eng:"Lever",cons:"ㄹ"},
  {kor:"망치",rom:"mang-chi",eng:"Hammer",cons:"ㅁ"},
  {kor:"볼트",rom:"bol-teu",eng:"Bolt",cons:"ㅂ"},
  {kor:"너트",rom:"neo-teu",eng:"Nut",cons:"ㄴ"},
  {kor:"렌치",rom:"ren-chi",eng:"Wrench",cons:"ㄹ"},
];

const QUIZ = [
  {q:"'기역'의 로마자 표기는?",o:["n","g/k","d/t","m"],a:1},
  {q:"'도구'에서 ㄷ의 발음은?",o:["n","r","d/t","m"],a:2},
  {q:"'망치'를 영어로 하면?",o:["Drill","Wrench","Grinder","Hammer"],a:3},
  {q:"입술 모양에서 만들어진 자음이 아닌 것은?",o:["ㅁ","ㅂ","ㄴ","ㅍ"],a:2},
  {q:"'그라인더'의 첫 자음은?",o:["ㄱ","ㄴ","ㄷ","ㄹ"],a:0},
  {q:"ㄹ의 이름은?",o:["기역","니은","리을","미음"],a:2},
  {q:"'레버'의 첫 자음은?",o:["ㄱ","ㄴ","ㄷ","ㄹ"],a:3},
  {q:"어금니 모양에서 만들어진 자음은?",o:["ㄱ","ㄴ","ㅁ","ㅂ"],a:0},
];

const CULTURE = [
  {icon:"🦴",t:"자음의 원리",eng:"Consonant Principle",d:"한글 자음은 발음기관의 모양을 본떠서 만들었어요. 예: ㄱ은 혀의 뒤쪽이 목구멍에 닿는 모양, ㄴ은 혀끝이 위 잇몸에 닿는 모양.",de:"Hangul consonants mimic the shape of speech organs. E.g., ㄱ shows the back of the tongue touching the throat, ㄴ shows the tongue tip touching the gum."},
  {icon:"🔧",t:"조선소 공구 문화",eng:"Shipyard Tool Culture",d:"조선소에서는 공구를 한국어로 부르는 경우가 많아요. 공구 이름을 배우면 작업 지시를 이해하는 데 도움이 됩니다.",de:"At the shipyard, tools are often referred to in Korean. Learning tool names helps you understand work instructions."},
  {icon:"🗣️",t:"자음 발음 팁",eng:"Consonant Pronunciation Tips",d:"ㄱ: 말할 때는 'g', 단어 끝에서는 'k'. ㄷ: 말할 때는 'd', 단어 끝에서는 't'. ㄹ: 모음 사이에서 'r', 받침에서 'l'.",de:"ㄱ: 'g' when speaking, 'k' at word end. ㄷ: 'd' when speaking, 't' at word end. ㄹ: 'r' between vowels, 'l' as final consonant."},
  {icon:"⚙️",t:"안전 공구 사용",eng:"Safe Tool Usage",d:"조선소에서 모든 공구는 안전하게 사용해야 합니다. '공구함에 넣어 주세요', '공구 반납해 주세요' 같은 표현을 배워봅시다.",de:"All tools at the shipyard must be used safely. Let's learn expressions like 'Please put it in the tool box' and 'Please return the tools'."},
];

// ===== APP STATE =====
let state = {
  page: 'cons',
  menuOpen: false,
  consSelected: null,
  qIdx: 0, qSel: null, qScore: 0, qDone: false,
};

function setState(updates) {
  Object.assign(state, updates);
  render();
}

// ===== RENDER ENGINE =====
function render() {
  const app = document.getElementById('app');
  app.innerHTML = renderNav() + renderPage() + renderBottomNav();
}

function renderNav() {
  let menu = '';
  if (state.menuOpen) {
    const items = [
      {id:'cons',l:'자음표',i:'🔡'},{id:'principles',l:'원리',i:'🦴'},
      {id:'tools',l:'공구',i:'🔧'},{id:'quiz',l:'퀴즈',i:'🎯'},{id:'culture',l:'문화',i:'🏛️'},
      {id:'ai',l:'AI 선생님',i:'🤖'},
    ];
    menu = '<div class="menu">' + items.map(it =>
      `<button class="${state.page===it.id?'active':''}" onclick="setState({page:'${it.id}',menuOpen:false})">${it.i} ${it.l}</button>`
    ).join('') + '</div>';
  }
  return `<div class="nav">
    <a href="/KIIP_Level0_Index" style="display:flex;align-items:center;gap:8px;text-decoration:none;color:inherit" title="목차로 돌아가기">
      <span style="font-size:18px">📋</span>
      <div><div class="nav-title">0급 입문 2과 · 자음 1</div><div class="nav-sub">Consonants Part 1 · 글로컬 아카데미 KIIP</div></div>
    </a>
    <button class="nav-btn" onclick="setState({menuOpen:!state.menuOpen})">${state.menuOpen?'✕':'☰'}</button>
  </div>${menu}`;
}

function renderBottomNav() {
  const items = [
    {id:'cons',i:'🔡',l:'자음표'},
    {id:'principles',i:'🦴',l:'원리'},
    {id:'tools',i:'🔧',l:'공구'},
    {id:'quiz',i:'🎯',l:'퀴즈'},
    {id:'culture',i:'🏛️',l:'문화'},
  ];
  return `<div class="bottom-nav">${items.map(it =>
    `<button class="${state.page===it.id?'active':''}" onclick="setState({page:'${it.id}',menuOpen:false})">
      <span class="icon">${it.i}</span><span>${it.l}</span></button>`
  ).join('')}</div>`;
}

function renderPage() {
  const pages = {
    cons: renderCons,
    principles: renderPrinciples,
    tools: renderTools,
    quiz: renderQuiz,
    culture: renderCulture,
    ai: renderAI,
  };
  return `<div class="page">${(pages[state.page]||renderCons)()}</div>`;
}

function renderCons() {
  return `
  <div style="background:linear-gradient(135deg,#14532d,#15803d);border-radius:16px;padding:16px;margin-bottom:14px;color:#fff;text-align:center">
    <div style="font-size:12px;opacity:.8;margin-bottom:4px">0급 입문 2과 · KIIP 0단계</div>
    <div style="font-size:22px;font-weight:800;margin-bottom:2px">자음 1 · Consonants Part 1</div>
    <div style="font-size:13px;opacity:.85">ㄱ ㄴ ㄷ ㄹ ㅁ ㅂ — 6개 자음</div>
  </div>
  <h2>🔡 자음표 · Consonant Chart</h2>
  <p class="sub">6개 기본 자음 · 6 Basic Consonants (ㄱ~ㅂ)</p>
  ${VOCAB_CONS1.map((c,i)=>`
  <div class="card ${i===state.consSelected?'card-green':'card-accent'}" onclick="setState({consSelected:${i===state.consSelected?'null':i}});TTS.speak('${c.name}')">
    <div style="display:flex;align-items:center;gap:14px">
      <div style="background:${i===state.consSelected?'#15803d':'#047857'};color:#fff;border-radius:12px;width:52px;height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">
        <div style="font-size:26px;font-weight:800">${c.char}</div>
        <div style="font-size:9px;opacity:.7">[${c.rom}]</div>
      </div>

        <div style="font-size:11px;color:#888;margin-top:2px">${c.shape}</div>
        ${i===state.consSelected?`<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px">
          ${c.words.map(w=>`<span style="background:#f0fdf4;border:1px solid #15803d;color:#15803d;border-radius:6px;padding:3px 8px;font-size:12px;font-weight:600">${w}</span>`).join('')}
        </div>`:`<div style="font-size:10px;color:#ccc;margin-top:4px">탭하면 예시 단어가 나타나요</div>`}
      </div>
    </div>
  </div>`).join('')}
  <div style="display:flex;gap:8px;margin-top:12px">
    <a href="/KIIP_Level0_Lesson1" style="flex:1;padding:12px;border-radius:10px;background:#e5e7eb;color:#555;font-size:13px;font-weight:700;text-align:center;text-decoration:none">← 1과</a>
    <a href="/KIIP_Level0_Index" style="padding:12px 16px;border-radius:10px;background:var(--navy);color:#fff;font-size:13px;font-weight:700;text-align:center;text-decoration:none">목차</a>
    <a href="/KIIP_Level0_Lesson3" style="flex:1;padding:12px;border-radius:10px;background:var(--level0);color:#fff;font-size:13px;font-weight:700;text-align:center;text-decoration:none">3과 →</a>
  </div>`;
}

function renderPrinciples() {
  const organs = [
    {cons:"ㄱ",organ:"어금니 (Molar/Throat)",desc:"혀의 뒤쪽이 목구멍에 닿을 때의 모양을 본떴어요.",eng:"Mimics the back of the tongue touching the throat."},
    {cons:"ㄴ",organ:"혀끝 (Tongue Tip)",desc:"혀끝이 위 잇몸에 닿는 모양을 본떴어요.",eng:"Mimics the tongue tip touching the upper gum."},
    {cons:"ㄷ",organ:"혀끝 (Tongue Tip)",desc:"ㄴ에 가로획을 추가한 형태예요.",eng:"ㄴ with an added horizontal stroke."},
    {cons:"ㄹ",organ:"혀 (Tongue Curve)",desc:"혀가 구부러지는 모양을 본떴어요.",eng:"Mimics the curved shape of the tongue."},
    {cons:"ㅁ",organ:"입술 (Lips)",desc:"입술을 다문 모양을 본떴어요.",eng:"Mimics the shape of closed lips."},
    {cons:"ㅂ",organ:"입술 (Lips)",desc:"두 입술의 모양을 본떴어요. ㅁ에 획 추가.",eng:"Mimics both lips. ㅁ with added strokes."},
  ];
  return `
  <h2>🦴 자음 창제 원리 · Consonant Creation Principle</h2>
  <p class="sub">발음기관의 모양 · Shape of Speech Organs</p>
  <div class="card" style="background:linear-gradient(135deg,#047857,#10b981);color:#fff;border:none;margin-bottom:14px">
    <div style="font-weight:800;font-size:15px;margin-bottom:6px">🎯 핵심 원리</div>
    <div style="font-size:13px;opacity:.9;line-height:1.6">한글 자음은 소리를 낼 때 발음기관(혀, 입술, 목구멍)의 모양을 그대로 본떠 만들었어요!</div>
    <div style="font-size:12px;opacity:.7;margin-top:4px">Hangul consonants are drawn from the shapes of speech organs (tongue, lips, throat).</div>
  </div>
  ${organs.map(o=>`
  <div class="card card-accent">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="font-size:40px;font-weight:800;color:var(--navy);min-width:44px;text-align:center">${o.cons}</div>
      <div>
        <div style="font-size:13px;font-weight:700;color:var(--ocean)">${o.organ}</div>
        <div style="font-size:13px;color:#333;margin-top:2px">${o.desc}</div>
        <div style="font-size:11px;color:#888;margin-top:2px">${o.eng}</div>
      </div>
    </div>
  </div>`).join('')}
  <div style="display:flex;gap:8px;margin-top:12px">
    <a href="/KIIP_Level0_Lesson1" style="flex:1;padding:12px;border-radius:10px;background:#e5e7eb;color:#555;font-size:13px;font-weight:700;text-align:center;text-decoration:none">← 1과</a>
    <a href="/KIIP_Level0_Lesson3" style="flex:1;padding:12px;border-radius:10px;background:var(--level0);color:#fff;font-size:13px;font-weight:700;text-align:center;text-decoration:none">3과 →</a>
  </div>`;
}

function renderTools() {
  return `

function renderQuiz() {
  if (state.qDone) {
    const pct = Math.round(state.qScore/QUIZ.length*100);
    try {
      var prog = JSON.parse(localStorage.getItem('hw_l0_progress')||'{}');
      prog[2] = true;
      localStorage.setItem('hw_l0_progress', JSON.stringify(prog));
      localStorage.setItem('hw_l0_last', '2');
    } catch(e){}
    return `<div style="text-align:center;padding:20px 0">
      <div style="font-size:56px">${pct>=80?'🎉':pct>=50?'👍':'💪'}</div>
      <h2>퀴즈 결과 · Quiz Result</h2>
      <div style="font-size:44px;font-weight:800;color:${pct>=80?'var(--level0)':pct>=50?'var(--orange)':'var(--red)'};margin:14px 0">${state.qScore}/${QUIZ.length}</div>
      <div style="font-size:15px;color:#888;margin-bottom:20px">${pct}% 정답 · Correct</div>
      <div class="progress"><div class="progress-bar" style="width:${pct}%;background:${pct>=80?'var(--level0)':pct>=50?'var(--orange)':'var(--red)'}"></div></div>
      <button onclick="setState({qIdx:0,qSel:null,qScore:0,qDone:false})" class="btn btn-navy" style="margin-top:20px">↺ 다시 풀기 · Retry</button>
      <a href="/KIIP_Level0_Lesson3" class="btn btn-primary" style="display:block;margin-top:10px;text-decoration:none;text-align:center">3과 자음2 →</a>
    </div>`;
  }
  const q = QUIZ[state.qIdx];
  return `<h2>🎯 퀴즈 · Quiz</h2>
  <div style="display:flex;justify-content:space-between;margin-bottom:8px">
    <span style="font-size:12px;color:#888">문제 ${state.qIdx+1}/${QUIZ.length}</span>
    <span style="font-size:12px;color:var(--level0);font-weight:600">점수: ${state.qScore}</span>
  </div>
  <div class="progress"><div class="progress-bar" style="width:${(state.qIdx+1)/QUIZ.length*100}%;background:var(--level0)"></div></div>
  <div class="card" style="background:#f0fdf4;border:2px solid #15803d;text-align:center;margin:14px 0">
    <div style="font-size:16px;font-weight:700;color:var(--navy)">${q.q}</div>
  </div>
  ${q.o.map((opt,i)=>{
    let cls = 'quiz-opt';
    if(state.qSel!==null){
      if(i===q.a) cls+=' quiz-correct';
      else if(i===state.qSel) cls+=' quiz-wrong';
    }
    return `<button class="${cls}" onclick="${state.qSel===null?`setState({qSel:${i},qScore:state.qScore+${i===q.a?1:0}})`:''}">${String.fromCharCode(65+i)}. ${opt}</button>`;
  }).join('')}
  ${state.qSel!==null?`<button onclick="${state.qIdx<QUIZ.length-1?`setState({qIdx:state.qIdx+1,qSel:null})`:`setState({qDone:true})`}" class="btn btn-primary" style="margin-top:8px">${state.qIdx<QUIZ.length-1?'다음 문제 → Next':'결과 보기 → Result'}</button>`:''}`;
}

function renderAI() {
  return `
<div class="card card-green">
  <div class="section-label">🤖 AI 한국어 선생님</div>
  <div style="font-size:13px;color:#555;margin-bottom:10px">궁금한 것을 물어보세요! Ask anything about this lesson.</div>
  <div id="ai-chat" style="min-height:60px;margin-bottom:10px"></div>
  <div style="display:flex;gap:6px">
    <textarea id="ai-input" class="input" style="min-height:44px;resize:none" placeholder="예: ㄱ과 ㄴ의 차이가 뭐예요? / What is the difference between ㄱ and ㄴ?"></textarea>
    <button class="btn btn-primary" style="width:auto;padding:10px 14px" onclick="sendAI()">전송</button>
  </div>
  <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap" id="ai-quick">
    ${["ㄱ/ㄴ/ㄷ 발음","ㄹ/ㅁ/ㅂ 발음","격음 ㅋ/ㅌ/ㅍ","경음 ㄲ/ㄸ/ㅃ","자음 14개 총정리"].map(q=>`<button onclick="document.getElementById('ai-input').value='${q}'" style="background:#f0fdf4;border:1px solid #15803d;color:#15803d;border-radius:20px;padding:5px 12px;font-size:11px">${q}</button>`).join('')}
  </div>
</div>`;
}


function _typeText(el, text, speed) {
  var i=0;
  function _next(){
    if(i<text.length){ el.textContent+=text[i++]; setTimeout(_next, speed); }
  }
  _next();
}
async function sendAI() {
  const input = document.getElementById('ai-input');
  const chat = document.getElementById('ai-chat');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  chat.innerHTML += `<div class="bubble bubble-right" style="margin-left:auto;margin-bottom:8px"><b>나:</b> ${msg}</div>`;
  chat.innerHTML += `<div id="ai-loading" class="bubble bubble-left" style="margin-bottom:8px">⏳ 생각 중...</div>`;
  chat.scrollTop = chat.scrollHeight;
  try {
    const model = 'openai';
    const sysP = 'You are a Korean language tutor for KIIP Level 0 beginners learning Hangul. Keep answers SHORT, include romanization, give English translations, encourage learners. Focus on the current lesson topic.';
    const res = await fetch('/api/chat', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'system',content:sysP},{role:'user',content:msg}]})});
    const data = await res.json();
    const reply = data.choices[0].message.content;
    document.getElementById('ai-loading')?.remove();
    const _el=document.createElement('div');
    _el.className='bubble bubble-left';_el.style.marginBottom='8px';
    _el.innerHTML='<b>AI 선생님:</b> <span></span>';
    chat.appendChild(_el);
    const _sp=_el.querySelector('span');
    _typeText(_sp, reply, 18);
    chat.scrollTop=chat.scrollHeight;
  } catch(e) {
    document.getElementById('ai-loading')?.remove();
    chat.innerHTML += `<div class="bubble bubble-left" style="color:#e00;margin-bottom:8px">연결 오류. 다시 시도해 주세요.</div>`;
  }
}

render();
