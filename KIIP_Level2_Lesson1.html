// ===== TTS ENGINE =====
const TTS = {
  speak(text, lang='ko-KR', rate=0.8) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang; u.rate = rate; u.pitch = 1;
    const voices = window.speechSynthesis.getVoices();
    const koVoice = voices.find(v => v.lang.startsWith('ko')) || voices.find(v => v.lang.includes('ko'));
    if (koVoice) u.voice = koVoice;
    window.speechSynthesis.speak(u);
  },
  init() { if (window.speechSynthesis) window.speechSynthesis.getVoices(); }
};
window.addEventListener('load', () => { TTS.init(); setTimeout(TTS.init, 500); });

function ttsBtn(text) {
  if(!text) return '';
  return `<button class="tts-btn" onclick="event.stopPropagation();TTS.speak('${text.replace(/'/g,"\\'")}')" title="발음 듣기">🔊</button>`;
}

function speakTopikListening(idx) {
  var item = TOPIK_PRACTICE.listening[idx];
  if(!item) return;
  var text = item.q;
  // Extract dialogue part after \n\n
  var parts = text.split('\n\n');
  if(parts.length > 1) {
    text = parts.slice(1).join(' ');
  }
  // Clean up [듣기 유형] prefix
  text = text.replace(/\[.*?\]/g, '').trim();
  TTS.speak(text);
}

      const sel = state['tpRead'+idx];
      const answered = sel !== undefined && sel !== null;
      const correct = answered && sel === item.a;
      return `<div class="card" style="margin-bottom:12px;border:2px solid ${answered?(correct?'#22c55e':'#ef4444'):'#e5e7eb'}">
        <div style="font-size:11px;color:var(--ocean);font-weight:700;margin-bottom:6px">읽기 ${idx+1} · Reading ${idx+1}</div>
        <div style="font-size:14px;color:var(--navy);white-space:pre-line;line-height:1.7;margin-bottom:10px;background:#f8fafc;padding:10px;border-radius:8px">${item.q}</div>
        <div style="display:flex;flex-direction:column;gap:6px">
          ${item.o.map((opt,oi)=>{
            const isSelected = sel === oi;
            const isCorrectOpt = oi === item.a;
            let bg = '#fff'; let border = '#ddd'; let color = '#333';
            if(answered && isCorrectOpt) { bg = '#dcfce7'; border = '#22c55e'; color = '#166534'; }
            else if(answered && isSelected && !correct) { bg = '#fef2f2'; border = '#ef4444'; color = '#991b1b'; }
            else if(!answered) { bg = '#fff'; border = '#ddd'; }
            return `<button onclick="setState({'tpRead${idx}':${oi}})" style="text-align:left;padding:10px 12px;border-radius:8px;border:2px solid ${border};background:${bg};color:${color};font-size:13px;cursor:${answered?'default':'pointer'};font-weight:${isSelected||isCorrectOpt&&answered?'700':'400'}" ${answered?'disabled':''}>${'①②③④'[oi]} ${opt}</button>`;
          }).join('')}
        </div>
        ${answered?`<div style="margin-top:8px;font-size:12px;font-weight:700;color:${correct?'#22c55e':'#ef4444'}">${correct?'✅ 정답입니다! Correct!':'❌ 오답입니다. 다시 확인하세요.'}</div>`:''}
      </div>`;
    }).join('');
  } else if(hTab === 2) {
    // Tab 2: Listening Practice
    content = tp.listening.map((item,idx)=>{
      const sel = state['tpListen'+idx];
      const answered = sel !== undefined && sel !== null;
      const correct = answered && sel === item.a;
      return `<div class="card" style="margin-bottom:12px;border:2px solid ${answered?(correct?'#22c55e':'#ef4444'):'#e5e7eb'}">
        <div style="font-size:11px;color:#a855f7;font-weight:700;margin-bottom:6px">듣기 ${idx+1} · Listening ${idx+1}</div>
        <div style="font-size:14px;color:var(--navy);white-space:pre-line;line-height:1.7;margin-bottom:10px;background:#faf5ff;padding:10px;border-radius:8px">${item.q}</div>
        <button class="btn btn-primary" style="margin-bottom:10px;width:auto;padding:6px 16px;font-size:12px" onclick="speakTopikListening(${idx})">🔊 듣기 Listen</button>
        <div style="display:flex;flex-direction:column;gap:6px">
          ${item.o.map((opt,oi)=>{
            const isSelected = sel === oi;
            const isCorrectOpt = oi === item.a;
            let bg = '#fff'; let border = '#ddd'; let color = '#333';
            if(answered && isCorrectOpt) { bg = '#dcfce7'; border = '#22c55e'; color = '#166534'; }
            else if(answered && isSelected && !correct) { bg = '#fef2f2'; border = '#ef4444'; color = '#991b1b'; }
            return `<button onclick="setState({'tpListen${idx}':${oi}})" style="text-align:left;padding:10px 12px;border-radius:8px;border:2px solid ${border};background:${bg};color:${color};font-size:13px;cursor:${answered?'default':'pointer'};font-weight:${isSelected||isCorrectOpt&&answered?'700':'400'}" ${answered?'disabled':''}>${'①②③④'[oi]} ${opt}</button>`;
          }).join('')}
        </div>
        ${answered?`<div style="margin-top:8px;font-size:12px;font-weight:700;color:${correct?'#22c55e':'#ef4444'}">${correct?'✅ 정답입니다! Correct!':'❌ 오답입니다. 정답을 확인하세요.'}</div>`:''}
      </div>`;
    }).join('');
  } else {
    // Tab 3: Strategy
    content = `<div class="card" style="background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff;border:none;margin-bottom:14px">
      <div style="font-size:18px;font-weight:800">📋 TOPIK I 핵심 전략</div>
      <div style="font-size:12px;opacity:.8">Key Strategies for TOPIK I</div>
    </div>
    <div class="card card-accent" style="margin-bottom:10px">
      <div style="font-size:14px;font-weight:700;color:var(--ocean);margin-bottom:8px">📖 읽기 전략 · Reading Strategy</div>
      <div style="font-size:13px;color:#333;line-height:1.8">
        1️⃣ 먼저 질문을 읽고 핵심 단어를 파악하세요.<br>
        2️⃣ 지문에서 질문의 답을 찾으세요.<br>
        3️⃣ 모르는 단어는 앞뒤 문맥으로 추측하세요.<br>
        4️⃣ 시간이 부족하면 쉬운 문제부터 푸세요.<br>
        5️⃣ 답을 고른 후 다시 한번 확인하세요.
      </div>
      <div style="font-size:11px;color:#888;margin-top:8px;line-height:1.8">
        1️⃣ Read questions first, identify key words.<br>
        2️⃣ Find answers in the passage.<br>
        3️⃣ Guess unknown words from context.<br>
        4️⃣ Solve easy questions first if time is short.<br>
        5️⃣ Double-check your answers.
      </div>
    </div>
    <div class="card card-accent" style="margin-bottom:10px">
      <div style="font-size:14px;font-weight:700;color:#a855f7;margin-bottom:8px">🎧 듣기 전략 · Listening Strategy</div>
      <div style="font-size:13px;color:#333;line-height:1.8">
        1️⃣ 듣기 전에 보기를 먼저 읽으세요.<br>
        2️⃣ 핵심 단어와 숫자에 집중하세요.<br>
        3️⃣ 대화의 상황(장소, 관계)을 파악하세요.<br>
        4️⃣ 마지막 문장에 답이 있는 경우가 많아요.<br>
        5️⃣ 놓쳤으면 다음 문제에 집중하세요.
      </div>
      <div style="font-size:11px;color:#888;margin-top:8px;line-height:1.8">
        1️⃣ Read options before listening.<br>
        2️⃣ Focus on key words and numbers.<br>
        3️⃣ Identify the situation (place, relationship).<br>
        4️⃣ Answers are often in the last sentence.<br>
        5️⃣ If you miss one, focus on the next question.
      </div>
    </div>
    <div class="card" style="background:#ecfdf5;border:2px solid #22c55e">
      <div style="font-size:14px;font-weight:700;color:#166534;margin-bottom:8px">🎯 시간 관리 · Time Management</div>
      <div style="font-size:13px;color:#333;line-height:1.8">
        📌 읽기: 문제당 1.5분 (40문제 = 60분)<br>
        📌 듣기: 자동 진행 (40분 고정)<br>
        📌 쉬운 문제 먼저, 어려운 문제 나중에<br>
        📌 마킹 시간 2~3분 확보
      </div>
    </div>`;
  }

  // Count answered questions for progress
  let answered = 0;
  let total = (tp.reading?tp.reading.length:0) + (tp.listening?tp.listening.length:0);
  for(let i=0;i<(tp.reading?tp.reading.length:0);i++) if(state['tpRead'+i]!==undefined && state['tpRead'+i]!==null) answered++;
  for(let i=0;i<(tp.listening?tp.listening.length:0);i++) if(state['tpListen'+i]!==undefined && state['tpListen'+i]!==null) answered++;
  const pct = total>0?Math.round(answered/total*100):0;

  return `<h2>📊 TOPIK I 준비 · Exam Preparation</h2><p class="sub">${HANGUL_SUBTITLE}</p>
  <div style="margin-bottom:12px;background:#e5e7eb;border-radius:8px;overflow:hidden;position:relative;height:22px">
    <div style="width:${pct}%;height:100%;background:linear-gradient(90deg,#a855f7,#ec4899);border-radius:8px;transition:width 0.5s"></div>
    <div style="position:absolute;top:0;left:0;right:0;text-align:center;font-size:11px;font-weight:700;line-height:22px;color:${pct>50?'#fff':'#555'}">연습 진도 ${answered}/${total} (${pct}%)</div>
  </div>
  <div class="tabs">${tabs.map((t,i)=>`<button class="tab ${hTab===i?'active':''}" onclick="setState({hgTab:${i}})">${t}</button>`).join('')}</div>
  ${content}
  ${hTab===1||hTab===2?`<button class="btn btn-navy" style="margin-top:12px" onclick="${hTab===1?tp.reading.map((_,i)=>`setState({'tpRead${i}':undefined})`).join(';'):tp.listening.map((_,i)=>`setState({'tpListen${i}':undefined})`).join(';')}">↺ 다시 풀기 · Retry</button>`:''}`;
}

function renderVocab() {

  const t = state.vocabTab;
  let content = '';
  if (t===0) content = VOCAB_PHONE.map((v,i)=>`
    <div class="card card-accent vocab-item" onclick="setState({vocabReveal:{...state.vocabReveal,[${i}]:!state.vocabReveal[${i}]}})">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div class="kor">${v.kor} ${ttsBtn(v.kor)}</div><div class="pron">[${v.pron}]</div></div>
      </div>
      ${state.vocabReveal[i]?'<div style="margin-top:6px;padding:6px 10px;background:#f0f7ff;border-radius:6px;font-size:13px;color:var(--ocean);font-weight:600">'+v.eng+'</div>'
      :'<div style="font-size:10px;color:#ccc;margin-top:4px">탭하여 영어 보기 · Tap for English</div>'}

    <div class="card card-orange vocab-item" onclick="setState({vocabReveal:{...state.vocabReveal,['s'+${i}]:!state.vocabReveal['s'+${i}]}})">
      <div class="kor">${v.a} ${ttsBtn(v.a)}</div>
      <div style="font-size:11px;color:#888">${v.sit}</div>
      ${state.vocabReveal['s'+i]?'<div style="margin-top:6px;padding:6px 10px;background:#fff7ed;border-radius:6px;font-size:13px;color:var(--orange);font-weight:600">'+v.eng+'</div>'
      :'<div style="font-size:10px;color:#ccc;margin-top:4px">탭하여 영어 보기</div>'}
    </div>`).join('');
  else if (t===2) content = '<div class="grid2">'+VOCAB_ADVANCED.map(v=>'<div class="vocab-item" style="background:#f0fdf4;border-radius:8px;padding:8px 10px;border-left:4px solid #22c55e" onclick="TTS.speak(\''+v.a.replace(/'/g,"\\'")+'\')">'
      +'<div class="kor" style="font-size:14px">'+v.a+' '+ttsBtn(v.a)+'</div><div class="eng">'+v.eng+'</div>'
      +'</div>').join('')+'</div>';
  else content = '<div class="grid2">'+VOCAB_SHIPYARD_NOUNS.map(v=>'<div class="vocab-item" style="background:#fff7ed;border-radius:8px;padding:8px 10px;border-left:4px solid #ED7D31" onclick="TTS.speak(\''+v.a.replace(/'/g,"\\'")+'\')">'
      +'<div class="kor" style="font-size:14px">'+v.a+' '+ttsBtn(v.a)+'</div><div class="eng">'+v.eng+'</div>'
      +'</div>').join('')+'</div>';

  return '<h2><span class="section-icon">📖</span>어휘 · Vocabulary</h2><p class="sub">1과 · Lesson 1 · 자기소개 ('+(VOCAB_PHONE.length+VOCAB_SHIPYARD.length+VOCAB_ADVANCED.length+VOCAB_SHIPYARD_NOUNS.length)+'단어)</p>'
  +'<div class="tabs">'+tabs.map((tb,i)=>'<button class="tab '+(t===i?'active':'')+'" onclick="setState({vocabTab:'+i+',vocabReveal:{}})">'+tb+'</button>').join('')+'</div>'
  +content;
}

// ===== RECORDER (발음 코치 — 브라우저 내장 API) =====
var RECORDER = {
  recorders: {}, chunks: {}, audioURLs: {}, isRecording: {},

  async start(idx, targetText, recBtn) {
    var resultEl = document.getElementById('stt-result-' + idx);
    var playBtn  = document.getElementById('play-btn-' + idx);
    var scoreEl  = document.getElementById('score-bar-' + idx);
    if (this.isRecording[idx]) { this.stop(idx, recBtn); return; }
    var stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({audio: true});
    } catch(e) {
      var msg = '';
      var n = e.name || '';
      if (n === 'NotAllowedError' || n === 'PermissionDeniedError')
        msg = '❌ <strong>마이크 차단됨</strong> — 주소창 🔒 → 마이크 → <strong>허용</strong> 후 F5<br><span style="color:#555">Microphone blocked — click 🔒 → Microphone → Allow → F5</span>';
      else if (n === 'NotFoundError')
        msg = '❌ 마이크를 찾을 수 없어요 — Microphone not found';
      else if (location.protocol === 'file:')
        msg = '❌ 보안 오류 — <a href="https://elimg.com" target="_blank" style="color:#1d4ed8">elimg.com</a>에서 열어주세요 (HTTPS 필요)';
      else
        msg = '❌ 오류: ' + e.name + ' — Chrome/Edge에서 다시 시도하세요';
      if (resultEl) resultEl.innerHTML = '<span style="color:#ef4444;font-size:11px;line-height:1.7">' + msg + '</span>';
      return;
    }
    this.chunks[idx] = [];
    var mr = new MediaRecorder(stream);
    this.recorders[idx] = mr;
    var self = this;
    mr.ondataavailable = function(e) { if (e.data.size > 0) self.chunks[idx].push(e.data); };
    mr.onstop = function() {
      if (self.audioURLs[idx]) URL.revokeObjectURL(self.audioURLs[idx]);
      var blob = new Blob(self.chunks[idx], {type:'audio/webm'});
      self.audioURLs[idx] = URL.createObjectURL(blob);
      if (playBtn) {
        playBtn.disabled = false; playBtn.style.opacity = '1';
        playBtn.onclick = function() { new Audio(self.audioURLs[idx]).play(); };
      }
    };
    mr.start();
    this.isRecording[idx] = true;
    recBtn.textContent = '⏹ 중지'; recBtn.style.background = '#ef4444';
    if (resultEl) resultEl.innerHTML = '<span style="color:#ef4444;font-weight:700">● 녹음 중... / Recording...</span>';
    if (scoreEl) scoreEl.style.width = '0%';

    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR) {
      var rec = new SR(); rec.lang = 'ko-KR'; rec.continuous = false; rec.interimResults = false;
      rec.onresult = function(e) {
        var said = e.results[0][0].transcript.replace(/[\s,.?!]/g,'');
        var target = targetText.replace(/[\s,.?!]/g,'');
        var conf = e.results[0][0].confidence;
        var match = 0;
        for (var i = 0; i < Math.min(said.length, target.length); i++) { if (said[i] === target[i]) match++; }
        var pct = target.length > 0 ? Math.round(match / target.length * 100) : 0;
        var final = Math.round(pct * 0.7 + Math.round((conf||0.5)*100) * 0.3);
        var color = final >= 80 ? '#22c55e' : final >= 50 ? '#f59e0b' : '#ef4444';
        var msg = final >= 80 ? '✅ 완벽해요! Great!' : final >= 50 ? '🔄 조금 더 연습! Keep going!' : '❌ 다시 시도! Try again!';
        if (resultEl) resultEl.innerHTML = '<span style="color:' + color + ';font-weight:800">' + msg + '</span><br><span style="font-size:10px;color:#555">인식 / Heard: "' + e.results[0][0].transcript + '"</span>';
        if (scoreEl) { scoreEl.style.width = final + '%'; scoreEl.style.background = color; }
      };
      rec.onerror = function() {};
      rec.start();
    }
  },

  stop(idx, recBtn) {
    if (this.recorders[idx] && this.recorders[idx].state !== 'inactive') this.recorders[idx].stop();
    this.isRecording[idx] = false;
    recBtn.textContent = '🎤 다시 녹음'; recBtn.style.background = '#059669';
  },

  async autoDetect() {
    var stateEl = document.getElementById('mic-perm-state');
    var blockedEl = document.getElementById('mic-blocked-guide');
    var allowBtn = document.getElementById('mic-allow-btn');
    if (!stateEl) return;
    if (navigator.permissions) {
      try {
        var result = await navigator.permissions.query({name:'microphone'});
        if (result.state === 'granted') {
          stateEl.innerHTML = '<div style="background:#dcfce7;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#166534;font-weight:700">✅ 마이크 허용됨 — 바로 녹음하세요! / Microphone allowed!</div>';
          if (allowBtn) { allowBtn.style.background='#166534'; allowBtn.textContent='✅ 허용됨 — 녹음 시작 / Start Recording'; }
          if (blockedEl) blockedEl.style.display = 'none';
        } else if (result.state === 'denied') {
          stateEl.innerHTML = '<div style="background:#fee2e2;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#991b1b;font-weight:700">🚫 마이크 차단됨 / Blocked — 아래 버튼 클릭</div>';
          if (blockedEl) blockedEl.style.display = 'block';
        } else {
          stateEl.innerHTML = '<div style="background:#fef9c3;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#92400e">❓ 아래 버튼을 눌러 마이크를 허용하세요</div>';
        }
        result.onchange = function() { RECORDER.autoDetect(); };
      } catch(e) {
        stateEl.innerHTML = '<div style="font-size:11px;color:#888">아래 버튼으로 마이크를 허용하세요</div>';
      }
    }
  },

  async checkPermission(btn) {
    var statusEl = document.getElementById('mic-status');
    var box = document.getElementById('mic-check-box');
    var blockedEl = document.getElementById('mic-blocked-guide');
    var stateEl = document.getElementById('mic-perm-state');
    btn.textContent = '⏳ 확인 중...'; btn.disabled = true;
    if (location.protocol === 'file:') {
      if (statusEl) statusEl.innerHTML = '<span style="color:#ef4444">❌ file:// 불가 → <a href="https://elimg.com" target="_blank" style="color:#1d4ed8;font-weight:700">elimg.com에서 열기</a></span>';
      btn.textContent = '🎙️ 마이크 허용하기'; btn.disabled = false; return;
    }
    try {
      var stream = await navigator.mediaDevices.getUserMedia({audio:true});
      stream.getTracks().forEach(function(t){t.stop();});
      if (stateEl) stateEl.innerHTML = '<div style="background:#dcfce7;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#166534;font-weight:700">✅ 마이크 허용됨! 아래에서 녹음하세요!</div>';
      if (statusEl) statusEl.innerHTML = '<span style="color:#059669;font-weight:700">✅ 허용됨! / Allowed!</span>';
      if (box) { box.style.background='#dcfce7'; box.style.borderColor='#86efac'; }
      if (blockedEl) blockedEl.style.display = 'none';
      btn.textContent = '✅ 허용됨 — 녹음 시작 / Start Recording'; btn.style.background='#166534'; btn.disabled=false;
    } catch(e) {
      btn.disabled = false;
      if (e.name==='NotAllowedError'||e.name==='PermissionDeniedError') {
        if (blockedEl) blockedEl.style.display='block';
        if (stateEl) stateEl.innerHTML='<div style="background:#fee2e2;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#991b1b;font-weight:700">🚫 차단됨 — 아래 순서대로 해결 후 다시 클릭</div>';
        btn.textContent='🔄 허용 완료 후 다시 클릭'; btn.style.background='#ef4444';
      } else {
        if (statusEl) statusEl.innerHTML='<span style="color:#ef4444">오류 (' + e.name + ') — Chrome/Edge로 시도</span>';
        btn.textContent='🔄 다시 시도'; btn.style.background='#92400e';
      }
    }
  }
};
