<style>
:root{
  --navy:#1E3A5F;--ocean:#2E75B6;--gold:#F59E0B;
  --green:#10B981;--purple:#8B5CF6;--pink:#EC4899;--red:#EF4444;
  --gray:#F8FAFC;--border:#E2E8F0;--text:#1E293B;--muted:#64748B;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--gray);color:var(--text);max-width:520px;margin:0 auto;min-height:100vh;overflow-x:hidden}

/* NAV */
.top-nav{background:linear-gradient(135deg,var(--navy),#0f2942);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.2)}
.nav-brand-title{font-size:15px;font-weight:900;color:#fff}
.nav-brand-sub{font-size:10px;color:#8899BB}
.nav-badge{background:var(--gold);color:var(--navy);font-size:10px;font-weight:900;padding:4px 12px;border-radius:20px;letter-spacing:0.5px}

/* LEVEL STRIP */
.level-strip{background:linear-gradient(135deg,#0f172a,#1e293b);padding:14px 12px;display:flex;gap:5px}
.level-btn{flex:1;padding:10px 2px;border-radius:10px;border:2px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.5);font-size:10px;font-weight:700;text-align:center;cursor:pointer;transition:all 0.2s;font-family:inherit}
.level-btn .lv-num{font-size:17px;font-weight:900;display:block;line-height:1.2}
.level-btn .lv-name{font-size:8px;opacity:0.8;margin-top:2px;display:block}

/* TAB BAR */
.tab-bar{background:#fff;border-bottom:1px solid var(--border);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;position:sticky;top:52px;z-index:99;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.tab-bar::-webkit-scrollbar{display:none}
.tab-item{flex-shrink:0;padding:10px 14px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.2s}
.tab-item.active{color:var(--ocean);border-bottom-color:var(--ocean)}

/* CONTENT */
.content{padding:16px;padding-bottom:90px}

/* CARDS */
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.card-dark{background:linear-gradient(135deg,var(--navy),#0f2942);color:#fff;border:none}
.card-gold{background:linear-gradient(135deg,#92400e,#b45309);color:#fff;border:none}

/* LEVEL CARDS */
.level-card{display:flex;align-items:center;gap:12px;padding:13px 14px;background:#fff;border-radius:14px;border:1px solid var(--border);margin-bottom:8px;text-decoration:none;color:inherit;transition:all 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.level-card:hover{transform:translateX(4px);box-shadow:0 4px 16px rgba(0,0,0,0.1)}
.level-dot{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0}
.level-info{flex:1}
.level-name{font-size:14px;font-weight:800}
.level-desc{font-size:11px;color:var(--muted);margin-top:2px}
.level-meta{font-size:10px;color:var(--muted);margin-top:3px}

/* STEP FLOW */
.step-item{display:flex;gap:14px;padding-bottom:22px;position:relative}
.step-item:last-child{padding-bottom:0}
.step-left{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:36px}
.step-circle{width:36px;height:36px;border-radius:50%;background:var(--ocean);color:#fff;font-size:14px;font-weight:900;display:flex;align-items:center;justify-content:center}
.step-circle.done{background:var(--green)}
.step-circle.curr{background:var(--gold);color:var(--navy)}
.step-line{width:2px;flex:1;background:var(--border);margin:4px 0;min-height:16px}
.step-body{flex:1;padding-top:6px}
.step-title{font-size:14px;font-weight:800;margin-bottom:4px}
.step-desc{font-size:12px;color:var(--muted);line-height:1.7}
.step-btn{display:inline-block;margin-top:8px;background:var(--ocean);color:#fff;padding:6px 16px;border-radius:20px;font-size:11px;font-weight:700;text-decoration:none;cursor:pointer;border:none;font-family:inherit}

/* REGION */
.region-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.region-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 10px;text-align:center;text-decoration:none;color:inherit;transition:all 0.15s;display:block}
.region-card:hover{border-color:var(--ocean);background:#f0f7ff;transform:translateY(-2px)}
.region-flag{font-size:26px;margin-bottom:4px}
.region-name{font-size:13px;font-weight:800}
.region-count{font-size:10px;color:var(--muted);margin-top:2px}

/* COMPARE TABLE */
.compare-table{width:100%;border-collapse:collapse;font-size:12px}
.compare-table th{background:var(--navy);color:#fff;padding:8px 10px;text-align:center}
.compare-table td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:center}
.compare-table tr:nth-child(even) td{background:#f8fafc}
.yes{color:var(--green);font-weight:900;font-size:15px}
.no{color:var(--red);font-size:13px}
.part{color:var(--gold);font-weight:700}

/* TOPIK */
.topik-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.topik-card{border-radius:12px;padding:14px 10px;text-align:center;color:#fff}
.topik-grade{font-size:22px;font-weight:900}
.topik-skill{font-size:10px;opacity:0.85;margin-top:2px}
.topik-kiip{font-size:10px;margin-top:6px;background:rgba(255,255,255,0.2);border-radius:6px;padding:3px 8px}

/* AI */
.ai-chatbox{background:#fff;border:1px solid var(--border);border-radius:14px;min-height:220px;max-height:320px;overflow-y:auto;padding:12px;margin-bottom:10px;display:flex;flex-direction:column;gap:8px}
.ai-msg{display:flex;gap:8px;align-items:flex-start}
.ai-msg.user{flex-direction:row-reverse}
.ai-avatar{width:30px;height:30px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ai-bubble{max-width:82%;padding:9px 12px;border-radius:12px;font-size:13px;line-height:1.6}
.ai-bubble.bot{background:#f0f7ff;color:var(--text);border-top-left-radius:4px}
.ai-bubble.user-b{background:var(--ocean);color:#fff;border-top-right-radius:4px}
.ai-row{display:flex;gap:8px}
.ai-input{flex:1;padding:10px 14px;border:2px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;outline:none}
.ai-input:focus{border-color:var(--ocean)}
.ai-send{background:var(--ocean);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:18px;cursor:pointer}

/* QUICK BTNS */
.qbtns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.qbtn{background:#f0f7ff;border:1px solid #bfdbfe;color:var(--navy);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.15s}
.qbtn:hover{background:#dbeafe}

/* PROGRESS */
.prog-wrap{background:var(--border);border-radius:8px;height:7px;overflow:hidden;margin-top:6px}
.prog-fill{height:100%;border-radius:8px;transition:width 0.5s}

/* UTIL */
.btn{display:block;width:100%;padding:13px;border-radius:12px;font-size:14px;font-weight:800;text-align:center;cursor:pointer;border:none;font-family:inherit;text-decoration:none;transition:opacity 0.2s}
.btn:hover{opacity:0.9}
.btn-primary{background:var(--ocean);color:#fff}
.btn-navy{background:var(--navy);color:#fff}
.btn-gold{background:var(--gold);color:var(--navy)}
.sec-title{font-size:16px;font-weight:900;color:var(--text);margin-bottom:3px}
.sec-sub{font-size:12px;color:var(--muted);margin-bottom:14px}
.divider{height:1px;background:var(--border);margin:18px 0}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;color:#fff}
.tag{display:inline-flex;align-items:center;background:rgba(255,255,255,0.18);border-radius:6px;padding:3px 10px;font-size:11px;margin:2px}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:#fff;border-top:1px solid var(--border);display:flex;z-index:100;padding:4px 0;box-shadow:0 -2px 12px rgba(0,0,0,0.08)}
.bnav{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;font-size:9px;font-weight:700;color:var(--muted);cursor:pointer;border:none;background:none;font-family:inherit;transition:color 0.2s}
.bnav.active{color:var(--ocean)}
.bnav-icon{font-size:19px}

@media(prefers-color-scheme:dark){
  body{background:#0f172a;color:#e2e8f0}
  .card,.level-card,.region-card,.ai-chatbox{background:#1e293b;border-color:#334155}
  .tab-bar,.bottom-nav{background:#1e293b;border-color:#334155}
  .ai-bubble.bot{background:#0f2942}
  .ai-input{background:#1e293b;border-color:#334155;color:#e2e8f0}
  .compare-table tr:nth-child(even) td{background:#1e293b}
}
</style>
</head>
<body>

<div id="app"></div>

<nav class="bottom-nav">
  <button class="bnav active" id="bn-home" onclick="setTab('home')"><span class="bnav-icon">🏠</span>홈</button>
  <button class="bnav" id="bn-apply" onclick="setTab('apply')"><span class="bnav-icon">📝</span>신청</button>
  <button class="bnav" id="bn-location" onclick="setTab('location')"><span class="bnav-icon">📍</span>장소</button>
  <button class="bnav" id="bn-study" onclick="setTab('study')"><span class="bnav-icon">📚</span>학습</button>
  <button class="bnav" id="bn-topik" onclick="setTab('topik')"><span class="bnav-icon">📊</span>TOPIK</button>
  <button class="bnav" id="bn-ai" onclick="setTab('ai')"><span class="bnav-icon">🤖</span>AI</button>
</nav>

<script>
// ===== DATA =====
const LEVELS = [
  {n:0,name:'기초',eng:'Pre-Beginner',hours:'15H',color:'#10B981',icon:'🌱',
   desc:'한글 자모 · 기초 인사 · 숫자',topik:'TOPIK 준비 전',lessons:8,
   feature:'한글 입문',url:'/KIIP_Level0_Index'},
  {n:1,name:'초급1',eng:'Beginner 1',hours:'100H',color:'#3B82F6',icon:'📗',
   desc:'일상 의사소통 · 직장생활 기초',topik:'TOPIK I 1급 목표',lessons:20,
   feature:'조선소 특화',url:'/HanwhaOcean_Level1_Index'},
  {n:2,name:'초급2',eng:'Beginner 2',hours:'100H',color:'#F59E0B',icon:'📘',
   desc:'공공기관 · 의료 · 금융 이용',topik:'TOPIK I 2급 목표',lessons:20,
   feature:'TOPIK I 완성',url:'/HanwhaOcean_Level2_Index'},
  {n:3,name:'중급1',eng:'Intermediate 1',hours:'100H',color:'#8B5CF6',icon:'📙',
   desc:'한국 역사 · 문화 · 직업 능력',topik:'TOPIK II 3급 목표',lessons:20,
   feature:'사회 참여',url:'/KIIP_Level3_Index'},
  {n:4,name:'중급2',eng:'Intermediate 2',hours:'100H',color:'#EC4899',icon:'📕',
   desc:'사회 참여 · 고급 의사소통',topik:'TOPIK II 4급 목표',lessons:20,
   feature:'글로컬 인재',url:'/KIIP_Full_Program'},
  {n:5,name:'고급',eng:'Advanced',hours:'50~70H',color:'#EF4444',icon:'🎓',
   desc:'한국 정치 · 경제 · 법 · 귀화',topik:'TOPIK II 5급+ 목표',lessons:20,
   feature:'귀화 · 영주권',url:'/KIIP_Full_Program'},
];

const REGIONS = [
  {name:'서울',flag:'🏙️',count:'120+',code:'11'},{name:'경기',flag:'🌾',count:'150+',code:'41'},
  {name:'인천',flag:'✈️',count:'60+',code:'28'},{name:'부산',flag:'⚓',count:'50+',code:'26'},
  {name:'경남',flag:'🚢',count:'45+',code:'48'},{name:'대구',flag:'🌊',count:'35+',code:'27'},
  {name:'경북',flag:'🍎',count:'40+',code:'47'},{name:'충남',flag:'🌻',count:'30+',code:'44'},
  {name:'전남',flag:'🍵',count:'25+',code:'46'},{name:'전북',flag:'🌿',count:'25+',code:'45'},
  {name:'강원',flag:'🏔️',count:'20+',code:'42'},{name:'제주',flag:'🍊',count:'15+',code:'50'},
];

const QBTNS = [
  {e:'📝',l:'신청 방법',q:'KIIP 사회통합프로그램 신청 방법을 단계별로 알려주세요.'},
  {e:'📍',l:'장소 찾기',q:'내 지역 KIIP 수업 장소는 어떻게 찾나요?'},
  {e:'🎯',l:'TOPIK 연계',q:'KIIP와 TOPIK은 어떻게 연계되나요? 급수별로 알려주세요.'},
  {e:'🛂',l:'비자 가점',q:'KIIP 이수 시 비자 가점과 혜택은 무엇인가요?'},
  {e:'⏰',l:'이수 기간',q:'KIIP 0급부터 5급까지 전 과정 이수에 얼마나 걸리나요?'},
  {e:'🎓',l:'귀화 조건',q:'KIIP 이수와 귀화 · 영주권 신청 조건의 관계를 알려주세요.'},
];

// ===== STATE =====
let S = { tab:'home', level:1 };
let aiMsgs = [{role:'bot',text:'안녕하세요! 👋 저는 글로컬 KIIP AI 튜터예요.\n\nKIIP 신청 방법, 장소 찾기, TOPIK 연계, 비자 가점 등\n무엇이든 물어보세요! 로그인 없이 무제한 무료입니다. 😊'}];
let aiLoading = false;

// ===== RENDER =====
function render() {
  document.getElementById('app').innerHTML = rNav() + rStrip() + rTabs() + `<div class="content">${rPage()}</div>`;
  ['home','apply','location','study','topik','ai'].forEach(t => {
    const el = document.getElementById('bn-'+t);
    if(el) el.className = 'bnav' + (S.tab===t?' active':'');
  });
}

function rNav() {
  return `<div class="top-nav">
    <div class="nav-brand">
      <div class="nav-brand-title">🎓 KIIP AI 프리미엄</div>
      <div class="nav-brand-sub">글로컬 아카데미 · 법무부 사회통합프로그램 공식 커리큘럼</div>
    </div>
    <span class="nav-badge">✨ AI</span>
  </div>`;
}

function rStrip() {
  return `<div class="level-strip">
    ${LEVELS.map(lv=>`
      <button class="level-btn" onclick="setState({level:${lv.n}})"
        style="border-color:${S.level===lv.n?lv.color:'rgba(255,255,255,0.08)'};background:${S.level===lv.n?lv.color+'22':'rgba(255,255,255,0.04)'};color:${S.level===lv.n?lv.color:'rgba(255,255,255,0.5)'}">
        <span class="lv-num">${lv.n}급</span>
        <span class="lv-name">${lv.name}</span>
      </button>`).join('')}
  </div>`;
}

function rTabs() {
  const tabs = [{id:'home',l:'🏠 홈'},{id:'apply',l:'📝 수업 신청'},{id:'location',l:'📍 장소 찾기'},{id:'study',l:'📚 레벨 학습'},{id:'topik',l:'📊 TOPIK'},{id:'ai',l:'🤖 AI 튜터'}];
  return `<div class="tab-bar">${tabs.map(t=>`<div class="tab-item${S.tab===t.id?' active':''}" onclick="setTab('${t.id}')">${t.l}</div>`).join('')}</div>`;
}

function rPage() {
  return ({home:rHome,apply:rApply,location:rLocation,study:rStudy,topik:rTopik,ai:rAI}[S.tab]||rHome)();
}

// ===== HOME =====
function rHome() {
  const lv = LEVELS[S.level];
  return `
  <div class="card card-dark" style="background:linear-gradient(135deg,${lv.color}CC,${lv.color}77);margin-bottom:14px">
    <div style="font-size:11px;opacity:0.75;margin-bottom:6px">현재 선택 · ${lv.n}급 ${lv.icon}</div>
    <div style="font-size:24px;font-weight:900;margin-bottom:4px">${lv.name}</div>
    <div style="font-size:12px;opacity:0.85;margin-bottom:12px">${lv.eng} · ${lv.hours} · ${lv.lessons}과 · ${lv.topik}</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">
      <span class="tag">🎯 ${lv.topik}</span>
      <span class="tag">⭐ ${lv.feature}</span>
      <span class="tag">📖 ${lv.lessons}과</span>
    </div>
    <a href="${lv.url}" class="btn" style="background:#fff;color:${lv.color};padding:11px;font-size:13px">📖 ${lv.n}급 수업 바로 시작 →</a>
  </div>

  <div class="sec-title">법무부 앱 vs 글로컬 AI</div>
  <div class="sec-sub">더 스마트하게, 더 자유롭게</div>
  <div class="card" style="padding:0;overflow:hidden;margin-bottom:16px">
    <table class="compare-table">
      <thead><tr><th style="text-align:left;padding-left:12px">기능</th><th>법무부 앱</th><th>글로컬 AI</th></tr></thead>
      <tbody>
        <tr><td style="text-align:left;padding-left:12px;font-weight:700">모바일 최적화</td><td class="part">△</td><td class="yes">✅</td></tr>
        <tr><td style="text-align:left;padding-left:12px;font-weight:700">AI 발음 코치</td><td class="no">✗</td><td class="yes">✅</td></tr>
        <tr><td style="text-align:left;padding-left:12px;font-weight:700">AI 튜터 (무제한)</td><td class="no">✗</td><td class="yes">✅</td></tr>
        <tr><td style="text-align:left;padding-left:12px;font-weight:700">18개국 언어</td><td class="no">✗</td><td class="yes">✅</td></tr>
        <tr><td style="text-align:left;padding-left:12px;font-weight:700">로그인 없이 학습</td><td class="no">✗</td><td class="yes">✅</td></tr>

  </div>

  <div class="ai-row">
    <input class="ai-input" id="aiIn" type="text" placeholder="KIIP에 대해 무엇이든 물어보세요..." onkeydown="if(event.key==='Enter')aiSend()">
    <button class="ai-send" onclick="aiSend()">➤</button>
  </div>

  <div class="divider"></div>
  <div class="sec-title" style="font-size:13px">🎤 AI 발음 코치</div>
  <div class="card" style="text-align:center;margin-top:8px">
    <div style="font-size:30px;margin-bottom:8px">🎤</div>
    <div style="font-size:13px;font-weight:800;margin-bottom:4px">실시간 발음 비교</div>
    <div style="font-size:11px;color:#64748b;margin-bottom:12px">원어민 발음 듣기 → 내 발음 녹음 → 즉시 비교</div>
    <a href="${LEVELS[S.level].url}" class="btn btn-primary" style="font-size:12px;padding:10px">
      ${LEVELS[S.level].n}급 발음 코치 시작 →
    </a>
  </div>
  `;
}

// ===== AI FUNCTIONS =====
async function aiSend() {
  const inp = document.getElementById('aiIn');
  if (!inp) return;
  const text = inp.value.trim();
  if (!text || aiLoading) return;
  inp.value = '';
  aiMsgs.push({role:'user',text});
  aiLoading = true;
  render(); scrollAI();

  try {
    const sys = 'You are a KIIP (Korea Immigration and Integration Program) expert AI tutor for GlocalBridge (elimg.com). Help immigrants with: KIIP registration at socinet.go.kr, finding nearby classes, TOPIK exam prep (grades 1-6), visa score benefits (E-7-4, F-5, F-6), naturalization requirements. Answer in Korean by default, switch language if user writes in another language. Keep answers concise and practical. Users can study free at elimg.com.';
    const res = await fetch('/api/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:[{role:'system',content:sys},{role:'user',content:text}]})
    });
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || '죄송합니다. 잠시 후 다시 시도해주세요.';
    aiMsgs.push({role:'bot',text:reply});
  } catch(e) {
    aiMsgs.push({role:'bot',text:'⚠️ 연결 오류입니다.\n\n📞 이민자 콜센터 1345 (24시간)\n🌐 socinet.go.kr 에서 도움받으세요.'});
  }
  aiLoading = false;
  render(); scrollAI();
}

function aiQuick(i) {
  const inp = document.getElementById('aiIn');
  if (inp) { inp.value = QBTNS[i].q; aiSend(); }
  else { setState({tab:'ai'}); setTimeout(()=>{const inp2=document.getElementById('aiIn');if(inp2){inp2.value=QBTNS[i].q;aiSend();}},100); }
}

function scrollAI() {
  setTimeout(()=>{ const b=document.getElementById('aiBox'); if(b) b.scrollTop=b.scrollHeight; },80);
}

// ===== HELPERS =====
function setState(u) { Object.assign(S,u); render(); }
function setTab(t) { S.tab=t; render(); window.scrollTo(0,0); }

// ===== INIT =====
render();
</script>

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{ navigator.serviceWorker.register('/sw.js').catch(()=>{}); });
}
</script>
